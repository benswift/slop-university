# The persistent researcher roster of Slop University.
#
# Every generated artefact, press release, and site profile page names ONLY
# these researchers --- never a real person, never a name invented inside a
# run. To add a researcher: run a name-collision check first (web search for
# the full name; include the ANU staff directory --- the nearest institution
# is the likeliest collision; no ANU staff member or notable
# researcher/public figure may share the name), generate a house-style
# headshot per skills/_shared/visual-style.md into canon/headshots/, eyeball
# it for accidental real-person likeness, then add the entry here.
#
# All five entries collision-checked 2026-07-04 (all clear); renke-sabel and
# dagny-okafor collision-checked 2026-07-08 (clear).

researchers:
  - id: verity-marris
    name: Verity Marris
    title: Professor and Director, Trajectory Analytics Group
    school: School of Emergent Priorities
    bio: >-
      Professor Marris came to the university after two decades across
      government foresight units and sector planning bodies, where she led
      horizon-scanning exercises whose recommendations she now studies the
      afterlives of. Her research asks how priorities emerge, harden into
      commitments, and outlive the conditions that justified them. She
      directs the Trajectory Analytics Group and anchors the university's
      anticipatory-capability agenda.
    headshot: canon/headshots/verity-marris.jpg

  - id: casimir-beng
    name: Casimir Beng
    title: Associate Professor and Lead, Adaptive Metrics Lab
    school: School of Continuous Improvement
    bio: >-
      Trained as a control engineer, Associate Professor Beng spent the early
      part of his career keeping industrial processes inside tolerance before
      turning the same instruments on the institutions that operate them. He
      studies measurement systems that improve the things they measure, with
      a standing interest in what happens when they don't. He leads the
      Adaptive Metrics Lab and convenes the university's cross-cutting work
      on evaluation ecosystems.
    headshot: canon/headshots/casimir-beng.jpg

  - id: anneke-tolan
    name: Anneke Tolan
    title: Senior Research Fellow
    school: School of Emergent Priorities
    bio: >-
      Dr Tolan is an ethnographer of planning. Her fieldwork embeds with
      strategy units, review panels, and working groups to document how
      foresight is actually practised — the workshops, the templates, the
      quiet negotiations over wording — and how those practices scale from
      pilot settings to whole-of-organisation footprints.
    headshot: canon/headshots/anneke-tolan.jpg

  - id: osei-vandermeer
    name: Osei Vandermeer
    title: Research Fellow and Convenor, Review Cadence Observatory
    school: School of Continuous Improvement
    bio: >-
      Dr Vandermeer joined the university from operational analytics in the
      logistics sector, where the fifteen-minute dashboard was a working
      condition rather than a research question. His work develops
      closed-loop approaches to organisational performance, harmonising
      sensing, reporting, and response across operational fabrics.
    headshot: canon/headshots/osei-vandermeer.jpg

  - id: petra-umbile
    name: Petra Umbile
    title: Postdoctoral Fellow
    school: School of Emergent Priorities
    bio: >-
      Dr Umbile is a scientometrician by training. Her postdoctoral
      programme examines how research outputs accrue significance — through
      citation flows, indicator schemes, and narrative CVs — and
      what becomes of work that is valued but never counted. She serves on
      the design team of the School's Strategic Drift Survey.
    headshot: canon/headshots/petra-umbile.jpg

  - id: renke-sabel
    name: Renke Sabel
    title: Senior Lecturer
    school: School of Continuous Improvement
    bio: >-
      Dr Sabel joined the university from a background in public-sector
      performance frameworks, where indicators accumulated faster than anyone
      retired them. His research catalogues how an institution's indicators
      persist once adopted, which ones survive contact with a dashboard, and
      why so few are ever formally decommissioned. He contributes to the
      School's work on the Indicator Commons and its wider
      evaluation-ecosystem agenda.
    headshot: canon/headshots/renke-sabel.jpg

  - id: dagny-okafor
    name: Dagny Okafor
    title: Lecturer and Convenor, Evaluation of Evaluation
    school: School of Continuous Improvement
    bio: >-
      Dr Okafor trained as an evaluation methodologist before turning her
      attention to the evaluations themselves — the review panels, meta-audits,
      and quality-assurance cycles that assess how well an institution assesses.
      She convenes the School's Evaluation of Evaluation program, tracing what a
      review of a review actually changes and what it merely re-certifies, with
      a standing interest in the evaluative infrastructure that survives every
      round of streamlining aimed at it.
    headshot: canon/headshots/dagny-okafor.jpg
