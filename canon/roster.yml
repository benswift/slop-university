researchers:
  - id: verity-marris
    name: Verity Marris
    title: Professor and Director, Trajectory Analytics Group
    school: School of Emergent Priorities
    email: verity.marris@slop.university
    bio: >-
      Professor Marris came to the university after two decades across
      government foresight units and sector planning bodies, where she led
      horizon-scanning exercises whose recommendations she now studies the
      afterlives of. Her research asks how priorities emerge, harden into
      commitments, and outlive the conditions that justified them. She
      directs the Trajectory Analytics Group and anchors the university's
      anticipatory-capability agenda.
    headshot: canon/headshots/verity-marris.jpg

  - id: casimir-beng
    name: Casimir Beng
    title: Associate Professor and Lead, Adaptive Metrics Lab
    school: School of Continuous Improvement
    email: casimir.beng@slop.university
    bio: >-
      Trained as a control engineer, Associate Professor Beng spent the early
      part of his career keeping industrial processes inside tolerance before
      turning the same instruments on the institutions that operate them. He
      studies measurement systems that improve the things they measure, with
      a standing interest in what happens when they don't. He leads the
      Adaptive Metrics Lab and convenes the university's cross-cutting work
      on evaluation ecosystems.
    headshot: canon/headshots/casimir-beng.jpg

  - id: anneke-tolan
    name: Anneke Tolan
    title: Senior Research Fellow
    school: School of Emergent Priorities
    email: anneke.tolan@slop.university
    bio: >-
      Dr Tolan is an ethnographer of planning. Her fieldwork embeds with
      strategy units, review panels, and working groups to document how
      foresight is actually practised — the workshops, the templates, the
      quiet negotiations over wording — and how those practices scale from
      pilot settings to whole-of-organisation footprints.
    headshot: canon/headshots/anneke-tolan.jpg

  - id: osei-vandermeer
    name: Osei Vandermeer
    title: Research Fellow and Convenor, Review Cadence Observatory
    school: School of Continuous Improvement
    email: osei.vandermeer@slop.university
    bio: >-
      Dr Vandermeer joined the university from operational analytics in the
      logistics sector, where the fifteen-minute dashboard was a working
      condition rather than a research question. His work develops
      closed-loop approaches to organisational performance, harmonising
      sensing, reporting, and response across operational fabrics.
    headshot: canon/headshots/osei-vandermeer.jpg

  - id: petra-umbile
    name: Petra Umbile
    title: Postdoctoral Fellow
    school: School of Emergent Priorities
    email: petra.umbile@slop.university
    bio: >-
      Dr Umbile is a scientometrician by training. Her postdoctoral
      programme examines how research outputs accrue significance — through
      citation flows, indicator schemes, and narrative CVs — and
      what becomes of work that is valued but never counted. She serves on
      the design team of the School's Strategic Drift Survey.
    headshot: canon/headshots/petra-umbile.jpg

  - id: renke-sabel
    name: Renke Sabel
    title: Senior Lecturer and Convenor, Indicator Commons
    school: School of Continuous Improvement
    email: renke.sabel@slop.university
    bio: >-
      Dr Sabel joined the university from a background in public-sector
      performance frameworks, where indicators accumulated faster than anyone
      retired them. His research catalogues how an institution's indicators
      persist once adopted, which ones survive contact with a dashboard, and
      why so few are ever formally decommissioned. He contributes to the
      School's work on the Indicator Commons and its wider
      evaluation-ecosystem agenda.
    headshot: canon/headshots/renke-sabel.jpg

  - id: dagny-okafor
    name: Dagny Okafor
    title: Lecturer and Convenor, Evaluation of Evaluation
    school: School of Continuous Improvement
    email: dagny.okafor@slop.university
    bio: >-
      Dr Okafor trained as an evaluation methodologist before turning her
      attention to the evaluations themselves — the review panels, meta-audits,
      and quality-assurance cycles that assess how well an institution assesses.
      She convenes the School's Evaluation of Evaluation program, tracing what a
      review of a review actually changes and what it merely re-certifies, with
      a standing interest in the evaluative infrastructure that survives every
      round of streamlining aimed at it.
    headshot: canon/headshots/dagny-okafor.jpg

  - id: ingrid-vasseur
    name: Ingrid Vasseur
    title: Lecturer and Convenor, Futures in Committee
    school: School of Emergent Priorities
    email: ingrid.vasseur@slop.university
    bio: >-
      Dr Vasseur studies how foresight talk becomes committee business ---
      the point where a scanning exercise's open questions are narrowed into
      an agenda item, a recommendation, and a minute. She convenes Futures in
      Committee, the School's seminar series, and is building a comparative
      record of how the same horizon looks from a workshop room versus a
      standing committee.
    headshot: canon/headshots/ingrid-vasseur.jpg

  - id: mirela-hanke
    name: Mirela Hanke
    title: Postdoctoral Fellow
    school: School of Continuous Improvement
    email: mirela.hanke@slop.university
    bio: >-
      Dr Hanke joined the university from a postdoctoral appointment in
      decision-support systems, where she studied how a dashboard shapes the
      choices it is meant only to inform. Her research traces the migration
      of an indicator from measurement instrument to decision proxy, and
      what an institution quietly loses once the proxy is mistaken for the
      goal. She contributes to the School's work on the Living Dashboard and
      its wider evaluation-ecosystem agenda.
    headshot: canon/headshots/mirela-hanke.jpg

  - id: fenna-okoro
    name: Fenna Okoro
    title: Senior Lecturer and Convenor, Horizon Register
    school: School of Emergent Priorities
    email: fenna.okoro@slop.university
    bio: >-
      Dr Okoro joined the University from a research-infrastructure post at a
      national forecasting body, where she maintained a live register of
      anticipated risks long before she started asking who still read its
      older entries. Her work traces how an item in a rolling horizon
      register is drafted, revised, and eventually retired, and what an
      entry's edit history reveals about the institution that logged it. She
      convenes the School's Horizon Register.
    headshot: canon/headshots/fenna-okoro.jpg

  - id: bram-ntuli
    name: Bram Ntuli
    title: Lecturer and Convenor, Improvement Grand Rounds
    school: School of Continuous Improvement
    email: bram.ntuli@slop.university
    bio: >-
      Dr Ntuli joined the University from an operations-research post in the
      resources sector, where a case-review meeting was a fortnightly ritual
      long before it acquired a research agenda of its own. His work studies
      how a standing review format shapes what an institution notices about
      its own performance, and what a rotating cast of presenters quietly
      leaves off the record. He convenes the School's Improvement Grand
      Rounds and contributes to its wider evaluation-ecosystem agenda.
    headshot: canon/headshots/bram-ntuli.jpg

  - id: marek-solheim
    name: Marek Solheim
    title: Lecturer
    school: School of Emergent Priorities
    email: marek.solheim@slop.university
    bio: >-
      A historian of policy by training, Dr Solheim studies what becomes of the
      priorities an institution has stopped pursuing --- the initiatives
      quietly closed out, the commitments left to lapse rather than formally
      retired. His work assembles a comparative record of discontinuation,
      asking who authorises an ending, how it is recorded, and what an
      organisation's archive preserves of the ambitions it has set down. He
      contributes to the School's anticipatory-capability agenda.
    headshot: canon/headshots/marek-solheim.jpg

  - id: joost-nwosu
    name: Joost Nwosu
    title: Postdoctoral Fellow
    school: School of Continuous Improvement
    email: joost.nwosu@slop.university
    bio: >-
      Dr Nwosu joined the University from a benchmarking unit at a
      multi-campus consortium, where a comparison table outlived every one of
      the campuses it was built to compare. His research follows what happens
      to a performance target once it is met --- whether it is retired,
      quietly raised, or kept on as a floor nobody remembers agreeing to. He
      contributes to the School's evaluation-ecosystem agenda, with a standing
      interest in the paperwork a metric leaves behind.
    headshot: canon/headshots/joost-nwosu.jpg

  - id: anouk-mensah
    name: Anouk Mensah
    title: Postdoctoral Fellow
    school: School of Emergent Priorities
    email: anouk.mensah@slop.university
    bio: >-
      Dr Mensah traces how a priority's language outlives the priority itself
      --- the phrase that survives from one planning cycle into the next even
      as the initiative behind it is quietly re-scoped or replaced. Her work
      compares successive strategic and operational plans line by line,
      cataloguing which formulations carry forward unexamined and which are
      revised into meaninglessness. She contributes to the School's
      anticipatory-capability agenda.
    headshot: canon/headshots/anouk-mensah.jpg

  - id: kwame-lindqvist
    name: Kwame Lindqvist
    title: Associate Professor
    school: School of Emergent Priorities
    email: kwame.lindqvist@slop.university
    bio: >-
      Trained in public finance before he turned to the machinery of
      institutional foresight, Associate Professor Lindqvist studies the
      point at which a priority acquires a budget line well before it
      acquires a settled definition. His work traces how funding commitments
      outpace the scoping meant to justify them, and what a priority comes to
      look like once resourcing has already decided its shape. He
      contributes to the Trajectory Analytics Group's work on commitment
      durability.
    headshot: canon/headshots/kwame-lindqvist.jpg

  - id: thandiwe-solberg
    name: Thandiwe Solberg
    title: Senior Lecturer and Convenor, Demo Quarter
    school: School of Continuous Improvement
    email: thandiwe.solberg@slop.university
    bio: >-
      Dr Solberg studies what a quarterly showcase edits out before an
      audience ever sees it — the rehearsal cuts, the metric chosen to stand
      in for the sprint behind it, the version of the work judged fit to
      demonstrate. Her research follows a project from its sprint team
      through to the Demo Quarter stage, tracking how the compressed slot
      reshapes what counts as finished. She convenes Demo Quarter and
      contributes to the School's evaluation-ecosystem agenda.
    headshot: canon/headshots/thandiwe-solberg.jpg

  - id: lindiwe-achterberg
    name: Lindiwe Achterberg
    title: Lecturer
    school: School of Emergent Priorities
    email: lindiwe.achterberg@slop.university
    bio: >-
      Dr Achterberg evaluated pilot schemes for a state innovation agency
      before joining the University, where she began asking why so few of
      them ever concluded. Her research follows initiatives that remain in
      trial status year after year, tracking the extension memos,
      re-scoping exercises, and renewed provisional budgets that let a
      program stay unofficially permanent without ever being confirmed as
      such. She contributes to the School's anticipatory-capability agenda.
    headshot: canon/headshots/lindiwe-achterberg.jpg

  - id: sten-okwuosa
    name: Sten Okwuosa
    title: Senior Research Fellow and Convenor, Impact Pathway Atlas
    school: School of Continuous Improvement
    email: sten.okwuosa@slop.university
    bio: >-
      Dr Okwuosa trained in bibliometrics before turning to the pathways a
      finding travels after publication --- the citation that arrives late,
      the narrative CV that recasts an old result for a new panel, the
      recognition that lands on different work than the one that earned it.
      He convenes the School's Impact Pathway Atlas, tracing how research
      effort becomes counted impact and where the map and the territory come
      apart.
    headshot: canon/headshots/sten-okwuosa.jpg

  - id: iben-chikere
    name: Iben Chikere
    title: Lecturer
    school: School of Emergent Priorities
    email: iben.chikere@slop.university
    bio: >-
      Dr Chikere studies what a handover document keeps of a role once its
      occupant moves on --- the priorities restated for a successor, the ones
      quietly left off the page, and the paraphrase that drifts a little
      further from the original brief with each transition. She is
      assembling a comparative archive of handover notes from across the
      University's schools and programs, tracking how a stated rationale
      survives, or doesn't, the change of hands. She contributes to the
      School's anticipatory-capability agenda.
    headshot: canon/headshots/iben-chikere.jpg

  - id: solveig-adeyemi
    name: Solveig Adeyemi
    title: Lecturer
    school: School of Continuous Improvement
    email: solveig.adeyemi@slop.university
    bio: >-
      Dr Adeyemi joined the University from a frontline incident-reporting
      system in the emergency-services sector, where she noticed how few
      reports ever became agenda items. Her research follows a report from
      its first submission through escalation, triage, and closure, tracking
      which details survive each handoff and which are quietly dropped
      before a report ever reaches a decision-maker. She contributes to the
      School's evaluation-ecosystem agenda, with a standing interest in the
      incidents that never make it onto a register at all.
    headshot: canon/headshots/solveig-adeyemi.jpg

  - id: runa-adegoke
    name: Runa Adegoke
    title: Senior Lecturer and Convenor, Strategic Drift Survey
    school: School of Emergent Priorities
    email: runa.adegoke@slop.university
    bio: >-
      Dr Adegoke joined the University from a policy-evaluation unit in state
      government, where she noticed how long a briefing document kept its
      language after the practice it described had moved on. Her research
      measures the distance between an institution's stated priorities and
      what its everyday operations actually enact, treating the gap itself as
      data rather than a lapse to correct. She convenes the School's Strategic
      Drift Survey, the annual instrument that puts a number on that distance.
    headshot: canon/headshots/runa-adegoke.jpg

  - id: marit-osayande
    name: Marit Osayande
    title: Lecturer and Convenor, Living Dashboard
    school: School of Continuous Improvement
    email: marit.osayande@slop.university
    bio: >-
      Dr Osayande joined the University from a facilities-operations role at a
      transit authority, where an always-on status board ran for years without
      anyone formally assigned to read it. Her research follows a live
      dashboard's screens from installation through neglect, asking what
      upkeep a self-measurement wall actually receives once its novelty passes
      and who, if anyone, notices when a feed goes quietly stale. She convenes
      the School's Living Dashboard and contributes to its wider
      evaluation-ecosystem agenda.
    headshot: canon/headshots/marit-osayande.jpg

  - id: ronja-oyelaran
    name: Ronja Oyelaran
    title: Senior Lecturer
    school: School of Emergent Priorities
    email: ronja.oyelaran@slop.university
    bio: >-
      Dr Oyelaran spent five years advising stakeholder-engagement processes
      for a state planning authority before turning her attention to what a
      consultation exercise actually consults on. Her research traces how an
      already-settled priority acquires a submissions period, a survey, and a
      summary-of-feedback report before proceeding exactly as scoped, and what
      a consultation record shows once nobody rereads it. She contributes to
      the School's anticipatory-capability agenda.
    headshot: canon/headshots/ronja-oyelaran.jpg

  - id: ingeborg-nwachukwu
    name: Ingeborg Nwachukwu
    title: Lecturer and Convenor, Capability Sprints
    school: School of Continuous Improvement
    email: ingeborg.nwachukwu@slop.university
    bio: >-
      Dr Nwachukwu joined the University from a workplace-training
      consultancy, where she wrote the assessment rubric for a leadership
      short course and then went looking for who still used it six months
      on. Her research follows a Capability Sprint cohort past graduation,
      tracking which habits survive the return to an ordinary desk and which
      quietly lapse once the certificate is filed. She convenes the School's
      Capability Sprints program and contributes to its wider
      evaluation-ecosystem agenda.
    headshot: canon/headshots/ingeborg-nwachukwu.jpg
