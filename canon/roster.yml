# The persistent researcher roster of Slop University.
#
# Every generated artefact, press release, and site profile page names ONLY
# these researchers --- never a real person, never a name invented inside a
# run. To add a researcher: run a name-collision check first (web search for
# the full name; include the ANU staff directory --- the nearest institution
# is the likeliest collision; no ANU staff member or notable
# researcher/public figure may share the name), generate a house-style
# headshot per skills/_shared/visual-style.md into canon/headshots/ and a
# landscape person hero into canon/heroes/people/, eyeball both for
# accidental real-person likeness, then add the entry here.
#
# Every researcher has an email: the entry id with its hyphen(s) replaced by
# dots, at slop.university (verity-marris -> verity.marris@slop.university).
# The domain's catch-all makes every such address real and deliverable, so
# papers and posters list them as genuine contact furniture; never invent an
# address in any other shape, and never a personal-domain or external one.
