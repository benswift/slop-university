name: Redrafting the School Newsletter's Term-Ahead Column Before the Copy-Paste Sets In
scheme: anticipatory-capability-fund
date: 2026-07-22
grantees:
  - Anneke Tolan
  - Anouk Mensah
value: 196742
summary: >-
  Funds a redraft protocol for a primary school parent committee's newsletter:
  before each term's edition goes to print, the committee rewrites its "term
  ahead" column against what is actually planned, with every phrase carried
  forward from the previous edition logged against the plan it was meant to
  describe.
