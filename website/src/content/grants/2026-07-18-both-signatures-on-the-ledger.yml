name: Formalising the Handover of a Neighbourhood Tool Library's Loan Ledger
scheme: indicator-stewardship-seed-fund
date: 2026-07-18
grantees:
  - Osei Vandermeer
  - Mirela Hanke
value: 71238
summary: >-
  Funds a witnessed handover protocol for a neighbourhood tool library's
  paper loan ledger: a photographed condition record for every tool in
  circulation, and a standing rule that no loan entry closes until both
  the outgoing and incoming volunteer coordinators have signed it.
