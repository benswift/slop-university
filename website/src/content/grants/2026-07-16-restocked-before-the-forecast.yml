name: Retiming the Oval's Sunscreen Restock From the Empty Bottle to the Forecast
scheme: anticipatory-capability-fund
date: 2026-07-16
grantees:
  - Fenna Okoro
  - Verity Marris
value: 132916
summary: >-
  Funds a heat-advisory-triggered restocking protocol for the Oval's
  sunscreen dispensers, moving the refill trigger from an empty-bottle
  report filed after the fact to a next-day heat forecast, with a
  readiness dashboard logging the gap between forecast and refill.
