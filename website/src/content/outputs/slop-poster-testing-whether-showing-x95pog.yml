title: Shown the Score, Still No-Show
subtitle: An Eight-Week Trial of a Community Tennis-Court Booking App's Live
  Slot-Reliability Score
authors:
  - Marit Osayande
  - Solveig Adeyemi
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-20
doi: 10.5555/slop.x95pog
summary: A research poster from the School of Continuous Improvement reports an
  eight-week field trial across 14 public tennis courts testing whether a
  live reliability score changes who no-shows a booked slot. No-show rates
  held steady regardless of whether the score was shown, but the median time
  to reclaim a freed slot fell by two-thirds at score-displayed courts.
topic: testing whether showing a community tennis court's own live no-show-risk
  score to waiting players actually reduces no-shows, or just changes who
  queues for a freed-up slot
