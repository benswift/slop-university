title: Agreed Until It Mattered
subtitle: >-
  A Season-Long Comparator Audit of a Cheap Sensor Rig Against a Ten-Pin
  Bowling Alley's Proprietary Lane-Scoring and Foul-Detection System, and
  Whose Calls the League's Rules Committee Believes
authors:
  - Casimir Beng
  - Osei Vandermeer
  - Renke Sabel
preset: paper
school: School of Continuous Improvement
date: 2026-07-20
doi: 10.5555/slop.m0pulh
summary: >-
  A paper from the School of Continuous Improvement builds a cheap sensor
  comparator rig and runs it alongside a ten-pin bowling alley's proprietary
  lane-scoring and foul-detection system for a full league season, finding
  near-perfect agreement on routine frames but only fair agreement on
  disputed ones. An independent video review finds the comparator's and the
  incumbent's disputed-frame calls about equally accurate, yet the league's
  rules committee upholds the incumbent's original call in 91% of formal
  disputes.
topic: >-
  building a cheap sensor-based comparator rig for a ten-pin bowling alley's
  lane-scoring and foul-detection system, and auditing how closely its calls
  match the incumbent proprietary system's disputed frames across a full
  league season
pdf: /outputs/pdf/slop-paper-building-a-cheap-m0pulh.pdf
pages: 6
