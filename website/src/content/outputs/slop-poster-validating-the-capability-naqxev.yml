title: "Reclassified, Not Reconciled"
subtitle: "What the Capability Sprints' Capacity Reconciliation Index Actually Tracks"
authors:
  - Renke Sabel
  - Bram Ntuli
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-09
doi: 10.5555/slop.naqxev
summary: >-
  An audit of eight intake cycles across the Capability Sprints' five short
  courses cross-reads the program's new Capacity Reconciliation Index against
  enrolment-classification logs, finding the Index's climb toward its
  published target tracks a rising share of commencing places coded
  "returning" rather than any change in the seats each Sprint actually
  offered.
topic: >-
  validating the Capability Sprints program's new Capacity Reconciliation
  Index --- introduced to satisfy an intake cap and a growth target at once
  --- against actual seat availability, and finding the index tracks how
  commencing enrolments get reclassified between 'new' and 'returning' far
  more than it tracks how many seats the program can actually run
