title: "The Sign Changed Nothing"
subtitle: "An Audit of Dispute Rates Across a Pub-Trivia Circuit's Laminated \"Phones Away\" Honour Policy"
authors:
  - Fenna Okoro
  - Solveig Adeyemi
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-19
doi: 10.5555/slop.6ag6g7
summary: >-
  A research poster from the School of Emergent Priorities tracks
  disputed-answer rates across a 16-week pub-trivia season, comparing 58
  venues before and after each adopts a laminated "phones away" honour
  sign. Dispute rates hold flat regardless of sign presence, while the
  circuit's own self-reported compliance survey moves independently of the
  dispute log it is meant to track.
topic: >-
  surveying quizmasters across a pub-trivia circuit on whether the
  laminated 'phones away' honour sign changes dispute rates at all, or just
  gives the circuit's own compliance survey something to keep measuring
  each season regardless of the null result
