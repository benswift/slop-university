title: "The Arrow Outlasts the Order"
subtitle: "A Survival Analysis of Temporary Floor-Marking Wayfinding on a Suburban Shopping Strip"
authors:
  - Verity Marris
  - Marek Solheim
  - Lindiwe Achterberg
preset: paper
school: School of Emergent Priorities
date: 2026-07-17
doi: 10.5555/slop.ic6zdv
summary: >-
  A paper from the School of Emergent Priorities surveys 41 taped
  floor-arrow detours across nine shopping strips over eighteen months,
  finding a works order's own removal deadline has no bearing on how long
  a marking survives, and that most removals happen only when unrelated
  roadworks return to the same stretch of footpath.
topic: >-
  floor arrows taped down for a footpath resurfacing job outlive the job
  itself, and nobody on the shopping strip can say who'd need to peel them
  up
