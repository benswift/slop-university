title: The Ticket Doesn't End the Argument
subtitle: A Field Taxonomy of Paper, App, and No-System Deli-Counter Queues
authors: [Bram Ntuli, Thandiwe Solberg]
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-17
doi: 10.5555/slop.n8c0ot
summary: >-
  A research poster from the School of Continuous Improvement classifies 612
  queue-jumping disputes logged across thirty-four deli and butcher counters
  running a paper-ticket dispenser, an app-based virtual queue, or no formal
  system. At-counter confrontations fall sharply under both formal systems,
  but disputes at the dispenser or in the app rise to compensate, leaving
  total dispute incidence statistically indistinguishable across all three
  regimes.
topic: >-
  classifying deli-counter queue systems, paper tickets, an app queue, or no
  system at all, by which style relocates queue-jumping disputes rather than
  resolving them
