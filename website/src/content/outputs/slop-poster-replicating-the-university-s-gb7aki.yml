title: "The Printer Queue Doesn't Follow"
subtitle: "A Failed Replication of the Coffee-Cart Leading Indicator"
authors:
  - Petra Umbile
  - Marek Solheim
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-10
doi: 10.5555/slop.gb7aki
summary: >-
  A poster from the School of Emergent Priorities repeats the University's
  celebrated coffee-cart leading-indicator design on a second monitored
  queue, and finds no comparable signal at any lag. A parallel reanalysis
  that removes shared term-time seasonality from the original coffee-cart
  series lowers its own headline correlation from r = 0.78 to a
  non-significant r = 0.14.
topic: >-
  replicating the university's celebrated coffee-cart queue-length
  leading-indicator finding on the printer queue instead, and re-testing
  whether the original claim survives once shared term-time seasonality is
  stripped out of both series
