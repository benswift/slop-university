title: "Cancelled, Not Retired"
subtitle: "Does a Rising Cancellation Rate Anticipate a Service's End?"
authors:
  - Marek Solheim
  - Anouk Mensah
  - Verity Marris
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-12
doi: 10.5555/slop.gz0g6t
summary: >-
  A retrospective poster sets eighteen months of cancellation logs from the
  library's print-credit auto-top-up subscription against the final eighteen
  months of four retired campus subscription-style services. Cumulative
  cancellations reached 34% of active subscribers, inside the 30-35% band at
  which three of the four comparator services were discontinued, while
  Digital Services' self-service-resolution tag logged every cancellation
  the same way it logs a completed top-up.
topic: >-
  Testing whether a rising cancellation rate on the library's print-credit
  auto-top-up subscription functions as an early retirement signal for the
  service, or whether Digital Services' self-service-resolution metric just
  files every cancel click as a win and mutes the signal.
