title: "Flagged, Then Funded"
subtitle: "Validating the Horizon Register's Early-Warning Alerts Against What a Priority Actually Receives"
authors:
  - Verity Marris
  - Petra Umbile
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-07
doi: 10.5555/slop.4wzjf0
summary: >-
  A validation study testing whether the Horizon Register's automated alert
  threshold predicts which of 84 flagged priorities are subsequently
  resourced. Update-volume percentile predicts the outcome with
  moderate-to-strong reliability (AUC = 0.81) while novelty percentile
  performs little above chance (AUC = 0.58), suggesting the threshold tracks a
  unit's reporting behaviour more reliably than the priority it is meant to
  detect.
topic: validating whether the Horizon Register's automated early-warning alerts predict which flagged priorities actually get resourced, and finding the strongest predictor is how many status updates a unit files, not how novel the flagged priority is
