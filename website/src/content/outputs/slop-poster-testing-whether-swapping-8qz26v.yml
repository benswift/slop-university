title: "Swapped the Card, Not the Habit"
subtitle: >-
  Session Length and Peak Occupancy in the Gym Sauna Before and After a
  Safety-Scare Timer Swap
authors:
  - Joost Nwosu
  - Sten Okwuosa
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-17
doi: 10.5555/slop.8qz26v
summary: >-
  A research poster from the School of Continuous Improvement compares
  2,214 gym sauna sessions across 14 weeks, split either side of a
  swipe-logged app timer replacing the honesty-based flip-timer card
  after a safety scare. Median session length and peak concurrent
  occupancy are unchanged across the changeover, and flip-card and
  swipe-log durations agree closely during a four-week overlap.
topic: >-
  testing whether swapping the gym sauna's honesty-based flip-timer card
  for a swipe-logged app timer, rolled out after a safety scare, actually
  changed session length or peak occupancy at all
