title: What the Tally Never Asked
subtitle: >-
  An Interview Study of How Playground Supervisors Notice a Lonely Child,
  Against What a Buddy-Bench Uptake Count Reports
authors:
  - Dagny Okafor
  - Ingeborg Nwachukwu
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-22
doi: 10.5555/slop.nuuzxk
summary: >-
  A research poster from the School of Continuous Improvement interviews 48
  playground supervisors across nineteen primary schools on what actually
  tips them off that a child needs company at recess, comparing eleven
  schools that keep a formal buddy-bench uptake tally against eight that
  don't. Supervisors at tally-keeping schools name the tally itself as their
  trigger in under one coded transcript in ten, while their own unprompted
  observation leads both groups almost identically regardless of whether a
  tally is kept at all.
topic: >-
  interviewing playground supervisors on how a buddy-bench uptake count
  enters their end-of-term inclusion report, against what they say actually
  tips them off that a child is lonely
