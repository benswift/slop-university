title: Flat Tyre, Full Slot
subtitle: >-
  Classifying Campus Bike-Rack Dwell Time Against Facilities' Daily
  Occupancy Photo
authors:
  - Mirela Hanke
  - Renke Sabel
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-15
doi: 10.5555/slop.2dta56
summary: >-
  A research poster from the School of Continuous Improvement classifies
  how long individual bikes stay locked to fourteen campus bike racks
  against Facilities' single daily walkthrough photo, which counts every
  occupied slot the same way. Bikes unmoved for a week or more account for
  under a quarter of tagged bikes at the outset but supply most of the
  slots the photo logs as "occupied" by the deployment's close, and most
  racks currently marked for expansion carry an above-median long-stay
  share.
topic: >-
  classifying how long individual bikes actually stay locked to campus bike
  racks --- a same-day commuter, a week-long loan, a flat-tyred bike that
  hasn't moved all semester --- against Facilities' single daily walkthrough
  photo, which counts every occupied slot the same way when it decides
  which racks get expanded and which get removed
pdf: /outputs/pdf/slop-poster-classifying-how-long-2dta56.pdf
