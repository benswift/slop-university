title: "First Referral, Last Complaint"
subtitle: >-
  A Matched-Groups Comparison of Early Silent-Study-Pod Referral Against
  Verbal-Warning-Only Response in Closing a Student's First Noise-Complaint
  Record
authors:
  - Kwame Lindqvist
  - Anouk Mensah
preset: paper
school: School of Emergent Priorities
date: 2026-07-14
doi: 10.5555/slop.fkv8do
summary: >-
  A paper from the School of Emergent Priorities matches 348 students' first
  library noise complaints into 174 pairs on venue, time of day, and
  severity, comparing an informal silent-study-pod referral against a
  verbal-warning-only response from the duty librarian rostered at the
  time. The referral arm's complaint record closes within twelve weeks at a
  substantially higher rate than the warning-only arm's (75.9% against
  56.9%), and reopened files in the referral arm take longer to reopen; the
  effect holds regardless of whether the referring librarian is senior or
  junior staff.
topic: >-
  testing whether an early, informal referral to the library's silent-study
  pod, issued the first time a noise complaint is logged against a student,
  forecasts whether that student's complaint record actually closes out,
  compared against a matched group of equally-complained-about students who
  were only ever issued a verbal warning
