title: The Note Under the Keypad
subtitle: >-
  A Field Deployment of Automated Rotation Reminders for Shared-House Door
  Codes
authors:
  - Renke Sabel
  - Marit Osayande
  - Joost Nwosu
preset: paper
school: School of Continuous Improvement
date: 2026-07-23
doi: 10.5555/slop.l3fxz8
summary: >-
  A paper from the School of Continuous Improvement deploys a lightweight
  code-rotation reminder tool across 42 share houses and finds no measurable
  difference from the cooperative's standard paper notice in how quickly a
  rotated door code turns up as informal written notation near the keypad. A
  notification-frequency ablation rules out an under-powered nudge as the
  explanation: doubling how often residents were reminded moved the outcome
  by hours, not days.
topic: >-
  deploying a lightweight code-rotation reminder tool across a cluster of
  share houses and tracking how quickly the new code still ends up on a
  sticky note by the keypad
