title: "Topped Up, Not Touched"
subtitle: "An Instrument-Validation Study of Hand-Sanitiser Dispenser Refill Logs Against Covert Dispense Counts"
authors:
  - Anouk Mensah
  - Bram Ntuli
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-12
doi: 10.5555/slop.zj8ph6
summary: >-
  A poster from the School of Emergent Priorities and the School of
  Continuous Improvement fits twenty-four campus hand-sanitiser dispensers
  with covert internal-actuation counters and compares fourteen weeks of
  covert usage data against Facilities' existing refill log and
  building-level hygiene-compliance score. The two measures show only a weak
  association across the six buildings audited, and neither tracks
  illness-related absence reliably.
topic: >-
  testing whether restocking frequency at hand-sanitiser dispensers, which
  Facilities reads as a hygiene-compliance signal, tracks anything about a
  building's actual illness-related absence
