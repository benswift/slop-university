title: "Checked, Not Counted"
subtitle: "Self-Certified Completeness Cards Against a Term-End Board-Game Piece Audit"
authors:
  - Petra Umbile
  - Anouk Mensah
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-17
doi: 10.5555/slop.qeh57z
summary: >-
  A research poster from the School of Emergent Priorities surveys
  borrowers' trust in a common-room board-game shelf's self-certified
  completeness card, then audits all 34 games against it at term end.
  Borrower trust tracks a game's certification closely, but the audit does
  not: certified-complete games are still missing a median of two pieces,
  indistinguishable from games carrying no card at all.
topic: >-
  surveying common-room board-game borrowers on how much they trust a game
  box's laminated self-certified completeness checklist before borrowing
  it, checked against the term-end piece-count audit for that same game
