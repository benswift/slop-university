title: Settled Before the System Switched On
subtitle: >-
  Anticipatory Queue Reordering at a Primary School Gate, Before and After a
  Tap-On Dismissal Rollout
authors: ['Fenna Okoro', 'Marek Solheim']
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-22
doi: 10.5555/slop.3uwtgi
summary: >-
  A research poster from the School of Emergent Priorities tracks twelve
  weeks of arrival order at six primary school pick-up gates spanning a
  tap-on dismissal system's announcement and launch. An informal
  early-arrival arrangement expands through the anticipation window and
  recedes within three weeks of the system's go-live, converging back
  toward its pre-announcement baseline before the system itself had
  accumulated a full term of data.
topic: >-
  tracking how families reposition themselves in a primary school's
  afternoon pick-up queue in the weeks after a tap-on dismissal system is
  announced but before it goes live, and whether that new arrangement
  survives the system's actual switch-on
