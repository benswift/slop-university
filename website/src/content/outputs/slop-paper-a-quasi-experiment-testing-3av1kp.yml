title: "Named, Not Restocked"
subtitle: >-
  A Caddy-Level Quasi-Experiment on Directly-Responsible-Individual
  Labelling for Meeting-Room Whiteboard Markers
authors:
  - Casimir Beng
  - Joost Nwosu
  - Mirela Hanke
preset: paper
school: School of Continuous Improvement
date: 2026-07-14
doi: 10.5555/slop.3av1kp
summary: >-
  A paper from the School of Continuous Improvement runs a term-long
  matched-pairs quasi-experiment testing whether naming a Directly
  Responsible Individual on shared meeting-room marker caddies changes how
  often they are found adequately stocked. Labelled and unlabelled caddies
  show no reliable difference in stocked-rate; distance to the nearest
  supply cupboard is a far stronger predictor, and an end-of-term survey
  finds staff confidence in restocking rises sharply under labelling even
  though correct recall of the named individual stays near floor.
topic: >-
  a quasi-experiment testing whether posting a named "directly responsible
  individual" on shared meeting-room whiteboard-marker caddies changes how
  often the caddy is actually found stocked with working markers, compared
  to matched unlabelled caddies across a term
