title: "Read Right, Logged Wrong"
subtitle: "What Happens After a Lift-Lobby Plaque Misread Is Flagged"
authors:
  - Lindiwe Achterberg
  - Sten Okwuosa
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-12
doi: 10.5555/slop.wqwlwh
summary: >-
  A poster from the School of Emergent Priorities logs anomaly flags from
  the scanner behind eight refreshed lift-lobby floor plaques and
  interviews the Facilities staff who triage them, finding most flagged
  misreads are logged rather than corrected in the published
  floor-traffic tally, with the uncorrected share rising across a
  ten-week window.
topic: >-
  testing whether Facilities' new human-legible wayfinding font on
  lift-lobby floor plaques broke the space-utilisation scanner that reads
  the same plaques to log floor traffic
