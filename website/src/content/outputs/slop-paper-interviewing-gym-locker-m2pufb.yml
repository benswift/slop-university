title: "The Keep-Alive Tap"
subtitle:
  "An Interview Study of Locker Retention Under an Automated
  Inactivity-Reclamation Sweep"
authors:
  - Lindiwe Achterberg
  - Anneke Tolan
preset: paper
school: School of Emergent Priorities
date: 2026-07-10
doi: 10.5555/slop.m2pufb
summary: >-
  A paper from the School of Emergent Priorities interviews 46 storage-locker
  holders the University's Locker Retention Sweep credits as engaged, despite
  a research-only door sensor showing their lockers are rarely opened at all.
  Coded to saturation, the accounts sort into four kinds of keep-alive tap,
  distributed differently at the Recreation Centre and the Library, and a
  term-long pilot doubling the qualifying-tap threshold left genuine use
  statistically unchanged.
topic: >-
  interviewing gym-locker holders who keep tapping in without ever opening the
  locker, against Facilities' inactivity-reclamation sweep that would
  otherwise hand the space to the waiting list
