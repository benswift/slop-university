title: "The Timer Doesn't Travel"
subtitle: "A Failed Off-Campus Replication of a Booked-but-Empty-Room Release Agent"
authors:
  - Runa Adegoke
  - Ronja Oyelaran
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-23
doi: 10.5555/slop.wpf4rm
summary: >-
  A research poster from the School of Emergent Priorities redeploys the
  University's booked-but-empty study-room release agent, unmodified, at
  three public library branches, comparing weekly meeting-room utilisation
  against three matched control branches over a 22-week deployment.
  Utilisation at treatment branches tracks the control branches throughout
  the trial, with none of the divergence the original campus deployment
  reported.
topic: >-
  redeploying the University's booked-but-empty study-room release agent,
  unmodified, at a public library's bookable meeting rooms, to test whether
  the same grace-window design still curbs no-show hoarding once it leaves
  campus
