title: "Stopped, Not Scanned"
subtitle: >-
  Interviewing Campus Life Staff and Passers-by on What the Sculpture
  Trail's QR-Plaque Count Was Assumed to Measure
authors:
  - Petra Umbile
  - Ingrid Vasseur
preset: paper
school: School of Emergent Priorities
date: 2026-07-16
doi: 10.5555/slop.xiihn7
summary: >-
  A paper from the School of Emergent Priorities interviews nine Campus Life
  staff and 118 passers-by intercepted at the outdoor sculpture trail's
  seven QR-plaque stops, cross-referencing nine weeks of the plaques' own
  scan logs against independently observed stop-and-look events. Logged
  scan volume shows no reliable rank relationship to observed attention
  (Spearman's rho = -0.04), and the stop nearest the express-bus shelter
  records the trail's highest scan count alongside its lowest rate of
  passers-by actually stopping to look --- the scan count Campus Life cites
  in its cultural-precinct funding case tracks the bus timetable at least as
  well as it tracks the trail.
topic: >-
  interviewing Campus Life staff and passers-by about what the sculpture
