title: "Reading the Panel, Not the Practice"
subtitle: "A Mid-Cycle Interview Study of Signal-Learning During the School of Continuous Improvement's Own Review Cycle"
authors:
  - Casimir Beng
  - Anneke Tolan
preset: paper
school: School of Continuous Improvement
date: 2026-07-07
doi: 10.5555/slop.62tny0
summary: >-
  A three-wave interview study followed School of Continuous Improvement staff
  through its own internal practice-review cycle, coding conversations for
  language that mirrors the review's published rubric against self-reported
  change to the practice under review. Panel-legible signal language rose from
  18% to 79% of transcripts between the cycle's opening and midpoint, while
  self-reported practice change moved only from 21% to 25% over the same
  interval, a gap that held regardless of interview mode.
topic: interviewing staff partway through the School of Continuous Improvement's own performance-review cycle, to see whether they learn to produce the signals a review panel is trained to notice before anything about their actual practice changes
