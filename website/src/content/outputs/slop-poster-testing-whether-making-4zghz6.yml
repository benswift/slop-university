title: "Public Eyes, Private Pace"
subtitle: "Remediation Timing Shows No Gap Between the Living Dashboard's Public and Internal-Only Displays"
authors:
  - Mirela Hanke
  - Renke Sabel
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-09
doi: 10.5555/slop.4zghz6
summary: >-
  A comparative study of the Living Dashboard's public and internal-only
  remediation-status tiles, tracking time-to-fix across three severity tiers
  to test whether visibility itself changes the pace of a response, and
  finding the two conditions close issues on statistically indistinguishable
  schedules.
topic: >-
  testing whether making the Living Dashboard's remediation-status tile
  publicly visible closes flagged issues any faster than keeping the
  identical tile internal-only, and finding no measurable difference between
  the two conditions
