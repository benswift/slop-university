title: "Met on Time, Reported by No One"
subtitle: "An Interview Study of Who Staff, Students, and Floor Marshals Believe Is Responsible for Reporting the University's Only Escalator When It Stops"
authors:
  - Dagny Okafor
  - Bram Ntuli
  - Renke Sabel
preset: paper
school: School of Continuous Improvement
date: 2026-07-13
doi: 10.5555/slop.hfz29u
summary: >-
  A paper from the School of Continuous Improvement reports a 48-person
  semi-structured interview study of who students, staff, and the
  University's own floor marshals believe is responsible for reporting the
  University's only escalator when it stalls, three years after the
  reporting duty was folded into the floor-marshal appointment without being
  reissued. Fewer than one respondent in twenty names a marshal correctly,
  including among marshals themselves, while Facilities' service standard is
  met in full across three years of logged stoppages by the maintenance
  contractor's own remote-monitoring account.
topic: >-
  interviewing staff, students, and floor marshals about who is responsible
  for reporting the University's only escalator when it stops, three years
  after the reporting duty was folded into a rotating floor-marshal
  appointment nobody has reissued
