title: Patched by Phone Call, Not by Score
subtitle: Interviewing council road crews on how they actually sequence pothole repairs
authors:
  - Ronja Oyelaran
  - Mirela Hanke
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-20
doi: 10.5555/slop.7hfxvw
summary: >-
  A research poster from the School of Emergent Priorities interviews 34
  road-maintenance crew members across nine councils, finding that
  compliance with a pothole-repair app's predicted-deterioration ranking
  fell from 78% to 34% of weekly patch jobs across one wet season as crews
  substituted their own cues for the app's rank.
topic: >-
  interviewing council road-maintenance crews about which reported potholes
  they patch first, against the reporting app's predicted-deterioration
  priority score used to forecast next quarter's resurfacing schedule
