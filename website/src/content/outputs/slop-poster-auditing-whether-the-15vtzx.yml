title: Pressed, Not Wired
subtitle: Auditing the Learning Commons Crossing Button Against a Term of Logged Signal-Phase Changes
authors:
  - Ingrid Vasseur
  - Renke Sabel
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-13
doi: 10.5555/slop.15vtzx
summary: >-
  A poster from the School of Emergent Priorities logs fourteen weeks of
  presses at the Learning Commons pedestrian-crossing button against the
  signal controller's own phase-change transitions, finding no meaningful
  association between the two even as the Traffic Advisory Committee's case
  for a second crossing continues to cite the button's annual press count as
  pedestrian demand.
topic: >-
  auditing whether the pedestrian-crossing button outside the Learning
  Commons is wired to anything at all, against a term of independently
  logged signal-phase changes, while the Traffic Advisory Committee's case
  for a second crossing keeps citing the button's annual press count as
  pedestrian demand
