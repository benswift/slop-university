title: "The Sign-Off Outran the Reading"
subtitle: >-
  The 2026-2031 Strategic Plan Names an Accountable Reviewer for Every
  AI-Assisted Decision, Then Builds a Tool to Help Them Sign Faster
authors:
  - Iben Chikere
  - Bram Ntuli
preset: strategy
school: School of Emergent Priorities
date: 2026-07-18
doi: 10.5555/slop.d2jro8
summary: >-
  Slop University's Strategic Plan 2026-2031 commits the institution to a
  named, dated human sign-off before any AI-assisted recommendation affecting
  a student, staff member, or applicant takes effect, and to growing reviewer
  capacity and public reporting in step with the volume of such decisions,
  including an independent audit of whether attestation depth is keeping
  pace with growth.
topic: >-
  scale named human sign-off to every AI-assisted institutional decision, and
  keep that oversight meaningful as the volume of decisions grows well past
  what any reviewer can actually read
