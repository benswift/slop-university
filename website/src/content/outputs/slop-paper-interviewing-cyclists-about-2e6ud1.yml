title: "Sited, Not Chosen"
subtitle: "Interviewing Cyclists at the Bike-Rack Bank the Horizon Register Predicted and the One They Actually Fill"
authors:
  - Fenna Okoro
  - Anneke Tolan
preset: paper
school: School of Emergent Priorities
date: 2026-07-13
doi: 10.5555/slop.2e6ud1
summary: >-
  A paper from the School of Emergent Priorities evaluates a Horizon
  Register siting recommendation against a 12-week term of bike-rack
  occupancy counts and 42 cyclist interviews. The forecast-sited West Wing
  bank averaged 22% occupancy against an existing, unforecast Library
  bank's 115%; the Register's precinct-demand index correlates weakly with
  realised occupancy (r = 0.34, unchanged by an ablation removing its
  trend term), while a post-hoc measure of walking distance to cyclists'
  stated destinations correlates far more strongly (r = 0.79).
topic: >-
  interviewing cyclists about why they park where they do, after the
  Horizon Register's bike-commuting forecast sited a new covered rack bank
  that a term later sits mostly empty while an unforecast one nearby runs
  over capacity
