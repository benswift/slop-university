title: "Narrow Enough to Trust"
subtitle: "Corpus Access and Reported Trust Across the University's AI Reference-Assistant Deployments"
authors:
  - Casimir Beng
  - Renke Sabel
preset: paper
school: School of Continuous Improvement
date: 2026-07-08
doi: 10.5555/slop.6rwku5
summary: >-
  An audit of nine of the University's internal AI reference-assistant
  deployments pairs a technical measurement of each deployment's configured
  document-access scope against a staff trust survey and an independently
  scored accuracy benchmark. Reported trust tracks how narrow a slice of its
  own unit's archive a deployment is permitted to search far more reliably
  than it tracks how often the deployment is actually correct; showing staff
  a deployment's own accuracy score before asking them to rate it does not
  meaningfully change the pattern.
topic: ranking internal AI reference-assistant deployments by how much staff trust them, and finding trust tracks how little of the unit's own archive each assistant is permitted to search, not how accurate its answers are
