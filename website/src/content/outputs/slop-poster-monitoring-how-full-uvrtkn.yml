title: Full by Day Nine, Collected on Day Fourteen
subtitle: A Three-Year Bin-Sensor Pilot the Collection Calendar Has Never Once Consulted
authors:
  - Lindiwe Achterberg
  - Kwame Lindqvist
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-15
doi: 10.5555/slop.uvrtkn
summary: >-
  A poster from the School of Emergent Priorities tests a pilot fill-level
  sensor on fourteen confidential-waste bins against Facilities' fixed
  fortnightly collection schedule. Across thirty-two sampled cycles, fill
  level tracks the preceding week's photocopier print volume closely (r =
  0.74); the collection interval has not changed once in three years, and
  six successive capital-works submissions continue to record the sensor as
  a live pilot.
topic: >-
  monitoring how full confidential-waste bins get between photocopier print
  runs to test whether Facilities' fixed fortnightly shredding-truck
  schedule matches actual demand
