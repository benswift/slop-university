title: "Filed as New"
subtitle:
  "Validating the Role-Continuity Classifier Against an Independent Archivist
  Read"
authors:
  - Marek Solheim
  - Mirela Hanke
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-09
doi: 10.5555/slop.odkzun
summary: >-
  A validation study of the Role-Continuity Classifier, the rule deciding
  whether a reinstated post carries its service history forward or opens a
  fresh record, against a blind three-archivist panel reading the same 96
  personnel files. Agreement was moderate overall and collapsed almost
  entirely within one role family: of 31 invigilation and proctoring posts,
  the Classifier filed 26 as new appointments where the panel read continuity
  in 22, a split tracking whether the original discontinuation was ever
  minuted rather than how long the post stood vacant.
topic: >-
  validating the Role-Continuity Rubric that decides whether a reinstated post
  --- like the in-person exam invigilators several schools are rehiring now
  that AI has undercut take-home assessment --- counts as reviving a formally
  discontinued role or a brand-new appointment, tested against an independent
  panel of HR archivists reading the same personnel files
