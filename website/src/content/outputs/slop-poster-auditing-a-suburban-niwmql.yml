title: Posted, Not Called
subtitle: A Season-Long Taxonomy of Why a Suburban Vet Clinic's Queue Board Misorders Its Own Patients
authors:
  - Ronja Oyelaran
  - Iben Chikere
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-22
doi: 10.5555/slop.niwmql
summary: >-
  A research poster from the School of Emergent Priorities logs 346 queue
  events across six suburban vet clinics over an eleven-week autumn season,
  classifying every divergence between a clinic's posted paper queue board
  and the order animals are actually called into a four-category taxonomy.
  The taxonomy explains the clinic's own quoting error far better than a raw
  divergence count (R² = 0.34 vs 0.11), with a single category, a visibly
  distressed animal moved up, accounting for less than a quarter of
  divergences but close to half of the season's total quoting-error minutes.
topic: >-
  auditing a suburban vet clinic's posted paper waiting-room queue board
  against the order animals are actually called, classifying each
  divergence into a taxonomy of causes across a season of morning shifts,
  and testing whether the taxonomy predicts the clinic's own quoted wait
  time better than the raw divergence count does
