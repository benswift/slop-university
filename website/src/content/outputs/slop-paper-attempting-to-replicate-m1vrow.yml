title: Absent, Not Believed
subtitle: Replicating a Labelling-Confidence Effect at Commencement's Photography Opt-Out
authors:
  - Casimir Beng
  - Mirela Hanke
  - Dagny Okafor
preset: paper
school: School of Continuous Improvement
date: 2026-07-14
doi: 10.5555/slop.m1vrow
summary: >-
  A paper from the School of Continuous Improvement tests whether a prior
  labelling-confidence finding from a meeting-room marker-caddy study
  reproduces at Commencement's photography opt-out wristbands. Across six
  ceremonies and 812 guests, wristband-wearers appear in the official photo
  set at roughly a third the rate of non-wearers, but post-ceremony
  confidence in the opt-out system is statistically unmoved by wristband
  status, even among wearers independently confirmed absent from every
  published photo.
topic: >-
  attempting to replicate the University's directly-responsible-individual
  labelling finding (from the marker-caddy study) on Commencement's
  photography opt-out wristbands: does a visible do-not-photograph wristband
  actually keep a guest out of the official photo set, and does guest trust
  in the system move with it either way
