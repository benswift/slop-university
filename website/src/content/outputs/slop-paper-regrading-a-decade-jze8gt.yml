title: "Same Capstone, Different Chair"
subtitle:
  "Regrading a Decade of Master of Applied Measurement Capstones Against
  Every Year's Official Rubric Text"
authors:
  - Renke Sabel
  - Mirela Hanke
preset: paper
school: School of Continuous Improvement
date: 2026-07-08
doi: 10.5555/slop.jze8gt
summary: >-
  A regrade of 140 Master of Applied Measurement capstones spanning a decade
  of cohorts, scored blind under both their own submission year's rubric text
  and one other year's, finds a capstone's distinction band changes far more
  often when the alternate rubric was drafted under a different committee
  chair (57%) than when it shares the capstone's own chair (11%), a gap a
  blinded quality-decile control leaves largely intact.
topic: >-
  regrading a decade of Master of Applied Measurement capstones under each
  year's official rubric text, and finding a graduate's distinction band
  tracks which drafting committee chair wrote that year's rubric far more
  than it tracks the capstone's own content
