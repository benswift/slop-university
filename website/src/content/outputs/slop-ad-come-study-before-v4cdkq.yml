summary: >-
  A marketing poster for the Master of Priority Studies stages a car's
  dashboard mid-correction, its navigation screen already tracing a route
  around a wrong turn before the driver notices one was made, as the pitch
  for a program built around noticing before anyone has to flag it,
  developed with the School of Emergent Priorities for bus-stop panels and
  campus digital signage, in matched daylight and evening versions.
topic: >-
  come study before you'd have noticed --- the GPS route line that quietly
  bends itself around a wrong turn before the driver ever clocks it, and
  the program built to ask what else is correcting itself unnoticed
