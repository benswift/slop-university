title: Come Study Before You'd Have Noticed
subtitle: A recruitment pitch for the Master of Priority Studies, built around
  a car's GPS quietly rerouting around a wrong turn before the driver
  notices one was made.
authors: []
preset: marketing-poster
school: School of Emergent Priorities
