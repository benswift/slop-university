title: Ranked, Then Reordered
subtitle: An Interview Study of How the Community-Garden Waitlist Actually Clears
authors:
  - Ingrid Vasseur
  - Lindiwe Achterberg
preset: paper
school: School of Emergent Priorities
date: 2026-07-12
doi: 10.5555/slop.qe42zi
summary: >-
  A paper from the School of Emergent Priorities interviews 22 households who
  moved off the University's community-garden waitlist onto a plot, checking
  their own account of how they advanced against the published Stewardship
  Priority Score. Neither self-reported reason nor measured wait time
  separates households above and below the list's median score, with
  directly asking the rostered convenor dominating both halves alike.
topic: >-
  an interview study of how the university's community-garden plot waitlist
  actually clears, against the Stewardship Priority Score that's supposed to
  decide it
