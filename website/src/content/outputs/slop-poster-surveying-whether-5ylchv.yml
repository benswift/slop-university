title: "Worn for a Week, Read for a Year"
subtitle: "Surveying How Long an Orientation-Week Lanyard's Colour Follows a Student"
authors:
  - Lindiwe Achterberg
  - Marek Solheim
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-14
doi: 10.5555/slop.5ylchv
summary: >-
  A poster from the School of Emergent Priorities surveys 612 commencing
  students at week nine of first semester, pairing self-reported recall of
  their orientation-week admission-pathway lanyard colour with a five-item
  perceived-treatment scale. More than half of respondents could still name
  their own colour, and students assigned the alternative-entry grey
  reported a perceived-treatment gap that widened from 6 to 14 percentage
  points over the term while gold-lanyard students reported none.
topic: >-
  surveying whether first-semester students can still name the colour of the
  orientation-week lanyard that sorted them by admission pathway, and
  whether they think it followed them into how tutors treated them
