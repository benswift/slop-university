summary: >-
  A marketing poster for the School of Emergent Priorities compresses the
  published finding of "Whichever Bin the Neighbours Already Rolled" ---
  that a street's laminated bin-night roster loses its audience as it ages,
  with residents drifting to simply copying whichever bin a neighbour has
  already kerbed --- into a single bus-stop headline, developed for campus
  digital signage and bus-stop panels in matched daylight and evening
  versions.
topic: >-
