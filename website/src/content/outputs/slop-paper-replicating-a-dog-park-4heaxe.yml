title: "Fair Enough, Once Someone's Watching"
subtitle: "A Farmers Market Failed Replication of a Self/Other Queue-Compliance Judgement Asymmetry"
authors:
  - Ronja Oyelaran
  - Runa Adegoke
preset: paper
school: School of Emergent Priorities
date: 2026-07-22
doi: 10.5555/slop.4heaxe
summary: >-
  A paper from the School of Emergent Priorities attempts to replicate a
  self/other compliance-judgement asymmetry first documented at a suburban
  dog park, this time at the queue of a high-turnover Saturday farmers market
  stall across twelve markets and 612 intercept-surveyed patrons. The
  asymmetry holds at markets with no rostered queue marshal but is
  statistically indistinguishable from zero at markets with one, even though
  an independent, blinded observer count of actual queue-jumping barely
  differs between the two conditions.
topic: >-
  replicating a dog-park self/other compliance-judgement gap at a
  farmers-market queue, testing whether it survives a marshal watching the
  line
