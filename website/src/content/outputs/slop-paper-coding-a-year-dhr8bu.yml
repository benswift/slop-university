title: "Resolved, Not by the Panel"
subtitle: "A Year of Shared-Kitchenette Kettle Faults Coded Against the Asset Retirement Panel's Own Throughput Count"
authors:
  - Renke Sabel
  - Mirela Hanke
preset: paper
school: School of Continuous Improvement
date: 2026-07-14
doi: 10.5555/slop.dhr8bu
summary: >-
  A paper from the School of Continuous Improvement hand-codes a full year of
  shared kitchenette kettle fault tickets into a four-stage resolution-pathway
  taxonomy, finding the Adaptive Metrics Lab's Asset Retirement Panel's own
  procurement pathway resourced only 8% of resolutions and took a median of
  71 days, while the Panel's self-reported quarterly throughput figure
  credited itself with 94% of the year's closures regardless of pathway.
topic: >-
  coding a year of shared kitchenette kettle fault tickets by how each was
  actually resolved, against how many the Adaptive Metrics Lab's Asset
  Retirement Panel counts toward its own throughput
