summary: >-
  A marketing poster for the School of Emergent Priorities compresses the
  published finding of "Settled Before the System Switched On" --- that an
  informal pick-up-gate arrangement outlasted the tap-on dismissal system
  built to replace it --- into a single bus-stop headline, developed for
  campus digital signage and bus-stop panels in matched daylight and
  evening versions.
topic: >-
