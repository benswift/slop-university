title: Flagged Before the Portal Notices
subtitle: Forecasting Which Warranty Claims Bounce Back for More Paperwork
authors:
  - Fenna Okoro
  - Ronja Oyelaran
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-21
doi: 10.5555/slop.dvpywq
summary: >-
  A research poster from the School of Emergent Priorities builds a
  submission-time early-warning flag that forecasts documentation
  bounce-back for a national appliance-warranty programme, tested against
  the portal's own completeness check across 1,860 claims and eleven months
  of deployment. The flag's forecast accuracy climbs from 74% to 89% while
  the portal's check holds near chance, but customers shown the flag attach
  more paperwork rather than less, and the bounce-back rate itself doesn't
  move for either group.
topic: >-
  forecasting which home-appliance warranty claims will bounce back for more
  paperwork, before the customer submits them
