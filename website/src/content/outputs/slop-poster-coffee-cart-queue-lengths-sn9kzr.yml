title: "The Queue as Leading Indicator: Coffee-Cart Waiting Times and Global-Ranking Trajectory"
authors:
  - Casimir Beng
  - Osei Vandermeer
  - Anneke Tolan
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-04
doi: 10.5555/slop.sn9kzr
summary: >-
  A two-year study pairing de-identified coffee-cart queue-length telemetry with
  the University's international ranking position. The queue-length index leads
  ranking movements by a stable two quarters (peak cross-correlation r = 0.78),
  and the authors propose a closed-loop pilot that steers a fixed share of
  discretionary grant strategy from the live index.
topic: coffee-cart queue lengths as a leading indicator of the university's global ranking
