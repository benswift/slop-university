title: The Courier Absorbs the Estimate
subtitle: Complaint-Ticket Blame Language Before and After a Food-Delivery App's
  Late-Order Notification Began Naming the Courier
authors:
  - Casimir Beng
  - Solveig Adeyemi
  - Mirela Hanke
preset: paper
school: School of Continuous Improvement
date: 2026-07-21
doi: 10.5555/slop.2udumk
summary: >-
  A paper from the School of Continuous Improvement analyses 2,614 complaint
  tickets filed with a widely used food-delivery platform across a staged
  wording change to its late-order notification, from a generic
  acknowledgement to one naming the courier directly. Courier-directed blame
  more than doubles after the change while estimate-directed blame falls by
  a comparable margin, median lateness and support-agent escalation rates
  hold steady, and displaying the courier's own name adds no further shift.
topic: >-
  testing whether a food-delivery app's late-order notification shifts
  customers' complaint blame from its own arrival estimate onto the courier
