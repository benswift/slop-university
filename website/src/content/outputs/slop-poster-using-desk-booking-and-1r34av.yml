title: "The Building Knows First"
subtitle: "Forecasting Campus-Space Abandonment from Desk-Booking and Swipe-Card Signals"
authors:
  - Petra Umbile
  - Anneke Tolan
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-06
doi: 10.5555/slop.1r34av
summary: >-
  An 18-month study across fourteen buildings deriving a quiet-building index
  from desk-booking cancellations and swipe-card telemetry, checked against
  the date each building was independently flagged in facilities' quarterly
  utilisation review. The index anticipated the formal finding by a median
  6 weeks (n = 14, r = 0.71), with the lead widening to 10 weeks for
  administrative floors.
topic: using desk-booking and swipe-card data to forecast which campus buildings will go quietly underused, weeks before facilities management notices
