title: Logged by Score, Reclaimed by Chance
subtitle: >-
  Auditing Whether a Library Lost-Property Claim-Likelihood Index Predicts
  What Gets Recovered
authors:
  - Joost Nwosu
  - Sten Okwuosa
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-15
doi: 10.5555/slop.37ag3g
summary: >-
  A research poster from the School of Continuous Improvement audits the
  library's Lost & Found Index, which scores every logged item's
  claim-likelihood at intake, against 14 months of outcomes for 926 items.
  The score tracked cataloguing order closely (r = 0.79) but reclaim only
  weakly (r = 0.22): low-scoring items were binned a median nine days after
  intake whether or not a claimant ever came looking, suggesting the index
  predicts staff attention rather than public recovery.
topic: >-
  auditing whether a library lost-property claim-likelihood score,
  introduced to triage which misplaced items get catalogued first, actually
  predicts which items get reclaimed --- or just decides which end up
  binned soonest
