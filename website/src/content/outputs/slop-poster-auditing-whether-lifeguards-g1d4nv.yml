title: The Delegated Eye
subtitle: Scanning Independence and Alarm Tenure Among Public-Pool Lifeguards
authors:
  - Sten Okwuosa
  - Joost Nwosu
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-18
doi: 10.5555/slop.g1d4nv
summary: >-
  A research poster from the School of Continuous Improvement links 58
  lifeguards' logged independent scanning to their tenure under an installed
  automated drowning-detection alarm across nine public pools, finding
  median independent scans fall from 14.2 to 6.8 per hour between a
  lifeguard's first and third-plus year on the alarm while the venue's own
  alarm-response-time compliance holds at ceiling throughout.
topic: >-
  auditing whether lifeguards at public pools scan the water less
  independently the longer they've worked under an automated
  drowning-detection alarm, even as the venue's own alarm-response-time
  compliance rate stays perfect throughout
