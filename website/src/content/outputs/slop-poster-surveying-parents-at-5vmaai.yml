title: Trusted the Tag, Checked It Anyway
subtitle: >-
  Parents' Trust in a Swing Set's Safety Tag, and Whether They Check It
  Anyway
authors:
  - Marit Osayande
  - Renke Sabel
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-21
doi: 10.5555/slop.5vmaai
summary: >-
  A research poster from the School of Continuous Improvement surveys 342
  parents across 14 suburban playgrounds on their trust in a swing set's
  zip-tied safety-inspection tag against how often they check the equipment
  themselves before letting a child climb on, cross-tabbed by how long ago
  the tag was last dated. Reported trust slides only 15 points from a tag
  dated within the month to one with no visible date at all, while
  self-reported personal checking rises more than twice as far over the
  same span, overtaking trust once the tag's date has lapsed furthest.
topic: >-
  surveying parents at suburban playgrounds on how much they trust a
  safety-inspection tag zip-tied to the swing set against how often they
  personally check the equipment themselves before letting their kids on it
