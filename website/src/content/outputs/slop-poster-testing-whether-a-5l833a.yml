title: Posted High, Valued the Same
subtitle: A Street-Corner Little Free Library's Take-vs-Leave Ratio Against Neighbours' Own Rating of the Box
authors:
  - Ingeborg Nwachukwu
  - Marit Osayande
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-21
doi: 10.5555/slop.5l833a
summary: >-
  A research poster from the School of Continuous Improvement surveys 214
  registered users of 38 suburban little free libraries, matching each
  user's own value rating of the box against its live posted take-vs-leave
  ratio and against how easily the placard could be read from the footpath.
  Rating composition holds within 3 points across ratio bands, while
  placard legibility alone separates users who can recall the ratio from
  those who cannot, by 45-53 points.
topic: >-
  validating whether a little free library's posted take-vs-leave ratio
  predicts how neighbourhood users rate the box's value, or just tracks
  whether anyone reads the sign
