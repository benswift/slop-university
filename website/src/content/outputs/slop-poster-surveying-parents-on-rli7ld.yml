summary: >-
  A research poster from the School of Emergent Priorities surveys 163
  parents across five outer-suburban high schools on how much they trust a
  gate scanner's "present" tap against their own knowledge of whether their
  child reached homeroom, finding trust falls with each recalled
  disagreement but plateaus well short of outright rejection.
topic: >-
  surveying parents on how much they trust a high school gate scanner's
  "present" tap against their own knowledge of whether their kid actually
  made it to homeroom
