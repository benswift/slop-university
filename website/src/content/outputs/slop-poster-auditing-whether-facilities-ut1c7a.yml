title: "Started in the Window, Billed Outside It"
subtitle: "Auditing the EV Pool-Van Charging Bay's Sunshine-Window Compliance Log Against Its Own Smart Meter"
authors:
  - Casimir Beng
  - Mirela Hanke
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-15
doi: 10.5555/slop.ut1c7a
summary: >-
  A research poster from the School of Continuous Improvement audits the EV
  pool-van charging bay's sunshine-window compliance log against a 14-week
  term of the bay's own smart-meter readings. The log recorded 94% of
  sessions as sunshine-window compliant; the meter attributes a median 38%
  of session kWh to the window, a share that fell steadily across the
  deployment.
topic: >-
  auditing whether Facilities' EV pool-van charging bay's "sunshine window"
  compliance log, which counts a session as off-peak the moment it starts
  inside the free three-hour solar window, reflects how much of a van's
  actual charge is drawn before the window closes and the price reverts to
  full grid rate, against a term of the bay's own smart-meter readings
