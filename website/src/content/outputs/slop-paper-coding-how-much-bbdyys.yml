title: "Minuted Into Certainty"
subtitle: "Coding Hedge Loss Between a Horizon Register Scan and Its Futures in Committee Recommendation"
authors:
  - Ingrid Vasseur
  - Anneke Tolan
preset: paper
school: School of Emergent Priorities
date: 2026-07-08
doi: 10.5555/slop.bbdyys
summary: >-
  A coding study of 96 Horizon Register scan entries and their matched
  Futures in Committee minutes finds hedges and open questions fall to a
  median of zero in translation, with 71% of minutes retaining none at all.
  Minutes retaining no hedge advance through the Register's pipeline roughly
  three times faster than minutes retaining one, independent of the
  convening chair's tenure.
topic: coding how much of a Horizon Register scanning item's original hedging and open questions survive translation into the Futures in Committee's final minuted recommendation, and finding the survival rate has become an internal proxy for how decision-ready a school's submission was judged to be
