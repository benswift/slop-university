title: Breach, Log, Renew
subtitle: >-
  Logging a Shared Robot Mower's Virtual-Fence Breaches for Committee Lease
  Review
authors:
  - Lindiwe Achterberg
  - Solveig Adeyemi
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-23
doi: 10.5555/slop.1qia9f
summary: >-
  A research poster from the School of Emergent Priorities fits 22
  community-garden mower sites with boundary telemetry over an eight-month
  window, logging every virtual-fence excursion into a containment ledger
  that fourteen plot-holder committees agreed to review before each lease
  renewal, against eight unledgered control sites. Mean monthly breaches at
  ledgered sites fall from 13.4 to 3.1, tracked by committee non-renewal
  only where the full committee could see the ledger, while firmware and
  fence-geometry updates over the same window shift nothing at either
  group.
topic: >-
  logging a community garden's shared robot mower's virtual-fence breaches
  into a containment ledger the plot-holder committee reviews before
  renewing the mower's lease
