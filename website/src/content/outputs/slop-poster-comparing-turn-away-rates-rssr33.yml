title: "Pre-Allocated, Not Prevented"
subtitle: >-
  Loaner-Laptop Turn-Aways, Forecast-Fed Versus Ad Hoc, During Exam Week
authors:
  - Fenna Okoro
  - Marek Solheim
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-17
doi: 10.5555/slop.rssr33
summary: >-
  A research poster from the School of Emergent Priorities compares two
  library branches drawing on the same loaner-laptop pool across an
  eight-day exam period, one running a week-ahead demand forecast that
  pre-allocates stock and one still allocating by staff judgement after its
  own forecasting rollout stalled. The forecast-fed branch's turn-away rate
  runs well under half the other's, while combined turn-aways across both
  branches barely move, consistent with the forecast relocating unmet
  demand rather than reducing it.
topic: >-
  comparing turn-away rates during exam week between the library branch
  that pre-allocates loaner laptops from a week-ahead demand forecast and
  the sister branch that kept allocating them by feel at the desk after the
  forecasting rollout stalled there, to see whether the forecast actually
  gets laptops to the students who need them or just moves the queue
