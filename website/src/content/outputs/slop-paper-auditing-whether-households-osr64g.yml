title: Answered Promptly, Flagged All the Same
subtitle: >-
  A Null-Result Test of Prompt-Response Speed Against Later Verification
  Flags on a Shared Streaming Account
authors:
  - Casimir Beng
  - Ingeborg Nwachukwu
  - Solveig Adeyemi
preset: paper
school: School of Continuous Improvement
date: 2026-07-23
doi: 10.5555/slop.osr64g
summary: >-
  A paper from the School of Continuous Improvement reports an eleven-month
  panel study of 316 multi-address households sharing a subscription-video
  account, testing whether how quickly a household answers the account's
  periodic "is this your home" prompt predicts its likelihood or timing of a
  later verification flag. Flag incidence (18.1-19.5%) and time to first flag
  (median ~150 days) held flat across every response-speed tercile, and an
  ablation excluding households with a pre-existing flag left the pattern
  unchanged.
topic: >-
  auditing whether households that promptly confirm a shared streaming
  account's "this is your home" prompt see fewer follow-up verification
  flags than households that dismiss or ignore it, expecting quick
  confirmation to buy goodwill with the platform and finding no relationship
  between the two at all, reported as a clean null
