title: "Finished, Not Understood"
subtitle: "Auditing the Horizon Register's Mandatory Induction Module Against an Unannounced Comprehension Check"
authors:
  - Verity Marris
  - Anneke Tolan
  - Petra Umbile
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-08
doi: 10.5555/slop.cc4hy3
summary: >-
  A six-cohort audit of the Horizon Register's mandatory induction module
  set completion-certificate issuance against an unannounced two-item
  comprehension check administered two weeks later (n = 238 new starters).
  Completion rose from 91% to 98% as median completion time fell from 34 to
  9 minutes, while the comprehension check held between 31% and 35%
  throughout and showed no association with completion time (r = 0.06),
  suggesting the certificate reported to leadership tracks finishing the
  module rather than understanding the priorities it covers.
topic: walking new starters through the Horizon Register's live priority list via a mandatory induction module, then testing whether completing it tracks understanding the priorities it covers or just finishing the module
