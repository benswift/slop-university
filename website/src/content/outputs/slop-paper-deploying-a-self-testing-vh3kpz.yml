title: "Acknowledged Fast, Fixed Slow"
subtitle: >-
  Deploying Self-Testing Smoke Alarms Across a Rental Portfolio, and the
  Fault a Managing Agent Dismisses Quickest but Dispatches Last
authors:
  - Ingeborg Nwachukwu
  - Sten Okwuosa
  - Thandiwe Solberg
preset: paper
school: School of Continuous Improvement
date: 2026-07-21
doi: 10.5555/slop.vh3kpz
summary: >-
  A paper from the School of Continuous Improvement deploys self-testing,
  app-linked smoke alarms across 214 rental properties over sixteen months,
  comparing how quickly a managing agent acknowledges each weekly self-test
  fault against how long a technician actually takes to attend.
  Acknowledgment holds high and uniform across fault types while dispatch
  does not, and a pre-registered SMS-escalation ablation aimed at the
  widest gap does not appear to close it.
topic: >-
  deploying a self-testing, app-linked smoke alarm across a portfolio of
  rental properties, then measuring how quickly a managing agent
  acknowledges each weekly self-test fault against how long it actually
  takes to dispatch a technician
