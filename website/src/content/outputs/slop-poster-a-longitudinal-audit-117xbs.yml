title: The Register That Never Downgraded
subtitle: >-
  Auditing Verge-Garden Warning Letters as the Offence Became the Norm
authors:
  - Marit Osayande
  - Renke Sabel
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-22
doi: 10.5555/slop.117xbs
summary: >-
  A research poster from the School of Continuous Improvement audits eight
  years of a council's verge-garden compliance letters across six wards,
  setting the register's citation categories against the School's own
  biannual streetscape counts of verge-garden prevalence over the same
  period. Verge-garden prevalence rises from 9% to 55% of surveyed streets
  between 2019 and 2026; the register's "unauthorised planting" citation
  share never drops below 81% across the same years, with no letter
  re-coded and no category retired.
topic: >-
  a longitudinal audit of a suburban council's verge-garden warning-letter
  register, tracking how many letters keep citing "unauthorised planting" as
  vegetable verge gardens quietly become the street norm
