title: "Not the Kiosk's Fault"
subtitle: >-
  An Intercept-Interview Study of Self-Checkout Abandonment Against the
  Library's Automatic Fault-Ticket Flag
authors:
  - Anneke Tolan
  - Casimir Beng
preset: paper
school: School of Emergent Priorities
date: 2026-07-11
doi: 10.5555/slop.kwf82j
summary: >-
  A paper from the School of Emergent Priorities and the School of
  Continuous Improvement reports an intercept-interview study of 214
  library patrons who abandoned a self-checkout session, matched against
  the automatic fault ticket every abandoned session generates, finding
  only nine per cent of walk-aways involved an actual kiosk fault and that
  technicians resolve most of the rest by resetting equipment that was
  never broken.
topic: >-
  interviewing library patrons who walk away mid-transaction at the
  self-checkout kiosks, against the library's own abandoned-session flag
  that fires a maintenance ticket every time -- finding almost none of the
  abandonments have anything to do with the kiosk itself
