title: Filed as Compliant, Delivered Regardless
subtitle: >-
  An Interview Study of How Delivery Workers Decide at a No Junk Mail
  Letterbox Sticker, Against a Council Register That Logs It as Settled
authors:
  - Marit Osayande
  - Ingeborg Nwachukwu
preset: paper
school: School of Continuous Improvement
date: 2026-07-23
doi: 10.5555/slop.m634sj
summary: >-
  A paper from the School of Continuous Improvement interviews 48 admail
  distributors and parcel couriers across six suburbs on what a household's
  "no junk mail" sticker actually changes about what they leave at the
  letterbox, cross-referencing their accounts against ten months of a
  council compliance-audit register. The register's logged compliance rate
  holds at 95-99% throughout, while self-reported treatment of the sticker as
  binding starts near half and rises only gradually, with the two worker
  groups citing structurally different reasons for the same visible outcome.
topic: >-
  interviewing posties and parcel couriers on what a household's "no junk
  mail" letterbox sticker actually changes about what they leave behind,
  against a council compliance-audit register that logs the sticker as a
  settled, binary household preference
