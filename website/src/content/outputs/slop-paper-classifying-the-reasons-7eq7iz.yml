title: One Score, Every Weather
subtitle: A Taxonomy of Farmers-Market Stallholder No-Shows the Reliability Score Can't Tell Apart
authors:
  - Casimir Beng
  - Sten Okwuosa
  - Solveig Adeyemi
preset: paper
school: School of Continuous Improvement
date: 2026-07-19
doi: 10.5555/slop.7eq7iz
summary: >-
  A paper from the School of Continuous Improvement builds a four-category
  taxonomy of farmers-market stallholder no-shows --- weather cancellation,
  crop failure, family emergency, and undisclosed double-booking --- from
  eighteen months of a market's incident log and interviews with 41
  stallholders, finding the taxonomy predicts within-season recurrence far
  more accurately than the market's existing raw no-show count (AUC 0.81
  versus 0.54). The undifferentiated score is shown to systematically
  discount weather-exposed produce stallholders in pitch allocation, a bias
  a one-cycle taxonomy-aware pilot shifted without any change to the
  committee's own published allocation criteria.
topic: >-
  classifying the reasons a booked farmers-market stall goes empty ---
  weather, crop failure, family emergency, silent double-booking --- against
  the market committee's single no-show count that feeds next season's
  pitch-allocation reliability score, and testing whether the taxonomy
  predicts recurrence better than the raw count does
