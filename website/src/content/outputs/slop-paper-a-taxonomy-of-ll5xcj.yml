title: "Held, Not Escalated"
subtitle: "Coding the Library Front Desk's Disposal-Tier Register Against Six Rounds of Physical Stock-Take"
authors:
  - Dagny Okafor
  - Renke Sabel
  - Thandiwe Solberg
preset: paper
school: School of Continuous Improvement
date: 2026-07-13
doi: 10.5555/slop.ll5xcj
summary: >-
  A paper from the School of Continuous Improvement cross-references the
  University Library's four-stage Lost & Found disposal-tier register
  against a hand-coded physical audit of the same items across six
  stock-take rounds. The register reports a rising share of items cleared
  for release or disposal over a fourteen-week term; the physical count
  finds most of those items still in Hold, a gap interviews trace to a
  front-desk workaround that resets an item's intake clock rather than
  complete a stalled sign-off.
topic: >-
  a taxonomy of the front-desk Lost & Found's four-stage disposal-tier
  codes, and interviews with the staff who apply them before a tub of
  stray umbrellas and unmatched gloves can finally be thrown out
