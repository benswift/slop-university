title: "More Words, More Drift"
subtitle: "Response Elaboration Outperforms Every Other Predictor in the Strategic Drift Survey's New Second-Layer Score"
authors:
  - Anneke Tolan
  - Renke Sabel
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-08
doi: 10.5555/slop.4v9cxa
summary: >-
  A blind re-scoring of the Strategic Drift Survey's newly added second layer,
  covering 24 university units across the 2026 cycle. Layer-two drift score
  rises with response length (r = 0.61) while no residual association
  survives once elaboration is held constant, suggesting the augmented
  instrument tracks how thoroughly a unit describes drift rather than how
  much its priorities have moved.
topic: auditing the Strategic Drift Survey after bolting on a second self-assessment layer once the first layer's responses stopped showing any drift, and finding the new layer tracks how elaborately units word their answers, not how far enacted priorities have actually moved
