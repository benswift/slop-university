title: Relabelled, Not Resorted
subtitle: >-
  A Contamination Audit of Recoloured Compost-Bin Lids Across Ten Shared
  Kitchenettes
authors:
  - Mirela Hanke
  - Bram Ntuli
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-13
doi: 10.5555/slop.hnclxr
summary: >-
  A poster from the School of Continuous Improvement audits ten shared
  kitchenettes across a Facilities lid-colour change to the compost bins,
  hand-sorting six weeks of bin contents either side of the recolour.
  Contamination holds steady across both windows in every kitchenette, and
  Facilities confirms the new lids regardless of the result.
topic: >-
  auditing whether recolouring the shared kitchenette compost-bin lids
  changes what actually goes in them, and why Facilities kept the new lids
  anyway
