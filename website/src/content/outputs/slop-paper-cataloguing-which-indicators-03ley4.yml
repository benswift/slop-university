title: "Flagged, Not Retired"
subtitle: "A Twelve-Month Deployment of the Indicator Commons' Sunset Scorer, and Why Its Own Uptime Outlasted Everything It Flagged"
authors:
  - Renke Sabel
  - Casimir Beng
  - Osei Vandermeer
preset: paper
school: School of Continuous Improvement
date: 2026-07-08
doi: 10.5555/slop.03ley4
summary: >-
  A twelve-month field deployment of an automated sunset scorer across the
  Indicator Commons' full registry of 214 indicators tests whether an
  instrument built to flag stale, redundant, and rarely-queried indicators
  for retirement can shrink the registry it audits. The scorer flagged 138
  distinct indicators; four were retired, and disposition otherwise splits
  across re-baselining, retention with justification, and an ongoing
  committee backlog, a pattern traced to the scorer's own uptime entering
  the Living Dashboard partway through the deployment.
topic: cataloguing which indicators a sunset scorer flags for retirement across the Indicator Commons, and why almost none of them are ever actually retired once the scorer's own uptime lands on the Living Dashboard
