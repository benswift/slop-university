title: Logged, Not Rostered
subtitle: A Season of Coop Door-Sensor Triggers, Classified by Cause
authors:
  - Marit Osayande
  - Ingeborg Nwachukwu
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-22
doi: 10.5555/slop.i92v4h
summary: >-
  A research poster from the School of Continuous Improvement instruments a
  street's shared chicken coop with a reed-switch door sensor and motion
  logger for a full season, classifying every logged event against the
  published duty roster, a resident's possum-sighting log, and the local
  wind-gust record. The roster accounts for well under half of what the
  sensor recorded, in a mix of causes that shifts month to month.
topic: >-
  classifying a season of door-sensor triggers on a street's shared chicken
  coop into rostered duty visits, wind, and wildlife, and reporting what
  actually set them off
