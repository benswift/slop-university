title: The Furniture Moves, the Flags Don't
subtitle: >-
  A Pre-Registered Null Result on Whether Heatmap-Driven Invigilator
  Reseating Changes Where Integrity Flags Are Raised Next
authors:
  - Fenna Okoro
  - Lindiwe Achterberg
preset: paper
school: School of Emergent Priorities
date: 2026-07-15
doi: 10.5555/slop.l19xml
summary: >-
  A paper from the School of Emergent Priorities pre-registers a
  fifteen-sitting field test of the Applied Foresight Practicum's
  heatmap-driven invigilator reseating, introduced after the practicum's
  return to in-person sitting. Per-sitting integrity-flag rates held level
  before and after the "Sitting Heat Index" went live (12.5 versus 12.6
  flags per sitting), zone-level flags tracked invigilator dwell time more
  closely than the index's own risk tier, and a reconstructed
  randomised-seating counterfactual reached a statistically indistinguishable
  flag total --- the index redistributes attention without redistributing
  detection.
topic: >-
  after a school moved a recurring assessment back to in-person sitting,
  invigilator seating and patrol routes started following a live
  incident-report heatmap built from the previous sitting; audit whether
  the heatmap-driven reseating actually changes where integrity incidents
  are flagged next time, or just moves the furniture
