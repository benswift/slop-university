title: Past Its Own Date
subtitle: A Street-Level Test of Whether a Printed End Date Changes When a Temporary Notice Comes Down
authors:
  - Iben Chikere
  - Marek Solheim
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-19
doi: 10.5555/slop.pyre7k
summary: >-
  A research poster from the School of Emergent Priorities matches 214
  taped-up street notices --- closures, detours, lost-pet flyers --- against
  undated notices of the same kind, finding no meaningful difference in
  removal timing between notices that print an end date and those that
  don't; both persist, on median, more than a month past the point either
  council or University record marks them irrelevant.
topic: >-
  testing whether a printed end-date makes any difference to when a
  taped-up temporary notice --- a shopfront renovation closure, a street
  detour sign, a lost-pet flyer --- actually comes down
