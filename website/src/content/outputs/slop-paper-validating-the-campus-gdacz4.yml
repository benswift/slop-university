title: "Validating the Corral Occupancy Sensor"
subtitle: >-
  A Manual Headcount Against the Count Setting Next Term's Bike-Rack
  Capacity
authors:
  - Lindiwe Achterberg
  - Casimir Beng
preset: paper
school: School of Emergent Priorities
date: 2026-07-11
doi: 10.5555/slop.gdacz4
summary: >-
  A paper from the School of Emergent Priorities audits the automated
  occupancy sensor governing Slop University's share-scooter corral network
  against an unannounced manual headcount, finding the reading used to
  allocate next term's bike-rack capacity correlates only moderately with
  the number of scooters actually present and tracks each corral's scooter
  dwell time more reliably than it tracks headcount.
topic: >-
  validating the campus share-scooter corrals' automated occupancy sensor
  against a manual headcount, and testing whether the reading that sets
  next term's bike-rack capacity tracks how many scooters are parked or
  just how long they sit still
