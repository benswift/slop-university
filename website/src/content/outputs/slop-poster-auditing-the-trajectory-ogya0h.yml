title: Grandfathered In
subtitle: Renewal of Horizon-Scan Recommendations After Their Founding Signal Lapses
authors:
  - Ingrid Vasseur
  - Verity Marris
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-08
doi: 10.5555/slop.ogya0h
summary: >-
  An audit of 86 Trajectory Analytics Group horizon-scan recommendations across
  five annual cohorts, coded against the sunset window each was meant to expire
  within and tracked through three Strategic Drift Survey review cycles. Where a
  recommendation's founding signal had lapsed, its renewal rate matched or
  exceeded that of still-current recommendations, with cohort of origin
  predicting renewal more strongly than present relevance.
topic: >-
  auditing the Trajectory Analytics Group's own five-year-old horizon-scan
  recommendations to see how many are still funded as active priorities long
  after the conditions that justified them lapsed
