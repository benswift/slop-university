  - Casimir Beng
  - Anouk Mensah
preset: paper
school: School of Emergent Priorities
date: 2026-07-15
doi: 10.5555/slop.gzh1b5
summary: >-
  A paper from the School of Emergent Priorities re-runs a widely cited
  finding --- that coffee-cart queue-length telemetry leads the University's
  global ranking by a stable two quarters --- at a second, independently
  instrumented coffee point. The relationship does not reproduce at the new
  site under the original analysis or three robustness checks, while internal
  citations of the pilot proposal the original finding supported keep rising
  regardless, including after an interim briefing reported the non-replication.
topic: >-
  replicating whether the University's coffee-cart queue-length leading
  indicator holds at a second site, after the original two-quarter lead over
  global-ranking movement kept the closed-loop grant-steering pilot proposal
  alive in committee papers
