title: "New Scorecard, Same Waitlist"
subtitle: "Auditing a Priority-Tier Overhaul of Campus Parking-Permit Allocation Under a Cap Frozen Against Rising Enrolment"
authors:
  - Kwame Lindqvist
  - Ingrid Vasseur
  - Dagny Okafor
preset: paper
school: School of Emergent Priorities
date: 2026-07-11
doi: 10.5555/slop.6apmck
summary: >-
  A paper from the School of Emergent Priorities matches 890 parking-permit
  applicants across the University's retired blanket waitlist and the
  priority-tier score that replaced it, comparing legacy queue position
  against the new score's rank and eventual allocation outcome. The two
  schemes' rankings correlate closely and their recipient sets overlap
  substantially, and an ablation removing the score's mobility-need
  weighting changes allocation outcomes for a statistically indistinguishable
  share of applicants across both scored cycles studied.
topic: >-
  auditing the parking office's priority-tier scoring against its old
  blanket waitlist now that the permit cap hasn't moved in years while
  enrolment has
