title: "Picturing the Floor Plan"
subtitle: >-
  Mental-Imagery Vividness Predicts Who Lingers at the Building Directory,
  Not Signage Clarity
authors:
  - Mirela Hanke
  - Anneke Tolan
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-11
doi: 10.5555/slop.brc0kv
summary: >-
  A poster from the School of Continuous Improvement interviews 166 people
  intercepted mid-pause at building directory boards across nine buildings,
  matching a self-reported mental-imagery-vividness score against Facilities'
  automated dwell-time sensor. Imagery vividness predicts dwell time more
  strongly than any measured signage variable, while the sensor's
  "wayfinding friction" flag rate rises across the term without any matching
  rise in self-reported navigation difficulty.
topic: >-
  interviewing people who pause at building directory boards about how they
  actually navigate campus, against Facilities' automated dwell-time sensor
  that flags lingering as "wayfinding friction" needing a signage redesign
