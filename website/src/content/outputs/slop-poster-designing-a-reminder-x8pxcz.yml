title: "Locker Ping"
subtitle: "Design and a Six-Week Field Deployment of an Automated Collection-Reminder System for the Campus Parcel-Locker Bank"
authors:
  - Lindiwe Achterberg
  - Joost Nwosu
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-11
doi: 10.5555/slop.x8pxcz
summary: >-
  A poster from the School of Emergent Priorities designs and field-tests
  Locker Ping, a rule-based reminder engine built to meet the campus
  parcel-locker network's twenty-four-hour collection-speed target with a
  push notification and a text message rather than a staff phone call. A
  six-week pilot across six of the University's fourteen locker banks lifts
  on-time collection to 89 per cent against a 61 per cent baseline, while
  average dwell time per parcel and the concentration of overdue collections
  at the busiest banks stay unchanged.
topic: >-
  designing a reminder engine for the campus parcel-locker bank's
  collection-speed target, and evaluating it in a six-week field trial
