title: "Fully Attested, Never Observed"
subtitle: "Grant-Narrative Drafting Before and After a University-Wide Generative-AI Ban"
authors:
  - Casimir Beng
  - Osei Vandermeer
  - Anneke Tolan
preset: paper
school: School of Continuous Improvement
date: 2026-07-07
doi: 10.5555/slop.7aynun
summary: >-
  A telemetry-based comparison of attestation compliance against
  keystroke-derived drafting signatures before and after a university-wide ban
  on AI-drafted grant narratives. Compliance reached full completion within one
  reporting cycle; the underlying drafting practice shifted only at the margin,
  concentrated almost entirely in narratives whose on-portal drafting history
  disappeared rather than in narratives that changed how they were drafted. An
  interview sample corroborates the telemetry account.
topic: banning AI-drafted grant narratives only moved where the drafting happens, not whether it happens, once the University's compliance-attestation checkboxes reached full completion and the audit log stopped looking any further
