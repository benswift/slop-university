title: "Waved Through, Not Verified"
subtitle: "A Covert Comparison of Reusable-Cup Discounts Across Two Campus Café Outlets"
authors:
  - Marek Solheim
  - Renke Sabel
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-13
doi: 10.5555/slop.yl2e8j
summary: >-
  A poster from the School of Emergent Priorities sets an independent,
  covert observation of reusable-cup carriage against the campus café's
  own discount-code redemption rate across two matched outlets and a
  four-week window. Redemption holds at 90-94% throughout regardless of
  outlet or week, while an unannounced barista reminder shifts observed
  cup-carriage at one outlet without moving the redemption figure at all.
topic: >-
  comparing two campus coffee outlets to see whether a reusable-cup
  discount code still requires an actual cup, or just survives as a habit
  at the till
