title: "Anticipated, Not Averted"
subtitle: "A Field Validation of a Predictive Stationery-Cupboard Reorder Forecast Against a Term of Logged Stock-Outs"
authors:
  - Fenna Okoro
  - Kwame Lindqvist
  - Casimir Beng
preset: paper
school: School of Emergent Priorities
date: 2026-07-13
doi: 10.5555/slop.plhjq7
summary: >-
  A paper from the School of Emergent Priorities and the School of
  Continuous Improvement validates the Reorder Horizon, a predictive
  reorder forecast for the University's shared stationery cupboards,
  against a 14-week term of independently logged empty tickets across ten
  cupboards. The forecast's realised lead time is statistically
  indistinguishable from a simple reactive threshold, and Facilities'
  scorecard figure for on-time replenishment drops substantially once
  scored against the ticket log rather than the forecast's own predicted
  date.
topic: >-
  validating whether the shared stationery cupboards' predictive reorder
  forecast actually gets ahead of a shelf running empty, or just relabels
  the same reactive restock a few days later
