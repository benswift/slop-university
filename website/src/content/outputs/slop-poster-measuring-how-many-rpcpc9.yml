title: Living With the Misprint
subtitle: >-
  A Season-End Proofread Audit of Community Theatre Playbill Misprints Against
  the Corrections Formally Requested
authors:
  - Runa Adegoke
  - Ronja Oyelaran
  - Petra Umbile
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-22
doi: 10.5555/slop.rpcpc9
summary: >-
  A research poster from the School of Emergent Priorities audits 34 season
  programme printings across nine community theatre companies, setting an
  independent two-reader proofread of every playbill against the correction
  requests each company's own channel received over the same season. The
  channel logs 47 of the 412 misprints the audit finds, and the shortfall runs
  unevenly across categories: misspelled personal names supply 23% of audited
  misprints but 62% of every request filed, while swapped technical credits are
  recalled as noticed nearly as often and formally raised about a third as
  often.
topic: >-
  measuring how many programme misprints a community theatre's own
  correction-request process actually catches across a season, against how many
  the cast and crew just quietly live with
