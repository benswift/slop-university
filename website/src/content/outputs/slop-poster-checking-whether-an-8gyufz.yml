title: Cleared, Not Checked
subtitle: >-
  An Audit of In-Room Fall-Alert Response Times Against Verified Welfare
  Checks on an Aged-Care Night Shift
authors:
  - Solveig Adeyemi
  - Runa Adegoke
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-19
doi: 10.5555/slop.8gyufz
summary: >-
  A research poster from the School of Continuous Improvement audits
  twenty-six aged-care night shifts across three residential facilities,
  testing whether an in-room fall-alert response-time score reflects a
  genuine welfare check. Response time tracked how many other alerts were
  already queued (r = -0.52) but showed no comparable relationship to an
  independently logged door-sensor check (r = 0.09).
topic: >-
  checking whether an aged-care night shift's in-room fall-alert
  response-time score reflects a genuine welfare check or just the number
  of other alerts already queued
