title: "Whichever Bin the Neighbours Already Rolled"
subtitle: "A Street-by-Street Quasi-Experiment on Roster Age and the Shift from
  Reading to Copying on Bin Night"
authors:
  - Iben Chikere
  - Anouk Mensah
preset: paper
school: School of Emergent Priorities
date: 2026-07-18
doi: 10.5555/slop.4jycca
summary: >-
  A paper from the School of Emergent Priorities audits 24 residential streets
  whose laminated bin-night rosters vary naturally in age, finding that the
  share of kerbed bins matching the roster's stated collection week falls as
  the roster ages, while the share matching only a neighbour's already-kerbed
  bin rises over the same range. An embedded ablation finds that a QR-code
  freshness stamp linking to a live digital roster does not measurably narrow
  the gap.
topic: >-
  auditing whether a street's laminated bin-night roster (whose alternating
  recycling-vs-general week it actually is) still predicts which bin
  residents put out, or whether households have quietly drifted to just
  copying whichever bin the neighbours already rolled to the kerb
