title: Built to Recommend Its Own Replacement
subtitle: Self-Scoring Under a Human-Preservation Protocol for School-Crossing Supervisors
authors:
  - Iben Chikere
  - Solveig Adeyemi
preset: paper
school: School of Emergent Priorities
date: 2026-07-20
doi: 10.5555/slop.wx7s2x
summary: >-
  A paper from the School of Emergent Priorities and the School of Continuous
  Improvement trials a Human-Preservation Protocol scorecard across 142
  school crossings, finding that self-scored recommendations to retain a
  human supervisor arrive at only 9 crossings (6.3%), a rate that holds
  steady whether a crossing is currently supervised or already automated and
  across four quarterly rollout waves, and barely shifts when the
  instrument's heaviest-weighted criterion is removed.
topic: >-
  trialling a "human-preservation protocol" scorecard meant to flag which
  school crossings should keep their lollipop-person supervisor rather than
  move to an automated pedestrian signal, and tallying how often the
  scorecard actually recommends keeping the human once real crossings start
  scoring themselves
