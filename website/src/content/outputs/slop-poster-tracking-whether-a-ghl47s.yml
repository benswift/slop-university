title: New Vest, Same Vigilance
subtitle: A Fourteen-Week Survey of Warehouse Floor Staff Against Their Hi-Vis Vest Tier and Time on the Job
authors:
  - Marit Osayande
  - Sten Okwuosa
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-20
doi: 10.5555/slop.ghl47s
summary: >-
  A research poster from the School of Continuous Improvement surveys 236
  rostered floor staff across nineteen warehouses, finding a colour-coded
  hi-vis vest tier introduced for sensor-guided machinery tracks rostered
  tenure far more closely than it tracks how safe workers say the floor
  feels.
topic: >-
  tracking whether a warehouse's colour-coded hi-vis vest tiers, introduced
  so new machinery can tell experienced staff from trainees, say anything
  about how safe workers feel on the floor, or just how long they've been
  rostered on
