title: "The Sticker Outlasts the Heater"
subtitle: "A Coding-Scheme Taxonomy of Desk Heater and Fan Registration Drift Across Two Schools"
authors:
  - Thandiwe Solberg
  - Sten Okwuosa
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-13
doi: 10.5555/slop.wi8z5h
summary: >-
  A poster from the School of Continuous Improvement applies a
  four-category coding scheme to 214 personal heaters and fans found
  across eight office floors in two Schools, classifying each by
  registration status against physical presence at a single ledger-lapse
  snapshot. Registered-but-removed entries (22%) emerge as the taxonomy's
  second-largest category, rivalling unregistered appliances the ledger
  never captured to begin with (29%).
topic: >-
  a taxonomy of the personal desk heaters and fans staff register each
  winter, sorted by whether they're still there when the registration
  lapses
