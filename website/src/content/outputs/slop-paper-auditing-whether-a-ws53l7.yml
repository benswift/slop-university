title: Whoever Was Mid-Load
subtitle: >-
  A Share-House Power-Board's Fairness Rotation Rarely Decides Which
  Appliance an Energy Budget Cuts
authors:
  - Marit Osayande
  - Ronja Oyelaran
preset: paper
school: School of Continuous Improvement
date: 2026-07-20
doi: 10.5555/slop.ws53l7
summary: >-
  A paper from the School of Continuous Improvement instruments 31 share
  houses running an energy-budget power-board over sixteen weeks, logging
  2,314 cutoff events against each house's published fairness rotation and
  each appliance's live draw. A classifier predicting which resident's
  appliance is cut from live load rank alone reaches 89.7% accuracy, against
  24.1% for the rotation's own protected-day status, because the rotation
  can shield only one resident per day regardless of household size. Cutoffs
  concentrate on short, high-draw appliances that account for 75% of events
  against 18% of connected time.
topic: >-
  auditing whether a share house's energy-budget power-board cuts off the
  appliance its fairness rotation targets, or just whoever is mid-load when
  the budget trips
