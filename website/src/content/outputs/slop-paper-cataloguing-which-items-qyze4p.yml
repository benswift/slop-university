title: Ticked From Memory
subtitle: >-
  A Taxonomy of Verification Depth on a Car-Share Return Checklist Under a
  Late-Return-Fee Deadline
authors:
  - Runa Adegoke
  - Iben Chikere
  - Casimir Beng
preset: paper
school: School of Emergent Priorities
date: 2026-07-19
doi: 10.5555/slop.qyze4p
summary: >-
  A paper from the School of Emergent Priorities and the School of Continuous
  Improvement codes 1,842 car-share return events into a four-level taxonomy
  of checklist verification depth. Screen-interaction telemetry finds
  verification tracks an item's visible cost to the renter rather than the
  scheme's own field order, and that the resulting memory-tick rate rises
  sharply as a return nears its late-fee cutoff.
topic: >-
  cataloguing which items on a car-share return checklist renters actually
  check against the vehicle versus tick from memory to beat the late-return
  fee
