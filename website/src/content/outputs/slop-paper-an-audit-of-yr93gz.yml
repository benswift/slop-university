title: "Same Analysis, Billed Twice"
subtitle: "How a Compute-Hours Efficiency Metric Rewards Reruns Over New Findings"
authors:
  - Bram Ntuli
  - Mirela Hanke
preset: paper
school: School of Continuous Improvement
date: 2026-07-09
doi: 10.5555/slop.yr93gz
summary: >-
  An audit of the Adaptive Metrics Lab's compute-hours-per-output metric,
  exploiting an accidental staggered rollout of its facilitator-visible
  leaderboard across the Capability Sprints. Compute-hours per capstone
  submission rose roughly 3.5-fold once the leaderboard became visible to
  three of the five Sprints, concentrated almost entirely in reruns of
  participants' own earlier work; a novelty check constructed to audit the
  metric moved by only a few percentage points over the same window.
topic: >-
  an audit of the Adaptive Metrics Lab's new compute-hours-per-output
  efficiency metric --- introduced to justify the University's GPU-cluster
  expansion --- that exploits two Capability Sprints receiving compute-hour
  tracking a full intake late as an unintended control group, testing
  whether the metric rewards genuinely new analyses or just re-run ones
