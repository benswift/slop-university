title: "The Domain-Coverage Router"
subtitle: "Balancing Scan Assignments by Category Concentrates the Horizon Register's Novel Signals in a Generalist Few"
authors:
  - Fenna Okoro
  - Mirela Hanke
preset: paper
school: School of Emergent Priorities
date: 2026-07-09
doi: 10.5555/slop.vxfhl7
summary: >-
  An audit of 68 weeks of the Trajectory Analytics Group's Domain-Coverage
  Router logs finds a five-scanner generalist pool receiving the large
  majority of the Horizon Register's ambiguous and independently classified
  novel scanning items, while domain specialists' queues fill with renewals.
  An ablation recomputing routing under a round-robin baseline reaches
  statistically the same weekly domain coverage, suggesting the concentration
  is not required to sustain the Router's own coverage target.
topic: an item-routing optimizer for Horizon Register scanning shifts to route ambiguous, cross-category signals toward whichever scanner can tick the most domain-coverage boxes at once, concentrating the register's genuinely novel entries into a small generalist pool while domain specialists field only routine renewals
