summary: >-
  A case-for-support brochure setting out the insulated heat line running from
  the Adaptive Metrics Lab's server room to a working glasshouse behind it,
  and the standing waste-heat utilisation figure Facilities reads from it each
  month. Draws on published findings from both Schools to argue the
  arrangement is one instance of a wider habit worth sustaining and extending
  to further sites across campus.
topic: >-
  the campus greenhouse Facilities heats with exhaust piped from the server
  room, and the waste-heat utilisation figure it quotes as proof of the
  computing cluster's efficiency even on weeks the growing beds sit unplanted
