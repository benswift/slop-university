title: "Reserved, Not Shortened"
subtitle: "Designing and Evaluating a Paper-Slip Reservation Scheme for the Shared Staff Microwave"
authors:
  - Sten Okwuosa
  - Thandiwe Solberg
preset: paper
school: School of Continuous Improvement
date: 2026-07-12
doi: 10.5555/slop.yvfijy
summary: >-
  A paper from the School of Continuous Improvement designs and evaluates the
  Reheat Slot Roster, a paper-slip reservation scheme for a heavily shared
  break-room microwave, finding complaint volume fell by four-fifths in the
  two quarters after deployment while a direct field measurement of
  wait-to-reheat time showed no detectable change. An ablation removing the
  scheme's Quick-Reheat Lane moved neither outcome.
topic: >-
  designing and trialling a paper-slip reservation scheme for the shared
  staff break-room microwave, then testing whether the drop in fairness
  complaints Facilities credits to the scheme tracks any change in how long
  someone actually waits to reheat their lunch
