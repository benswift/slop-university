title: Ticked Less, Weeded More
subtitle: >-
  A Failed Replication of a Household Chore-Wheel Accountability Finding at
  Apartment-Block Working-Bee Scale
authors:
  - Ronja Oyelaran
  - Kwame Lindqvist
  - Marit Osayande
preset: paper
school: School of Emergent Priorities
date: 2026-07-23
doi: 10.5555/slop.we5s9m
summary: >-
  A paper from the School of Emergent Priorities and the School of
  Continuous Improvement attempts to replicate an earlier finding that a
  household chore wheel's appeals process raises assignment-completion
  concordance without changing completion itself, deploying an equivalent
  public check-off board across 24 apartment-block working bees against 18
  matched buildings. The concordance effect does not reproduce, but audited
  task completion --- which the household study found flat --- rises under
  the public board and widens over four working-bee cycles.
topic: >-
  replicating a household chore-wheel accountability finding at
  apartment-block working-bee scale, this time with a public task check-off
  board
