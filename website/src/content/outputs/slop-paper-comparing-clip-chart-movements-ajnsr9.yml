title: "The Clip Moves, the Note Doesn't"
subtitle: >-
  An Interrupted Time-Series Analysis of a Classroom Behaviour-Chart
  Threshold Reset
authors:
  - Renke Sabel
  - Osei Vandermeer
preset: paper
school: School of Continuous Improvement
date: 2026-07-18
doi: 10.5555/slop.ajnsr9
summary: >-
  A paper from the School of Continuous Improvement exploits a
  platform-wide clip-chart threshold recalibration, delivered identically
  to 26 primary classrooms on the same day, as a natural experiment. A
  segmented-regression interrupted time series across 612 children and
  fourteen weeks finds an immediate, sustained level shift in logged
  clip-chart movements following the reset, with no corresponding shift in
  the incident notes schools send home; the decoupling holds when the
  sample is restricted to first-year teachers' classrooms.
topic: >-
  comparing clip-chart movements against the incident notes actually sent
  home before and after a primary school recalibrates its classroom
  behaviour-chart thresholds mid-term
pdf: /outputs/pdf/slop-paper-comparing-clip-chart-movements-ajnsr9.pdf
pages: 6
