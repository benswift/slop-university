title: "Directionally Consistent"
subtitle: "Replicating a Capability-Practice Divergence in AI-Drafted Assessment Feedback, and What Became of the Null Result"
authors:
  - Verity Marris
  - Anneke Tolan
  - Petra Umbile
preset: paper
school: School of Emergent Priorities
date: 2026-07-07
doi: 10.5555/slop.vh4mkq
summary: >-
  An attempted third-setting replication of a capability-practice divergence
  reported in two earlier internal analyses (lecture-capture scheduling and
  meeting-minute generation), tested here in Feedback Assist, a drafting aid
  for sessional-marker feedback comments. Across fourteen teaching units, one
  hundred and six markers, and an opt-out control cohort, a rising capability
  index (38% to 71% suggestion-acceptance across five releases) showed no
  reliable relationship with a coded Feedback Specificity Index (r = 0.04, n =
  218 marker-weeks, n.s.). A document-analysis trace of the School of
  Continuous Improvement's own quarterly reporting then finds the null result
  characterised as increasingly "directionally consistent" with the
  established pattern across four reporting cycles, without the underlying
  coefficient moving at all.
topic: attempting to replicate the University's own capability-erodes-practice finding in a new setting, an AI drafting assistant for sessional-marker feedback comments, finding no relationship at all, and tracing how the null result still became directionally consistent once it reached the school's dashboard
