title: "Logged as Reflection"
subtitle: "An Interview Study of What Happens Inside a Booked Wellbeing Pod"
authors:
  - Mirela Hanke
  - Dagny Okafor
preset: paper
school: School of Continuous Improvement
date: 2026-07-11
doi: 10.5555/slop.2yybzl
summary: >-
  A paper from the School of Continuous Improvement interviews 64 students
  shortly after a booking in one of the University's forty single-occupant
  wellbeing pods, coding what they report doing into a six-category
  taxonomy and setting it against the Living Dashboard's
  wellbeing-engagement tile, which counts every completed booking as
  restorative use. Coursework, a private phone call, and napping together
  account for three-quarters of coded sessions, against a smaller share for
  the reflection or mindfulness activity a booking must be filed under; a
  mid-term revision dropping the intake form's mandatory reason field
  changes neither the coded activity mix nor session duration, while the
  engagement tile continues climbing throughout.
topic: >-
  interviewing students about what they actually do inside the campus's new
  wellbeing reflection pods, against the booking log the Living Dashboard
  counts as a wellbeing-engagement indicator
