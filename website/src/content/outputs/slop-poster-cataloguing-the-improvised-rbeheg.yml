title: The Stamp Nobody Logged
subtitle: Restoring a Loyalty-Card Tally After the Scanner Fails
authors:
  - Dagny Okafor
  - Renke Sabel
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-17
doi: 10.5555/slop.rbeheg
summary: >-
  A research poster from the School of Continuous Improvement interviews 46
  counter staff across nine café sites on how they restore a loyalty-card
  tally after an app outage or a forgotten scan, then cross-checks 214
  logged restorations against the platform's own audit log. A backdated
  goodwill stamp explains most repairs after a network outage and a running
  paper tally after a forgotten scan, while the platform's own record
  accounts for under a sixth of either.
topic: >-
  cataloguing the improvised "goodwill stamp" rituals café counter staff use
  to restore a loyalty card's tally after an app outage or a forgotten scan,
  and modelling what a formal goodwill-stamp indicator would flatten out of
  the practice
pdf: /outputs/pdf/slop-poster-cataloguing-the-improvised-rbeheg.pdf
pages: 1
