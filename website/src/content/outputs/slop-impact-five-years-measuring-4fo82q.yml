title: Warned Early, Trusted Late
subtitle: >-
  Five Years of Automated Handovers, from Fare Gates to Retired Trust Scores
authors:
  - Casimir Beng
  - Mirela Hanke
  - Solveig Adeyemi
  - Osei Vandermeer
  - Renke Sabel
preset: impact-report
school: School of Continuous Improvement
date: 2026-07-19
doi: 10.5555/slop.4fo82q
summary: >-
  A School of Continuous Improvement impact report reviews five years of
  partnerships in which an automated system took over a decision --- a
  fare-gate override, a self-checkout flag, a call-centre route --- and
  tracks the staff and public trust that followed each handover. Across
  five impact areas the report finds that advance notice of an approaching
  handover correlates only loosely with trust six months on, and documents
  the retirement of at least one indicator that had outlived the question
  it was built to answer.
topic: >-
  five years measuring trust in the automated systems that now make calls on
  shop floors and service counters, and what changed once someone started
  tracking it
