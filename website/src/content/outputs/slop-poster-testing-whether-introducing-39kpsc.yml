title: Booked but Not Reordered
subtitle: Grill Order and Wait Time at a Courtyard Barbecue, Before and After a Sign-Up Board
authors:
  - Casimir Beng
  - Mirela Hanke
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-18
doi: 10.5555/slop.39kpsc
summary: >-
  A research poster from the School of Continuous Improvement tracks 812
  logged grill turns across 16 apartment-complex courtyards over 12 weeks,
  finding that a QR-coded sign-up booking board introduced at the study's
  midpoint left grill-turn order and median wait time statistically
  indistinguishable from the walk-up-only control arm, with only 34% of
  booked slots claimed in their reserved order.
topic: >-
  testing whether introducing a sign-up booking board for an apartment
  complex's shared courtyard barbecue changes actual queue order and wait
  times, or whether residents just keep grilling in whatever order they
  already showed up in
