title: "Freshly Worded, Still Adrift"
subtitle: "A Taxonomy of Terms-of-Reference Drift After a University-Wide Charter Refresh"
authors:
  - Osei Vandermeer
  - Anneke Tolan
  - Petra Umbile
preset: paper
school: School of Continuous Improvement
date: 2026-07-07
doi: 10.5555/slop.glpjfv
summary: >-
  A four-category taxonomy of charter–practice drift --- Ceremonial,
  Residual, Colonising, and Self-Fulfilling --- derived from 42 standing
  committees' charters coded against six months of logged meeting business
  before and after a university-wide AI-drafted charter refresh. The refresh
  reduced mean charter length by 18% and raised an independent clarity
  rating, but produced no significant shift in the taxonomy's category
  distribution or in mean Charter–Practice Alignment Index (Δ = +2.1
  points); charter length itself is uncorrelated with alignment (r = 0.06).
topic: sorting committee charters into a drift taxonomy after a shared AI drafting template rewrote every one of them in the same fortnight, classifying each by how far its actual business has moved from what the refreshed charter says it exists to do
