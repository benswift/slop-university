title: "Freed by the Cap, Refilled by the Cohort"
subtitle: >-
  Auditing a Residence-Hall Laundry-Booking Cap's Wait-Time Effect Against
  This Year's Larger Move-In
authors:
  - Bram Ntuli
  - Thandiwe Solberg
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-16
doi: 10.5555/slop.6k7xyr
summary: >-
  A research poster from the School of Continuous Improvement audits a
  residence hall laundry-booking cap's effect on the wait for a free washer
  across a ten-week term, split by whether a hall also absorbed this year's
  larger move-in cohort. Median wait falls 44% in halls whose population
  held steady but only 11% in halls carrying the overflow, a gap the cap's
  own pooled dashboard figure never surfaces.
topic: >-
  capping weekly laundry-machine bookings in a residence hall without
  adding a machine, and testing whether the wait for a free washer actually
  fell once this year's larger move-in cohort is accounted for
