title: "Reading the Drift Before the Workaround"
subtitle: "Forecasting Exam-Integrity Vulnerability from Capability Trajectories"
authors:
  - Verity Marris
  - Petra Umbile
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-06
doi: 10.5555/slop.a1psdd
summary: >-
  A three-cycle study regressing a capability-drift index for permitted study
  tools against the date each tool's first assessment-integrity workaround was
  reported. The drift index anticipated workaround emergence with a stable
  11.4-week lead (peak cross-correlation r = 0.79), and the authors propose
  triggering policy review from the forecast rather than the incident.
topic: forecasting exam-cheating workarounds before they're invented, by modelling the capability-drift trajectory of currently permitted study tools
