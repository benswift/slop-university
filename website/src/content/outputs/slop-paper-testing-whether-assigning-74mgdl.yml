title: The Name on the Tap
subtitle: >-
  A Natural Experiment on Whether a Sole Accountable Owner Speeds
  Water-Bubbler Repairs, or Only Relabels the Queue
authors:
  - Dagny Okafor
  - Osei Vandermeer
preset: paper
school: School of Continuous Improvement
date: 2026-07-15
doi: 10.5555/slop.74mgdl
summary: >-
  A paper from the School of Continuous Improvement runs a natural
  experiment across 146 campus water bubblers, comparing repair times for
  the 68 assigned a single named accountable owner against the 78 left on
  the University's pooled fault queue. Named-owner bubblers were repaired
  substantially faster (median 4.1 days versus 7.0 days), a gap that held
  from the pilot's first month and persisted whether or not the named
  owner was actually rostered on when the fault was logged.
topic: >-
  testing whether assigning one named staff member as the sole accountable
  owner of a campus water bubbler gets it fixed faster than routing the
  same fault through the anonymous Facilities queue, or just changes whose
  name is on the delay
pdf: /outputs/pdf/slop-paper-testing-whether-assigning-74mgdl.pdf
pages: 5
