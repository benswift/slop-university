title: "Confidently Filled, Rarely Correlated"
subtitle: "The Staff Car-Park Priority Score Against Independent Commuting-Need
  Measures"
authors:
  - Fenna Okoro
  - Petra Umbile
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-09
doi: 10.5555/slop.ojetat
summary: >-
  A poster from the School of Emergent Priorities tests the staff car-park
  Priority Score against commuting-need measures drawn independently of the
  application form. Across 214 renewals the score's rank showed no reliable
  association with need, tracked a form-completeness index closely, and
  agreed with a blind three-member need panel on 61 renewals.
topic: >-
  testing whether the staff car-park permit priority score tracks commuting
  need at all, or just how confidently a form is filled in
