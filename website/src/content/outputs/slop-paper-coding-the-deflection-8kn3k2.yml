title: "What the Roster Remembers"
subtitle: "A Coding Taxonomy of Deflection Annotations on the Shared-Office Pot-Plant
  Watering Roster"
authors:
  - Anouk Mensah
  - Marek Solheim
  - Verity Marris
preset: paper
school: School of Emergent Priorities
date: 2026-07-16
doi: 10.5555/slop.8kn3k2
summary: >-
  A paper from the School of Emergent Priorities develops a six-category
  coding taxonomy of the marginal annotations staff leave beside missed
  weeks on six shared-office pot-plant watering rosters, tracking each
  category's composition share and recurrence interval across eighteen
  months and three roster relaunches. Accountability-deflection and
  procedural-objection phrasing recur roughly three times more often than
  care-substitution or apology phrasing, an asymmetry that sharpens with
  each relaunch even as the laminated sheet carrying the record is
  discarded and replaced.
topic: >-
  coding the deflection language staff scrawl beside missed weeks on a
  shared-office pot-plant watering roster into a formal taxonomy, and
  tracking which phrases outlast the roster's own periodic relaunches
