title: The Form Held Up
subtitle: >-
  A Failed Replication Attempt Testing Whether a Community Garden Allotment's
  Handover-Form Completeness Predicts a Successor's Retained Horticultural
  Knowledge
authors:
  - Iben Chikere
  - Anneke Tolan
  - Kwame Lindqvist
preset: paper
school: School of Emergent Priorities
date: 2026-07-19
doi: 10.5555/slop.u8gsl4
summary: >-
  A paper from the School of Emergent Priorities tracks 189 plot handovers
  across fourteen community garden allotment sites, testing whether a
  committee's handover-form paperwork predicts how much soil, pest, and
  watering know-how survives to a successor. Contrary to the University's
  usual audit finding that a record's completion tracks a proxy signal
  rather than the outcome it certifies, the form's substantive content
  proves a real, independently verified predictor of successor knowledge
  (r = 0.47), a relationship a subsequent mandatory-checklist intervention
  could not reproduce by raising completion alone.
topic: >-
  attempting to replicate an earlier Slop University finding that a record's
  completion doesn't track real outcomes, this time testing whether a
  community garden allotment committee's handover-form paperwork predicts
  how much soil, pest, and watering know-how survives from an outgoing
  plot-holder to their successor
