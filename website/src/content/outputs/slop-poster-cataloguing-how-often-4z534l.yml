title: The Shed's Second Economy
subtitle: Peer-to-peer swaps a tool library's front-desk ledger never captures
authors:
  - Solveig Adeyemi
  - Mirela Hanke
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-19
doi: 10.5555/slop.4z534l
summary: >-
  A research poster from the School of Continuous Improvement interviews 96
  borrowers across three neighbourhood tool libraries at the close of a
  season, finding peer-to-peer handoffs equivalent to 41% of the season's
  logged returns while the front-desk return-rate KPI holds above 96%
  throughout, unmoved by the swaps it never recorded.
topic: >-
  cataloguing how often neighbourhood tool-library members swap a borrowed
  tool directly with each other rather than through the front desk, and how
  much of the shed's real circulation that leaves off the ledger's
  return-rate count
