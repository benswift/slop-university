title: Fastest Claimed, First Flagged
subtitle: >-
  Validating a Neighbourhood Giveaway Group's Templated-Listing Score
  Against a Volunteer Moderator's Bulk-Repost Adjudication
authors:
  - Runa Adegoke
  - Solveig Adeyemi
preset: paper
school: School of Emergent Priorities
date: 2026-07-19
doi: 10.5555/slop.z6ewos
summary: >-
  A paper from the School of Emergent Priorities validates a 6,400-member
  neighbourhood giveaway group's automated Templated-Listing Score against
  a volunteer moderator's independent adjudication of 632 flagged and
  unflagged posts, finding only slight agreement (kappa = 0.15) between the
  score and the moderator's read. The large majority of flagged posts
  resolve to members reusing the group's own recommended fast-claim
  phrasing rather than genuine bulk reposting, and a simpler detector built
  only from posting frequency agrees with the moderator more closely than
  the deployed score does.
topic: >-
  checking a neighbourhood give-away group's auto-flagged "templated
  listing" score against a volunteer moderator's own read of which posts
  are actually bulk reposts, rather than just descriptions that reuse the
  phrasing that gets things claimed fastest
