title: Named for the Algorithm, Absent at the Rack
subtitle: >-
  Assigning a Directly Responsible Individual to the Recreation Centre's
  Cardio-Booking Fairness Score, Against a Term of Towel-Held Treadmills
authors:
  - Dagny Okafor
  - Sten Okwuosa
preset: paper
school: School of Continuous Improvement
date: 2026-07-16
doi: 10.5555/slop.ww6wve
summary: >-
  A paper from the School of Continuous Improvement reports on the Recreation
  Centre's cardio-equipment booking algorithm's first term under a named
  Directly Responsible Individual, pairing the algorithm's own fairness-score
  logs against duty-manager incident reports and a coded typology of the
  tactics members use to hold equipment outside the app's booking record. The
  fairness score held within its target band for most of the term while
  towel-reservation and buddy-covering incidents rose sharply, and a
  matched-shift trial found the role's escalation authority made no
  detectable difference to weekly incident counts.
topic: >-
  naming a Directly Responsible Individual for the gym's cardio-equipment
  booking app's fairness algorithm, and cataloguing how members route around
  both anyway to hold a treadmill
