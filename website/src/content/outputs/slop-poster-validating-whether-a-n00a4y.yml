title: "Reading the Number Before the Round"
subtitle: >-
  Validating a Suburban Dog Park's Live Compliance Sign Against the
  Citations It Claims to Predict
authors:
  - Solveig Adeyemi
  - Bram Ntuli
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-18
doi: 10.5555/slop.n00a4y
summary: >-
  A research poster from the School of Continuous Improvement sets a
  suburban dog park's live off-leash compliance sign against the leash-law
  citations rangers issue each week across forty-six site-weeks and seven
  parks, finding ranger patrol timing tracks the sign's own overnight
  reading far more closely than it tracks either the citations or the
  phoned-in complaints the sign was installed to help validate.
topic: >-
  validating whether a suburban dog park's electronic sign --- which posts a
  live "off-leash compliance" percentage from an overhead camera count ---
  actually tracks the leash-law citations rangers issue that week, or whether
  rangers have started scheduling their patrols around the sign's own number
  instead of the complaints phoned in
