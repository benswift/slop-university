title: "Quiet, Then Counted"
subtitle: "Built for Capacity Planning, the Library Overflow-Desk Referral Log Spends a Term Tracking Names Instead"
authors:
  - Anouk Mensah
  - Lindiwe Achterberg
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-15
doi: 10.5555/slop.th7iml
summary: >-
  A research poster from the School of Emergent Priorities codes a term of
  referral-log entries from the Learning Commons' overflow desk against
  their stated intake reason, and interviews the duty staff who file them.
  The capacity-overflow reason the log was built to track falls from 58% of
  entries in week one to 24% by week twelve, while an unlisted "repeat
  name" flag rises from 8% to 52% over the same term, becoming the log's
  leading coded reason.
topic: >-
  auditing what the Learning Commons overflow desk's referral log is
  actually used for across a term of coded entries, against the
  capacity-planning rationale it was introduced under
