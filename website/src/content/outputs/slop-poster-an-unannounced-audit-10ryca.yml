title: "Right Sticker, Same Bin"
subtitle: "An Unannounced Audit Finds No Link Between Labelling Compliance and Discarded Food"
authors:
  - Petra Umbile
  - Mirela Hanke
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-12
doi: 10.5555/slop.10ryca
summary: >-
  An unannounced ten-week audit of nine shared kitchens weighs discarded food
  at every 48-hour labelling clear-out and matches it against Facilities'
  officially reported weekly labelling-compliance percentage. Reported
  compliance rose from 61% to 83% across the audit window; discarded weight
  showed no reliable association with it (r = -0.08, n = 90 kitchen-weeks).
topic: >-
  An unannounced audit of shared-kitchen fridge clear-outs, testing whether
  the labelling-compliance percentage Facilities reports each month has any
  relationship to how much food is actually thrown out.
