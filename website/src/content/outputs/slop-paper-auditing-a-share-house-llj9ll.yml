title: Filed, Not Forgotten
subtitle: >-
  A Field Study of Blame Recurrence After a Share House Adopts a
  Robot-Vacuum Incident Register
authors:
  - Ingeborg Nwachukwu
  - Marit Osayande
preset: paper
school: School of Continuous Improvement
date: 2026-07-22
doi: 10.5555/slop.llj9ll
summary: >-
  A paper from the School of Continuous Improvement compares 34 share houses
  with a shared robot vacuum, 23 of which keep a written incident register
  against 11 that do not, tracked over a fourteen-week term. Register houses
  argue about the vacuum at the same rate as houses without one, but their
  disputes cite a specific prior logged incident more than four times as
  often, with an ablation finding register status adds almost nothing to a
  model of weekly argument frequency.
topic: >-
  auditing a share-house robot-vacuum incident register, and whether logging
  each mishap reduces how often blame resurfaces in later arguments or just
  gives the arguments something to cite
pdf: /outputs/pdf/slop-paper-auditing-a-share-house-llj9ll.pdf
pages: 5
