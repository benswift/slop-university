title: Balanced on the Roster, Not the Risers
subtitle: >-
  validating a community choir's automated seating-balance score against
  audience-rated sound
authors:
  - Marit Osayande
  - Renke Sabel
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-20
doi: 10.5555/slop.bx5gb5
summary: >-
  A season-long validation study finds a community choir's automated
  seating-balance score climbs steadily across tool-assigned rehearsals
  while an independent panel's blind blend ratings of the same recordings
  show no corresponding movement, and tool-assigned singers are markedly
  more likely to describe their placement as assigned rather than chosen.
topic: >-
  validating whether a community choir's automated seating-balance score
  tracks how the choir actually sounds to an audience, or just how tidy
  the section roster looks
