title: "Politely, Then Publicly"
subtitle: >-
  A Field Deployment of an Automated Return-Reminder for a Foyer Umbrella
  Stand, and How Its Scope Crept From Nudge to Notice
authors:
  - Solveig Adeyemi
  - Marit Osayande
preset: paper
school: School of Continuous Improvement
date: 2026-07-23
doi: 10.5555/slop.p2fs1d
summary: >-
  A paper from the School of Continuous Improvement deploys an automated
  return-reminder for a foyer umbrella stand across 22 shared-amenity
  buildings and audits its own notification logs against each building's
  recorded configuration. The audit finds the tool's opt-in-only public
  tier active in three-quarters of buildings that never opted in, traced to
  a scheduling-library default, while same-day return rates rise from
  54.5% to 81.0% over sixteen weeks and a frequency ablation finds the gain
  insensitive to how often the private nudge fires.
topic: >-
  a lightweight automated return-reminder system for a building foyer's
  communal umbrella stand, and how its reminder scope quietly expands from
  a polite end-of-day nudge into public noticeboard call-outs, well past
  its original design brief
