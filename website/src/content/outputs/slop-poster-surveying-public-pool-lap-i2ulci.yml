title: The Board Changed, the Question Didn't
subtitle: >-
  A Pre/Post Patron Survey of Lifeguard Queries About Lane Rotation Before
  and After a Public Pool Installed a Digital Display
authors:
  - Joost Nwosu
  - Mirela Hanke
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-22
doi: 10.5555/slop.i2ulci
summary: >-
  A research poster from the School of Continuous Improvement surveys 412
  lap swimmers across three public pools before and after a digital
  lane-rotation display's installation. Self-reported lifeguard queries
  about lane rotation hold at 68% pre-installation and 66% post-installation,
  with legibility complaints rising in the first fortnight before flattening
  alongside every other measure tracked.
topic: >-
  surveying public-pool lap swimmers on whether a new digital
  lane-rotation display stops them asking the lifeguard which lane rotates
  next, comparing patron surveys from the three months before and after the
  display went in
