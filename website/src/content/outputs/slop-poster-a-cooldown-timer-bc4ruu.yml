title: "Passed to a Friend, Not Freed"
subtitle: >-
  Auditing a Cooldown Timer on the Shared Piano-Practice-Room Booking
  Terminal
authors:
  - Bram Ntuli
  - Joost Nwosu
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-16
doi: 10.5555/slop.bc4ruu
summary: >-
  A research poster from the School of Continuous Improvement audits a
  forty-five-minute same-card cooldown introduced on the shared
  piano-practice-room booking terminal to curb students rebooking themselves
  back-to-back. Same-card rebooking falls from 41% to 6% of slots within
  three weeks of the cooldown's introduction, but the distinct-booker share
  of those slots barely shifts, as most blocked rebooking attempts are
  followed within minutes by a booking from the same student's declared
  usual practice partner.
topic: >-
  a cooldown timer meant to stop students re-booking the shared piano
  practice room back-to-back for themselves, and whether it actually freed
  the room up for anyone else
