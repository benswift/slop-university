title: "Reinstated, Not Claimed"
subtitle: >-
  Auditing Whether Parking-Office Staff Log a Manually Reversed Permit
  Retirement as Their Own Call or the Priority-Tier Score's
authors:
  - Marek Solheim
  - Bram Ntuli
preset: paper
school: School of Emergent Priorities
date: 2026-07-16
doi: 10.5555/slop.ovm5ni
summary: >-
  A paper from the School of Emergent Priorities reconstructs the Parking
  Office's priority-tier score against 227 permits manually reinstated
  across four allocation cycles, finding that reversals logged as a score
  revision show no reconstructed change in the underlying score in the
  large majority of cases, while reversals logged as a staff override
  rarely coincide with one.
topic: >-
  auditing whether parking-office staff who manually reinstate a permit the
  priority-tier score flagged for retirement log the reversal as their own
  call, or quietly credit it to the score
pdf: /outputs/pdf/slop-paper-auditing-whether-ovm5ni.pdf
pages: 6
version: "1.0"
