title: "Categorised, Not Explained"
subtitle: "A Taxonomy of Stated Reasons on the Facilities Key Cabinet's Spare-Key Sign-Out Slip, and What Predicts How Long a Key Stays Checked Out"
authors:
  - Sten Okwuosa
  - Bram Ntuli
  - Joost Nwosu
preset: paper
school: School of Continuous Improvement
date: 2026-07-17
doi: 10.5555/slop.u7zfli
summary: >-
  A paper from the School of Continuous Improvement hand-codes one semester
  of Facilities key-cabinet spare-key sign-outs into a seven-category
  taxonomy of stated reasons, finding category membership only weakly
  predicts checkout duration while a simpler, orthogonal measure of how
  specifically the reason is written predicts it more reliably, unchanged
  by collapsing the taxonomy into fewer groups.
topic: >-
  a taxonomy of the reasons staff write on the facilities key cabinet's
  spare-key sign-out slips, and whether the stated reason predicts how long
  the key actually stays checked out
