title: "Waved Through, Not Booked In"
subtitle: "Hand-Signal Sequencing and the Loading Dock's Advance-Booking Forecast"
authors:
  - Verity Marris
  - Anneke Tolan
  - Ingrid Vasseur
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-17
doi: 10.5555/slop.zi0r6x
summary: >-
  A research poster from the School of Emergent Priorities interviews dock
  staff and delivery couriers across three loading bays, coding the
  hand-signal protocol that actually sequences trucks at the roller door
  against the advance-booking system's published forecast for the same
  shifts. Signalled order matched the forecast in 31-37% of cases across
  bays, a rate unmoved by a mid-study notice-board upgrade.
topic: >-
  interviewing loading-dock staff and delivery couriers about the
  hand-signal protocol they actually use to sequence trucks at the roller
  door, benchmarked against what the dock's advance booking system
  forecasts
