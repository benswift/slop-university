title: Confused, By the Numbers
subtitle: >-
  A Swipe-Card Audit of Wayfinding Time Before and After a Corridor's
  Directional Signage Became a Mural
authors:
  - Renke Sabel
  - Osei Vandermeer
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-12
doi: 10.5555/slop.q7mkxv
summary: >-
  A poster from the School of Continuous Improvement sets a corridor's
  badge-reader transit times against the confusion index Facilities
  introduced after repainting its directional signage into a mural, finding
  transit time recovered within two weeks while the index has not (r =
  0.23, n = 14, p = 0.42).
topic: >-
  auditing whether the swipe-card-derived confusion index Facilities
  introduced after replacing a corridor's directional signage with an
  inspirational mural actually tracks how long people take to find the
  room, or just how many complaints came in
