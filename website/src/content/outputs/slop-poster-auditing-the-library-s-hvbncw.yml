title: "Still Interim"
subtitle: "Auditing Seven Extensions to a Library Equipment Desk's Never-Confirmed Review Date"
authors:
  - Anouk Mensah
  - Marek Solheim
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-11
doi: 10.5555/slop.hvbncw
summary: >-
  A poster from the School of Emergent Priorities audits the Library's
  staffed equipment-loan sign-off desk, introduced as an interim measure
  after self-service kiosk return-condition disputes, against the review
  date its own governing committee has repeatedly extended. Monthly
  disputes fell from a kiosk-era mean of 13.4 to 2.1 within the desk's
  first quarter, and have stayed low through seven successive extensions
  of the arrangement's provisional status.
topic: >-
  auditing the library's "temporary" staffed equipment-loan sign-off desk,
  brought in after self-service kiosk return-condition disputes, to see how
  many times its review date has been quietly extended without ever being
  confirmed permanent
