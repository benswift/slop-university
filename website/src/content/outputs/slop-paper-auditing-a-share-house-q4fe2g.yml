title: Still Assigned to Whoever Left
subtitle: >-
  An Audit and Interview Study of a Share-House Chore-Roster Whiteboard
  Across Three Tenancy Turnovers
authors:
  - Anouk Mensah
  - Marek Solheim
preset: paper
school: School of Emergent Priorities
date: 2026-07-17
doi: 10.5555/slop.q4fe2g
summary: >-
  A paper from the School of Emergent Priorities audits 38 share-house
  chore-roster whiteboards against each house's own tenancy records,
  finding assignment-residency concordance falls from complete agreement
  at drafting to 22% by the third tenancy turnover. Interviews with 58
  current residents find the chores keep getting done through informal
  reassignment that never touches the board, and that a stated intention
  to redraw the roster does not predict whether a household actually does.
topic: >-
  auditing a share-house chore-roster whiteboard against who has actually
  lived there through three tenancy turnovers, and interviewing the
  current flatmates about why nobody has redrawn it
