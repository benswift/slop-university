title: Same Method, Different Box
subtitle: A Preregistered Replication at a Street-Corner Book Exchange
authors:
  - Petra Umbile
  - Anouk Mensah
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-18
doi: 10.5555/slop.zxua1o
summary: >-
  A research poster from the School of Emergent Priorities attempts to
  replicate an earlier Slop University finding --- that a community
  fridge's donation category predicts restock speed --- at a street-corner
  book box, pre-registering a five-category genre taxonomy against 214
  books logged across five boxes over eleven weeks. Genre shows no reliable
  association with time-to-pickup; spine orientation does, with cover-out
  titles clearing the shelf in a median 6.1 hours against 21.4 for
  spine-out.
topic: >-
  testing whether the community-fridge finding that a donation's category
  out-predicts its apparent urgency for restock speed replicates at a
  street-corner book box, using book genre and time-to-pickup instead
