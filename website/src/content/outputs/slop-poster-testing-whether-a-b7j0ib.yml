title: Same Call, Different Camera
subtitle: A Season-Long Swap-Cage Audit Finds No Added Safety Signal Beyond the Staff Glance
authors:
  - Ronja Oyelaran
  - Marit Osayande
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-20
doi: 10.5555/slop.b7j0ib
summary: >-
  A research poster from the School of Emergent Priorities and the School
  of Continuous Improvement audits a hardware chain's photo-based
  gas-bottle condition-check app against staff visual checks and an
  independent safety inspector's blind reassessment over a full season.
  App-graded and staff-graded decisions agree with each other on 96% of
  cylinders and match the inspector's independent read at closely
  comparable rates, while counter handling time rises by roughly 46
  seconds per swap once the app step joins the routine.
topic: >-
  testing whether a hardware-store chain's automated photo-based
  condition-check app, introduced at gas-bottle swap cages to catch
  unsafe cylinders before refill, actually catches anything a staff
  member's own visual check didn't --- comparing app-graded and
  staff-graded swap decisions against an independent safety inspector's
  blind reassessment over a full season
