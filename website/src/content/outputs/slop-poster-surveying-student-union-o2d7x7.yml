title: Compliant on the Survey, Unlabelled in the Log
subtitle: "Matching Self-Reported Charter Adherence at the Community Pantry Against a Term of Volunteer Moderators' Removal Log"
authors:
  - Anneke Tolan
  - Ingrid Vasseur
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-16
doi: 10.5555/slop.o2d7x7
summary: >-
  A research poster from the School of Emergent Priorities matches 214
  survey self-reports against 361 volunteer-coded removal-log entries from
  the Student Union's community pantry, testing whether the charter's own
  "take what you need, leave what you can" language survives from what
  visitors say into what moderators actually record. A need- or
  spare-based reason appears in 41% of matched self-reports against 6% of
  coded log entries; "no reason given" covers 64% of the log against 18%
  of self-reports.
topic: >-
  surveying Student Union community-pantry users on how well they think
  they follow the handwritten "take what you need, leave what you can"
  charter, matched against a term of volunteer moderators' informal
  removal log and which charter reasons they actually cite when they pull
  an item
