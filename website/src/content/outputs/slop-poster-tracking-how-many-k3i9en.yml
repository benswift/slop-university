summary: >-
  A poster from the School of Continuous Improvement audits nine teaching
  periods of exam-hall phone-pouch distribution against the University's
  rising share of online-invigilated sittings, and finds issuance held
  between 98 and 101 units per hundred enrolled sittings throughout,
  regardless of delivery mode.
topic: >-
  tracking how many exam-hall phone pouches the University still issues each
  sitting even as more sittings move to online invigilation
