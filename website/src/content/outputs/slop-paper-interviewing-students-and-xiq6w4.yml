title: Two Stations Short of the Map
subtitle: >-
  Interviewing Eighteen Campus Bike Users and a Contracted Technician About
  Locating a Working Self-Service Repair Station, Against a Directory the
  University Has Never Updated
authors:
  - Osei Vandermeer
  - Renke Sabel
preset: paper
school: School of Continuous Improvement
date: 2026-07-16
doi: 10.5555/slop.xiq6w4
summary: >-
  A paper from the School of Continuous Improvement interviews eighteen
  campus bike users intercepted at the three still-operating self-service
  repair stations, plus the contracted technician who maintains the
  network, after a 2024 construction project removed two of the network's
  five stations without the University's published station directory ever
  being corrected. Most interviewees rely on a personally held backup ---
  a remembered station, a friend's tip, a spare multitool --- rather than
  the directory; the two who consulted it were both misled to a station
  that no longer exists, and a check excluding one of two coders from the
  analysis leaves the finding unchanged.
topic: >-
  interviewing campus bike users and a contracted technician about how they
  actually find a working self-service bike-repair station, two years
  after construction fencing quietly took two stations off the network and
  the University's published station directory was never corrected to
  drop them
