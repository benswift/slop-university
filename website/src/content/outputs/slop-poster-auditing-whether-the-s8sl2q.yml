title: Closed on Schedule, Not Unloaded
subtitle: >-
  An Audit of the Loading Dock's Roller-Door Sensor Timer Against Drivers'
  Own Paper Dockets
authors:
  - Verity Marris
  - Casimir Beng
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-13
doi: 10.5555/slop.s8sl2q
summary: >-
  A poster from the School of Emergent Priorities checks the loading dock's
  new roller-door sensor timer against drivers' own paper dockets across a
  term of deliveries, finding the two records move together but the sensor
  consistently reports less time than crews actually spent unloading, with
  the gap widening on deliveries requiring a second pallet run.
topic: >-
  auditing whether the loading dock's new roller-door sensor timer,
  installed the week it replaced the dock crew's handwritten log, tracks
  how long a delivery truck actually takes to unload or just how long the
  door happens to stay up, checked against drivers' own paper dockets
  before and after the switch
