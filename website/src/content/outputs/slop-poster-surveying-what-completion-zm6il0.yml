title: "Posted Once, Believed Forever"
subtitle: "A Survey of Renovation-Completion-Date Recall Against a Hoarding Sign's Own Logged Revisions"
authors:
  - Verity Marris
  - Ingrid Vasseur
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-13
doi: 10.5555/slop.zm6il0
summary: >-
  A poster from the School of Emergent Priorities surveys 182 passers-by at
  a single renovation hoarding across an eighteen-week works period,
  matching each stated completion-date belief against the sign's own
  weekly-photographed revision log. Recall of the currently posted date
  falls to 9% by the study's close, while recall of the date first painted
  on the hoarding holds above 70% throughout five subsequent repaintings.
topic: >-
  surveying what completion date staff and students believe for a building
  under renovation, against the hoarding sign's own logged history of date
  revisions
