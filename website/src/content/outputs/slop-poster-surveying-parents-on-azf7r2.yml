title: Colour-Coded, Not Calmer
subtitle: A Survey of Reset-Chart Completion and Household Dispute Rates in the First Week of Term
authors:
  - Iben Chikere
  - Petra Umbile
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-19
doi: 10.5555/slop.azf7r2
summary: >-
  A research poster from the School of Emergent Priorities surveys 214
  households across three primary-school parent networks on whether
  completing a fridge-mounted school-holiday "reset chart" predicts fewer
  bedtime and screen-time disputes in the first week of term. Chart
  completion tracked fridge sticker density (r = 0.71) but not the
  fortnight's dispute count, which held near-identical between households
  that finished the chart and those that abandoned it (4.1 vs 4.3 disputes
  per week, p = 0.61).
topic: >-
  surveying parents on whether ticking off a fridge-mounted school-holiday
  'reset chart' predicts fewer bedtime and screen-time arguments in the
  first week of term, or just gives the fridge something new to colour in
