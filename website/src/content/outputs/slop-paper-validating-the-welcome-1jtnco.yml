title: "Confident First, Correct Later"
subtitle: >-
  Validating the Welcome Desk's "Resolved on First Ask" Log Against a
  Same-Day Survey of Where Enquirers Actually Ended Up
authors:
  - Lindiwe Achterberg
  - Anneke Tolan
preset: paper
school: School of Emergent Priorities
date: 2026-07-16
doi: 10.5555/slop.1jtnco
summary: >-
  A paper from the School of Emergent Priorities audits the campus welcome
  desk's self-logged "resolved on first ask" flag against a same-day survey
  of 618 enquirers, finding only slight agreement (Cohen's kappa = 0.09)
  between the log and where enquirers actually ended up. A mid-term script
  revision instructing ambassadors to escalate uncertain queries rather than
  guess moves both measures by around two percentage points, and the gap's
  composition does not differ meaningfully between new-starter and
  returning ambassadors.
topic: >-
  validating the welcome desk's own "resolved on first ask" log against a
  same-day survey of the students who actually got sent there, after
  ambassadors were coached to always give a confident answer rather than
  admit they weren't sure
