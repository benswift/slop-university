summary: >-
  A poster from the School of Continuous Improvement cross-reads 14
  fortnightly floor energy self-assessments against independently metered
  overnight power draw, finding the self-assessment tracks whether a shared
  photocopier's stand-by light was seen lit far more closely than it tracks
  the meter behind it.
topic: >-
  auditing whether a building floor's fortnightly energy-warden
  self-assessment tracks the floor's actual metered overnight power draw, or
  just whether the shared photocopier's stand-by light was seen lit at the
  last walkthrough
