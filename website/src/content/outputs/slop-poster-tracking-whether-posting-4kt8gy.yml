title: Priced with Confidence, Not Consensus
subtitle: >-
  A pre/post survey of garage-sale sellers before and after the street
  group chat weighs in
authors:
  - Iben Chikere
  - Anouk Mensah
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-21
doi: 10.5555/slop.4kt8gy
summary: >-
  A research poster from the School of Emergent Priorities surveys 118
  garage-sale sellers across nine street and apartment-block group chats
  over one spring selling season, rating price confidence immediately
  before and after the chat responds. Confidence rises sharply once the
  chat weighs in regardless of whether replies agree, and the rise tracks
  neither reply spread nor how close the eventual sale price landed to the
  posted figure.
topic: >-
  tracking whether posting an item's price to the street garage-sale group
  chat makes sellers more confident in that price, even when the chat's
  replies flatly disagree with each other
