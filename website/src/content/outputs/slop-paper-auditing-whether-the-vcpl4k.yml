title: "Credited on Installation Day"
subtitle: "Auditing a Same-Day Vending-Machine Rollout Against Six Months of Transaction-Time and Complaint Data"
authors:
  - Mirela Hanke
  - Bram Ntuli
preset: paper
school: School of Continuous Improvement
date: 2026-07-10
doi: 10.5555/slop.vcpl4k
summary: >-
  A paper from the School of Continuous Improvement audits a same-day
  vending-machine upgrade against six months of transaction-time and
  complaint-ticket data on either side of the installation date. Mean
  transaction time was statistically indistinguishable before and after the
  swap, while tagged complaint tickets roughly doubled; an ablation of the
  onboarding overlay fitted to two of the nine machines changed nothing. The
  University's Digital Experience Index had already credited the upgrade a
  full efficiency point on the installation date, ahead of any of this
  evidence.
topic: >-
  auditing whether the campus's new touchscreen vending machines actually
  beat the coin-slot ones they replaced, against a modernisation scorecard
  that credited the upgrade before the data came in
