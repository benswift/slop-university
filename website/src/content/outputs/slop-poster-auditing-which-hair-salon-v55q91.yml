title: Charged in Theory, Waived in Practice
subtitle: Auditing a Salon Booking App's No-Show Fee Against Front-Desk Overrides
authors:
  - Ronja Oyelaran
  - Anneke Tolan
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-20
doi: 10.5555/slop.v55q91
summary: >-
  A research poster from the School of Emergent Priorities and the School of
  Continuous Improvement audits a hair salon booking app's automatic no-show
  fee against front-desk practice across 46 salons and nine months of fee
  logs, finding staff waive a flagged fee at the desk in 38-44% of cases
  every quarter and that the app's own dispute-resolution log records only
  6% of those waivers. Interviews with 24 receptionists and managers surface
  informal, unrecorded grounds for a waiver that the app has no field for.
topic: >-
  auditing which hair-salon no-show fees a booking app actually charges,
  versus which ones staff quietly waive
