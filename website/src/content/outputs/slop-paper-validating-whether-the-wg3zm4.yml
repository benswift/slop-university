title: "The Schedule Waters Regardless"
subtitle: "A Validation Study of an Occupancy-Aware Quad Irrigation Controller Against a Term of Pedestrian Counts"
authors:
  - Casimir Beng
  - Mirela Hanke
  - Joost Nwosu
preset: paper
school: School of Continuous Improvement
date: 2026-07-10
doi: 10.5555/slop.wg3zm4
summary: >-
  A validation study of the central quad's occupancy-aware irrigation
  controller, testing whether its watering-suppression logic responds to
  independently measured pedestrian occupancy or simply repeats its
  underlying fixed timetable. A seven-week field validation across four
  irrigation zones and a two-week sensor-disconnection ablation both find no
  measurable relationship between occupancy and suppression, and no
  significant change in watering behaviour once the occupancy sensor is
  removed.
topic: >-
  validating whether the quad's "smart" occupancy-aware sprinkler controller
  actually adjusts its watering schedule to real-time foot traffic, or just
  repeats the fixed timetable it was installed with -- all-day pedestrian
  counts across a term found no measurable relationship between reported
  occupancy and watering suppression, reported as the null result it is, with
  the system now soaking the lunchtime crowd on schedule regardless of how
  many people are standing on the lawn
