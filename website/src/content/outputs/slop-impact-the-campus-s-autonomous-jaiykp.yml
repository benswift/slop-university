summary: >-
  The School of Continuous Improvement's third quinquennial Impact Report
  follows the University's autonomous path-cleaning and delivery fleet from
  its 2021 rollout to the Living Dashboard tile that now reports its uptime,
  tracing a widening gap between the tile's figure and the School's own
  independently walked audit of what the fleet actually completed.
topic: >-
  the campus's autonomous path-cleaning and delivery robots, and the uptime
  dashboard the University now treats as an audited proxy for how clean and
  well-served campus actually is
