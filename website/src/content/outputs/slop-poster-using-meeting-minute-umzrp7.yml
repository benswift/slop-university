title: "The Minute as Alibi"
subtitle: "Forecasting When Meeting-Summarisation Capability Outpaces Decision Verifiability"
authors:
  - Anneke Tolan
  - Verity Marris
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-06
doi: 10.5555/slop.umzrp7
summary: >-
  A three-year study relating a minute-generation capability index across
  eleven standing committees to an independent audit of decision-verifiability.
  Decision-verifiability fell as capability rose (r = -0.74), with the audited
  non-decision rate tracking the tool-upgrade schedule most closely; the
  authors propose a randomised-tool trial holding meeting length constant to
  isolate cause.
topic: using meeting-minute generation capability to forecast the point at which committees stop noticing no decision was made
