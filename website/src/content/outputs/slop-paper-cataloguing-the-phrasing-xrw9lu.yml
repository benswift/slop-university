title: "Back Soon, Still Waiting"
subtitle: "A Signage Taxonomy and Interview Study of Trust in Coin-Laundromat Repair Promises"
authors: ["Marek Solheim", "Anneke Tolan", "Anouk Mensah"]
preset: paper
school: School of Emergent Priorities
date: 2026-07-17
doi: 10.5555/slop.xrw9lu
summary: >-
  A paper from the School of Emergent Priorities catalogues 152
  out-of-service signs across twenty-four coin-laundromat sites into a
  phrasing taxonomy, pairing it with a term of interviews that find a
  specific repair date buys patrons far more patience than a vague or
  dateless sign despite carrying no reliable relationship to the machine's
  actual repair time.
topic: >-
  cataloguing the phrasing on "out of service" signs taped to washers and
  dryers across a chain of coin laundromats -- vague reassurance, a
  specific date, or no promise at all -- and interviewing regulars about
  which phrasing keeps them waiting nearby versus routing to another
  machine, and whether the promised date has any bearing on when the
  machine actually reappears
pdf: /outputs/pdf/slop-paper-cataloguing-the-phrasing-xrw9lu.pdf
pages: 5
version: "1.0"
