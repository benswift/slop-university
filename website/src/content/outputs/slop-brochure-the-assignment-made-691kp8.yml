summary: >-
  A research-showcase brochure arguing that Slop University's two Schools
  share a single habit --- treating an assignment made once at intake as a
  claim under standing review rather than a completed form --- and drawing
  together the Trajectory Analytics Group, the Horizon Register, and Futures
  in Committee alongside three of the University's own published studies of
  a seating group, a badge requirement, and a permit tier that each outlived
  the day they were assigned.
topic: >-
  the assignment made once at intake and never reconsidered again --- a
  seating group, a badge requirement, a permit tier --- read through three of
  the University's own published studies of the habit
