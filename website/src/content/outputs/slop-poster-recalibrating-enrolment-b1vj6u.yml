summary: >-
  A six-term comparison of reported enrolment headroom against actual
  enrolment and offer rates across a change to how headroom is calculated
  finds reported headroom rising sharply while enrolment and offer rates hold
  near constant, consistent with a definitional rather than operational
  shift.
topic: recalibrating 'enrolment headroom' so every school reports under its admissions cap and ahead of its growth target from the same unchanged enrolment count
