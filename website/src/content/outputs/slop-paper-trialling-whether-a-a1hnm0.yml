title: "Logged, Not Signed"
subtitle: Staff Confidence After a Pool Network Retires Its Paper Sign-In Ledger
authors:
  - Ingeborg Nwachukwu
  - Renke Sabel
preset: paper
school: School of Continuous Improvement
date: 2026-07-21
doi: 10.5555/slop.a1hnm0
summary: >-
  A paper from the School of Continuous Improvement compares eleven public
  swimming pool centres that kept a paper sign-in ledger against thirteen
  that retired it once an electronic turnstile log made the ledger
  redundant, tracking incident-report completion and dispute-resolution
  time across a fourteen-month window. Neither operational measure moves,
  but staff confidence that an incident could be reconstructed from the
  centre's records falls sharply where the ledger is dropped and holds
  where it is kept, a gap a printed summary of the same electronic log does
  not close.
topic: >-
  trialling whether a public pool can retire its paper sign-in ledger now
  the turnstile swipe already logs every entrant electronically, and
  tracking what happens to incident-report completion and
  dispute-resolution time once the paper trail is gone
