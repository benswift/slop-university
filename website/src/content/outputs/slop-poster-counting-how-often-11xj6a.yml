title: The Long Tail Never Serves
subtitle: "Auditing a Dining Hall's Forty-Dish Rotation Roster Against a Term of Till Tallies"
authors:
  - Joost Nwosu
  - Dagny Okafor
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-16
doi: 10.5555/slop.11xj6a
summary: >-
  A research poster from the School of Continuous Improvement matches a
  fourteen-week Autumn term of dining-hall till exports against the servery's
  forty-dish rotation roster, testing whether serving volume tracks the
  roster's even 2.5%-per-dish target. Three dishes account for 41% of covers
  against a combined rostered share of 7.5%; the remaining thirty-seven
  dishes, rostered for 92.5% combined, return 59% of covers, with eleven
  never rung across the term.
topic: >-
  counting how often the dining hall's promised forty-dish rotation roster
  actually reaches the tray, against a term of till tallies
