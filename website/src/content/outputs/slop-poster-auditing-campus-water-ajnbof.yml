title: "Tapped Hardest, Fixed First"
subtitle: "Auditing Whether Refill-Counter Reads Predict a Water-Fountain's Repair Priority"
authors:
  - Mirela Hanke
  - Bram Ntuli
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-11
doi: 10.5555/slop.ajnbof
summary: >-
  A poster from the School of Continuous Improvement sets 22 weeks of
  digital refill-counter reads against a blind condition audit of 56 campus
  water-bubblers, testing whether the counter Facilities uses to prioritise
  repairs tracks fountain wear or simply footfall. The two measures
  correlate weakly, and repair-queue position tracks proximity to
  lecture-theatre changeovers more closely than any audited measure of
  condition.
topic: >-
  auditing campus water-bubblers' digital refill counters against
  Facilities' repair queue, to see whether they predict which fountains are
  actually broken or just which ones get tapped hardest
