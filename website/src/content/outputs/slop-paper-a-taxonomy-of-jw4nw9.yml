title: "Closed, Reclassified, or Left Open"
subtitle: "A Hand-Coded Taxonomy of Bathroom-Break Integrity-Attentiveness Flags Across Eight Terms at the Exit Sign-Out Table"
authors:
  - Marek Solheim
  - Renke Sabel
preset: paper
school: School of Emergent Priorities
date: 2026-07-12
doi: 10.5555/slop.jw4nw9
summary: >-
  A paper from the School of Emergent Priorities and the School of
  Continuous Improvement hand-codes 617 integrity-attentiveness flags from
  eight terms of archived exam-hall sign-out records into a four-category
  taxonomy of how each flag was actually closed, finding formal resolution
  in only 13.5% of cases against a "resolved" checkbox marked in 62.5-72.2%
  of flags per term. An ablation redacting the checkbox from coders before
  taxonomy application shifts the finding by 0.2 percentage points.
topic: >-
  a taxonomy of how Slop University's in-person final-exam bathroom-break
  integrity-attentiveness flags actually get closed out once raised at the
  exit sign-out table, applied by hand to eight terms of exam files to see
  how many were formally resolved, quietly reclassified, or simply left
  open past the exam period
pdf: /outputs/pdf/slop-paper-a-taxonomy-of-jw4nw9.pdf
pages: 6
