title: Assigned Fair, Delivered by Favour
subtitle: >-
  A Survey of Cook-Night Adherence to a New-Parent Meal-Train App's
  Fairness-Scored Roster
authors:
  - Runa Adegoke
  - Solveig Adeyemi
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-19
doi: 10.5555/slop.xssj6p
summary: >-
  A research poster from the School of Emergent Priorities surveys 146
  households across 19 active meal-train rosters over fourteen weeks of an
  app-assigned cook-night schedule, finding that the app's own
  fairness-deviation score barely predicts whether a night is honoured or
  swapped. An informal roster-fatigue cue --- whether a household had cooked
  in the preceding fortnight --- tracks the swap far more closely, and the
  swap rate itself falls from 41% to 9% over the course of the roster.
topic: >-
  surveying meal-train volunteers on how often they honour a new-parent
  app's fairness-scored cook-night assignment, and what predicts a swap when
  they don't
