title: Scanned, Not Seen
subtitle: >-
  Interviewing Student-Society Event Organisers About What Noticeboard
  QR-Code RSVP Scans Miss About Who Actually Came
authors:
  - Ingrid Vasseur
  - Anouk Mensah
preset: paper
school: School of Emergent Priorities
date: 2026-07-15
doi: 10.5555/slop.b0njfs
summary: >-
  A paper from the School of Emergent Priorities checks the Noticeboard RSVP
  QR-code scan count that now sets student societies' room-allocation and
  funding tier against organiser-kept door tallies for 34 events. Scan
  counts correlate only weakly with door counts (r = 0.39) and run a median
  2.4 times higher, with the gap widest among organisers who reported
  knowing the count fed the tier decision; a device-deduplication check
  finds the inflation is not concentrated in a small number of repeat
  scanners.
topic: >-
  interviewing student-society event organisers about whether the QR-code
  RSVP scan count on their own noticeboard poster --- now the figure that
  decides next semester's room-allocation and funding tier --- bears any
  relation to how many people they actually watched walk through the door
