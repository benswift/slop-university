title: Gone Before the Truck
subtitle: Auditing How Much of a Council's Hard-Rubbish Diversion Figure Was Already Taken by Hand
authors:
  - Sten Okwuosa
  - Renke Sabel
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-18
doi: 10.5555/slop.y74xj1
summary: >-
  A research poster from the School of Continuous Improvement audits 214
  verge-side hard-rubbish piles across 11 suburbs against a council's own
  diversion-rate ledger, finding overnight removal's share of the logged
  figure rises from 42% to 81% across nine months of monitoring while the
  ledger's own entry moves by less than three percentage points.
topic: >-
  auditing how much of a council's verge-side hard-rubbish diversion figure
  was already gone by hand before the truck ever arrived
