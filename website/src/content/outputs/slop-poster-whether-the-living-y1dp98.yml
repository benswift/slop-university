title: "Reading the Cap as the Curve"
subtitle: "Self-Reported Hardship Against the Pantry's Fortnightly Cap"
authors:
  - Mirela Hanke
  - Casimir Beng
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-10
doi: 10.5555/slop.y1dp98
summary: >-
  A School of Continuous Improvement poster matches a confidential fortnightly
  need diary kept by 64 campus food-pantry users against the same users'
  official visit log across eight fortnights, with exit interviews from a
  subsample of 18. Diary-reported need rises 2.5× over the term while recorded
  visits hold within 0.84 to 0.98 of the pantry's one-visit-per-fortnight cap,
  the two series correlating at r = 0.34, and concordance is weakest among
  participants who exhaust their allocation earliest.
topic: >-
  whether the Living Dashboard's financial-hardship proxy tracks real student
  need or just the food pantry's own fortnightly visit cap
