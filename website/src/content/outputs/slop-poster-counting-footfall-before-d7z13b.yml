title: "Same Feet, Shorter Walk"
subtitle: >-
  A Before/After Headcount of a Relocated Shuttle Stop's Ridership Bump
authors:
  - Kwame Lindqvist
  - Lindiwe Achterberg
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-11
doi: 10.5555/slop.d7z13b
summary: >-
  A School of Emergent Priorities poster counts fourteen weeks of morning
  boardings at the East Precinct shuttle stop, spanning its mid-term
  relocation forty metres nearer the new engineering building, against the
  unmoved Western Avenue stop as a control. Mean daily boardings rise from
  41.2 before the move to 58.4 after (n = 3,014 boarding events), but the
  entire gain accrues within three service weeks and the control stop holds
  flat, consistent with a reallocation of existing pedestrian traffic rather
  than new demand.
topic: >-
  counting footfall before and after Facilities relocated the shuttle stop
  forty metres closer to the new engineering building, to see how much of the
  ridership increase is new demand rather than pedestrians who already walked
  past the old stop
