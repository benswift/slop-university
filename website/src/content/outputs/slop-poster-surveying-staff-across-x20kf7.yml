title: "The Charter Says You Decide"
subtitle: "Surveying Shared-Office Occupants Against Six Months of Central Override Logs"
authors:
  - Thandiwe Solberg
  - Casimir Beng
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-10
doi: 10.5555/slop.x20kf7
summary: >-
  A School of Continuous Improvement poster surveys 186 staff across six
  shared-office zones on how much authority the Shared Comfort Charter leads
  them to believe they hold over their local thermostat, and sets their
  estimates against six months of the central energy panel's own override
  logs. Respondents put local setpoint authority at 66 to 74 per cent of
  occupied hours; the panel's log records it at 4 to 12 per cent, and the
  Charter's control language is invariant across zones and tracks neither
  series.
topic: >-
  surveying staff across every shared-office zone on how much control the
  Shared Comfort Charter tells them they have over their thermostat, set
  against how often Facilities' central energy panel has quietly overridden it
