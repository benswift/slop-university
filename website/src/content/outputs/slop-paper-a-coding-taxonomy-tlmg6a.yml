title: One Tile, Five Categories
subtitle:
  A Coding Taxonomy of Campus Suggestion-Box Submissions Against What the
  Engagement Pulse Tile Carries Forward
authors:
  - Mirela Hanke
  - Renke Sabel
preset: paper
school: School of Continuous Improvement
date: 2026-07-12
doi: 10.5555/slop.tlmg6a
summary: >-
  A paper from the School of Continuous Improvement codes fourteen weeks of
  campus suggestion-box submissions into a five-category taxonomy and
  cross-walks each category against the University's six standing evaluation
  and review bodies. Only facilities and maintenance items are routed to
  individual action at scale, via a pre-existing work-order system
  unconnected to any of the six bodies; the remaining categories are absorbed
  into the Living Dashboard's Engagement Pulse tile with no individual action
  taken.
topic: >-
  a coding taxonomy of what campus suggestion-box slips actually say and what
  survives into the Living Dashboard's Engagement Pulse tile
