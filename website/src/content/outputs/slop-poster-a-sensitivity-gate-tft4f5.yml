title: "Relocated, Not Restricted"
subtitle: "Interviewing the Horizon Register's Redaction-Era Edit-History Holders"
authors:
  - Fenna Okoro
  - Ingrid Vasseur
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-09
doi: 10.5555/slop.tft4f5
summary: >-
  An interview study of eighteen staff who retain edit-history access to
  Horizon Register items redacted by the School's sensitivity gate, finding
  that most can reconstruct a redacted item's substance from its diff trail
  and most have already shared it with a colleague outside the shortlist.
topic: >-
  a sensitivity gate that redacts early-stage Horizon Register scanning
  items before wider circulation, tested by interviewing the shortlist of
  staff who keep edit-history access to find out whether they can still
  reconstruct exactly what was redacted from the diff trail and pass it on
  informally
