title: Same Balance, New Argument
subtitle: Structured Handovers for a Babysitting Co-op's Point Ledger
authors:
  - Iben Chikere
  - Anneke Tolan
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-20
doi: 10.5555/slop.xxp0r0
summary: >-
  A research poster from the School of Emergent Priorities reports a field
  trial across 41 babysitting co-ops testing whether a structured handover
  template changes what gets disputed when the ledger-keeper role passes to
  a new parent. Point-balance dispute rates and side-arrangement
  carry-forward were statistically indistinguishable between templated and
  freeform handovers over a ten-week window.
topic: >-
  testing whether a structured handover template for a babysitting co-op's
  point ledger reduces disputes over inherited balances when the
  ledger-keeper role passes to a new parent, compared to letting the
  outgoing keeper explain it however they like
