title: Signed Once, Checked Never
subtitle: Forecasting Whether a First-Assignment AI-Use Declaration Predicts Every Tick After
authors:
  - Kwame Lindqvist
  - Anouk Mensah
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-14
doi: 10.5555/slop.4vwn04
summary: >-
  A poster from the School of Emergent Priorities tracks 268 students' AI-use
  declarations across six assignment cover sheets in one semester, finding a
  student's first declared tick predicts every later one with near-total
  fidelity while an independent, submission-level reliance estimate shifts
  considerably over the same window.
topic: >-
  testing whether a student's AI-use declaration tickbox, once signed on a
  first assignment cover sheet, forecasts what they actually tick on every
  assignment after --- or just repeats itself regardless of what changed
