title: "The Rule Nobody Re-Read"
subtitle:
  "A Survey of Body-Corporate Chairs on What Happens When a Precautionary
  By-Law Reaches Its Own Sunset Date"
authors:
  - Iben Chikere
  - Kwame Lindqvist
  - Lindiwe Achterberg
preset: paper
school: School of Emergent Priorities
date: 2026-07-18
doi: 10.5555/slop.c1shzy
summary: >-
  A paper from the School of Emergent Priorities surveys committee chairs at
  193 residential strata schemes whose own precautionary by-law had reached
  its stated twelve-month review, finding that 61% of these rules continued
  with no motion recorded at all and that only 9% of the chairs behind that
  silence could name any evidence reviewed beforehand. A chair's own recall
  of the rule's precipitating incident showed no association with which of
  three outcomes their scheme reached.
topic: >-
  auditing whether a body corporate's preemptive twelve-month planter ban
  survives its own sunset, or whether the rule just rolls over unread
