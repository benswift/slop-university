title: "Built Not to Watch"
subtitle: "How CheckPoint's Participation Logs Reached the Living Dashboard Anyway"
authors:
  - Casimir Beng
  - Osei Vandermeer
preset: paper
school: School of Continuous Improvement
date: 2026-07-07
doi: 10.5555/slop.hxwf45
summary: >-
  An eighteen-month audit of the Living Dashboard's own query log tests
  whether CheckPoint, the School's opt-in wellbeing check-in tool, stayed
  structurally separate from the dashboard as its published pledge promises.
  A Query Boundary Index rose from 1% to 34% of dashboard queries across the
  window, unmoved by a mid-window reaffirmation of the pledge and
  concentrated in a small number of requesting units; a parallel
  staff-awareness item correlates with a fall in CheckPoint's own opt-in
  participation rate.
topic: a staff wellbeing check-in app built with an explicit no-monitoring pledge, whose participation logs get folded into the same performance dashboard the pledge promised to keep separate
