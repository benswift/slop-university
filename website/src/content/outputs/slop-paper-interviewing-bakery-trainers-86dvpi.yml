title: Ready by the Light, Not by the Hand
subtitle: >-
  What Bakery Trainers Say an Apprentice's Dough Sense Loses Once a Proofing
  Cabinet Starts Calling It
authors:
  - Iben Chikere
  - Ronja Oyelaran
  - Casimir Beng
preset: paper
school: School of Emergent Priorities
date: 2026-07-21
doi: 10.5555/slop.86dvpi
summary: >-
  A paper from the School of Emergent Priorities interviews 54 head bakers
  and trainers across 31 commercial bakeries about how a proofing cabinet's
  digital readiness gauge has changed what gets taught to a new apprentice,
  finding unprompted teaching of the traditional dough-readiness test falls
  from 88% to 35% across bands of cabinet tenure, and that covering the
  gauge for six weeks does not restore the lost coaching.
topic: >-
  interviewing bakery trainers about what a proofing cabinet's readiness
  gauge does to an apprentice's own dough judgement once it starts making
  the call
