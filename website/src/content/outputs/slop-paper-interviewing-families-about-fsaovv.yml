title: Packed for the Sticker
subtitle: >-
  An Interview Study of How Families Learn a Childcare Centre's Visual
  Formula for a Daily Healthy-Pack Check
authors:
  - Casimir Beng
  - Mirela Hanke
  - Ingeborg Nwachukwu
preset: paper
school: School of Continuous Improvement
date: 2026-07-23
doi: 10.5555/slop.fsaovv
summary: >-
  A paper from the School of Continuous Improvement interviews 34 parents
  and 11 room educators across six childcare centres about the visual cues
  that earn a lunchbox its daily "healthy pack" sticker, alongside a
  fourteen-week photographic audit scored against an independent nutrition
  rubric. The sticker-award rate rises from 38% to 81% of lunchboxes over
  the audit window while the rubric's own score holds flat, and a
  mid-study revision of the criteria changes only how many days families
  take to relearn them.
topic: >-
  interviewing families about the exact visual cues that earn a childcare
  lunchbox its daily healthy-pack sticker, and how fast the real contents
  drift once the formula is learned
