title: The Tap That Counts
subtitle: >-
  An Interview Study of What Sixty-Four Residents Do When a Strata Intercom's
  Security-Compliance Notification Fires
authors:
  - Casimir Beng
  - Solveig Adeyemi
  - Mirela Hanke
preset: paper
school: School of Continuous Improvement
date: 2026-07-19
doi: 10.5555/slop.22tpz2
summary: >-
  A paper from the School of Continuous Improvement interviews 64 residents
  across nine strata schemes to establish what a security-compliance audit's
  near-total notification-acknowledgement rate actually captures.
  Semi-structured interviews and a parallel dashboard audit find a reflexive,
  unread swipe overtaking two verification practices as tenure lengthens,
  while the audit's own time-to-acknowledge measure falls rather than rises
  across the same gradient.
topic: >-
  interviewing strata residents about what they actually do when the shared
  intercom's security-compliance notification fires, against the audit's own
  near-total acknowledgement-rate record
