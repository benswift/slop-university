summary: >-
  A case-for-support brochure setting out the University's staff wellbeing
  voucher scheme, redeemed at the campus café, gym, and bookshop, and the
  tracking system that follows each token from issue to redemption. Draws
  on the University's own published record to argue that a support
  program's value sits in the gap between who signed up and who showed up.
topic: >-
  a staff wellbeing voucher scheme redeemed at the campus café, gym, and
  bookshop, and how closely the university already tracks who claims it
  before the redemption window closes
