title: Always Room, Except When There Isn't
subtitle: >-
  Auditing a Share-House Parcel-Locker Bank's Hold Guarantee Under Load
authors:
  - Ronja Oyelaran
  - Iben Chikere
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-23
doi: 10.5555/slop.u2cxgn
summary: >-
  A research poster from the School of Emergent Priorities audits 1,842
  parcel-locker hold events across six share houses over sixteen weeks,
  matching each backend slot reassignment against the "held" status a
  resident's own app displayed at the same moment. Reassignment latency
  falls sharply as locker-bank occupancy approaches capacity, while the
  in-app badge continues reporting a slot as reserved for several minutes
  after it has already been reassigned, a lag that widens above ninety per
  cent occupancy.
topic: >-
  validating a share-house parcel-locker bank's 'always room, hold as long
  as you need' in-app promise against how fast a resident's slot actually
  gets reassigned once the bank nears capacity
