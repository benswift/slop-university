title: "Whoever Checked the Chat Last"
subtitle: "Developing and Validating a Pick-Up Reliance Scale for the School-Gate
  Handover"
authors:
  - Casimir Beng
  - Mirela Hanke
  - Iben Chikere
preset: paper
school: School of Continuous Improvement
date: 2026-07-18
doi: 10.5555/slop.efv97d
summary: >-
  A paper from the School of Continuous Improvement develops and validates
  the Pick-Up Reliance Scale, a twelve-item instrument scoring how much a
  parent leans on a class group chat over their own memory to manage the
  school-gate pick-up. Across two independent samples the scale's Handover
  Deferral items predict how often a household's own pick-up roster is
  renegotiated after the fact, while the instrument's total score shows no
  relationship with how often a parent checks their phone in the queue.
topic: >-
  validating a Pick-Up Reliance Scale that scores whether a parent leans on
  the class group chat or their own memory to run the school-gate pickup,
  and testing whether a high score predicts weaker handover between
  co-parents and more phone-checking while waiting
