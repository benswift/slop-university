title: "The Budget Line Was Already There"
subtitle: "A Survey of Master of Priority Studies Alumni on Capstone Panel Rank and Recommendation Implementation"
authors:
  - Ingrid Vasseur
  - Verity Marris
preset: paper
school: School of Emergent Priorities
date: 2026-07-09
doi: 10.5555/slop.aaxt6q
summary: >-
  A survey of Master of Priority Studies alumni finds a capstone panel's
  priority ranking has no bearing on whether a graduate's recommendation was
  ever implemented; what predicts implementation, overwhelmingly, is whether
  the sponsoring unit already held a matching budget line at pitch time.
topic: >-
  surveying alumni of the Master of Priority Studies on whether their
  capstone panel's priority ranking predicted whether the recommendation was
  ever implemented, and finding implementation tracks whether a matching
  budget line already existed far more than how the panel ranked it at pitch
  time
