title: One Bin, Fewer Butts
subtitle: >-
  Auditing a Smoking Shelter's Falling Butt Count Against an Independent
  Campus-Wide Sweep
authors:
  - Sten Okwuosa
  - Thandiwe Solberg
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-15
doi: 10.5555/slop.9a6na6
summary: >-
  A research poster from the School of Continuous Improvement audits a
  consolidated outdoor smoking shelter's monthly butt-collection count
  against an independent campus-wide litter sweep spanning fourteen months.
  The shelter's own log fell 61% over the study window; the independent
  sweep, covering the shelter and the six points it replaced, fell only 9%.
topic: >-
  auditing whether the new smoking shelter's shrinking cigarette-butt count
  means less campus smoking, or just one less place to look for it
