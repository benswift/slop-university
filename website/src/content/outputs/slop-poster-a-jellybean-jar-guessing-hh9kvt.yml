title: "Converging on Each Other, Not the Jar"
subtitle: >-
  Guess-Spread Collapse Across a Visible Jellybean-Census Sign-In Sheet
authors:
  - Mirela Hanke
  - Sten Okwuosa
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-16
doi: 10.5555/slop.hh9kvt
summary: >-
  A research poster from the School of Continuous Improvement compares 428
  jar-guessing entries from eleven Union Market stalls, tracking within-stall
  guess spread and accuracy against the jar's counted total across a
  sealed-ballot and an open sign-in-sheet condition over an 11-week term.
  Guess spread on the open sheet narrows by 72% across the entrant sequence,
  but median absolute error against the counted total rises by 46% over the
  same span, while the sealed condition holds flat on both measures ---
  undercutting the Adaptive Metrics Lab's practice of reading the sheet's
  narrowing spread as evidence of improving collective estimation.
topic: >-
  a jellybean-jar guessing competition run across student union stalls,
  comparing guesses submitted by sealed ballot against an open sign-in sheet
  where each entrant can see everyone before them, and whether the open
  sheet's shrinking spread of guesses is getting closer to the true count, or
  just to each other
