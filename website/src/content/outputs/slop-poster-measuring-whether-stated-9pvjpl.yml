title: Trusting the Beep
subtitle: Stated Confidence in Self-Checkout Error Prompts Does Not Predict Override-Button Use
authors:
  - Iben Chikere
  - Mirela Hanke
  - Casimir Beng
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-18
doi: 10.5555/slop.9pvjpl
summary: >-
  A research poster from the School of Emergent Priorities links 238
  supermarket shoppers' self-reported trust in a self-checkout's
  item-recognition error prompt to twelve weeks of their own override-button
  use across four store sites, finding no reliable association between
  stated trust and observed override behaviour.
topic: >-
  measuring whether shoppers' stated trust in a self-checkout's
  item-recognition error prompt predicts how often they hit the override
  button -- testing trust-calibration against twelve weeks of override-log
  behaviour, finding no reliable association between the two
