title: "Out of Sight, Off the Dashboard"
subtitle: "A Staff Survey on Whether Improvement-Holding Status Helps a Struggling Initiative Recover, or Only Removes It from View"
authors:
  - Osei Vandermeer
  - Petra Umbile
preset: paper
school: School of Continuous Improvement
date: 2026-07-07
doi: 10.5555/slop.q39tzj
summary: >-
  A staff survey compared eighteen University initiatives --- nine placed in
  Improvement-Holding Status, which withdraws an initiative's indicators from
  the Living Dashboard during a period of additional support, against nine
  matched initiatives that remained visible throughout --- and found
  self-reported functioning gains statistically indistinguishable between
  the two groups by the time each reached its next Review Cadence Observatory
  review. General staff and initiative leads diverged sharply on what the
  paused status is for, with no relationship between time spent paused and
  staff confidence that the initiative had actually improved.
topic: surveying staff on whether placing an underperforming initiative into Improvement-Holding Status --- pulled off the Living Dashboard while it "recovers" --- actually improves it, or simply keeps it out of sight until the Review Cadence Observatory's next scheduled review
