summary: >-
  A poster from the School of Continuous Improvement audits eighteen months
  of reflection-room visits across nine halls of residence and finds
  visit-length carries no reliable signal about whether a resident
  reappears in the following month's incident register.
topic: >-
  auditing a hall-of-residence reflection room's logged visit-minutes
  against whether the same residents reappear in next month's incident
  reports
