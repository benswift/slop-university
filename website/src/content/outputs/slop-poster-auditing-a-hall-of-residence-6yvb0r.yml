title: "Minutes Without Memory"
subtitle: >-
  Validating a Reflection Room's Visit-Minutes Log Against Next-Month
  Incident Recurrence
authors:
  - Mirela Hanke
  - Joost Nwosu
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-11
