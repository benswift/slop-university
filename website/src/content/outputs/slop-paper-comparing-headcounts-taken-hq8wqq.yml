title: "Present at the Muster, Missing from the Roster"
subtitle: >-
  A Term-Long Audit of a Fire-Drill Assembly Headcount Against a Building's
  Own Swipe-Card Entry Log, and the Floor-Warden Roster It Still Sizes
authors:
  - Mirela Hanke
  - Renke Sabel
  - Osei Vandermeer
preset: paper
school: School of Continuous Improvement
date: 2026-07-14
doi: 10.5555/slop.hq8wqq
summary: >-
  A paper from the School of Continuous Improvement audits a nine-storey
  administration building's fire-drill assembly-point headcount against its
  own swipe-card occupancy log across seven drills and nine floors, finding
  the two readings correlate only moderately and diverge in a floor-banded
  pattern that a marshal refresher briefing does not close. The building's
  floor-warden roster, sized each term from the headcount alone, would be
  assigned differently on three of the nine floors under the swipe-derived
  figure.
topic: >-
  comparing headcounts taken at a building's fire-drill assembly point
  against same-day swipe-card entry logs, to test whether Facilities should
  keep sizing floor-warden rosters off the muster count
