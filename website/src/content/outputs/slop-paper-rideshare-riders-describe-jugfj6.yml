title: Screenshotted, Just in Case
subtitle: An Interview Study of How Rideshare Riders Renegotiate Trust in the App's
  Upfront Fare Estimate After It Once Ran High
authors:
  - Mirela Hanke
  - Iben Chikere
preset: paper
school: School of Continuous Improvement
date: 2026-07-18
doi: 10.5555/slop.jugfj6
summary: >-
  A paper from the School of Continuous Improvement interviews 32 rideshare
  riders about how they relate to the app's upfront fare estimate once it
  has ever run high, developing a four-category taxonomy of coping
  behaviour that tracks a rider's own history of fare surprises and holds
  steady even after riders are told the estimate is labelled "informational
  only."
topic: >-
  rideshare riders describe how they relate to the app's upfront fare
  estimate once the final charge has ever landed higher — whether they
  start screenshotting the quote before every trip, mentally discount the
  number on sight, or stop checking altogether, and whether being told the
  estimate is "informational only" changes any of that
