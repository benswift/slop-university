title: "A Name For Everything We Hold"
subtitle: "The 2026-2031 Strategic Plan Replaces Shared Responsibility With a Single Named Steward, Down to the Library's Loaner Umbrellas"
authors:
  - Petra Umbile
  - Osei Vandermeer
preset: strategy
school: School of Emergent Priorities
date: 2026-07-13
doi: 10.5555/slop.sqfzth
summary: >-
  Slop University's Strategic Plan 2026-2031 commits the institution to
  naming one accountable steward for every asset, process, and shared
  resource it holds, retiring "shared responsibility" as a description of
  anything the University is meant to look after. Four strategic priorities
  carry the commitment from common-area equipment and shared research
  infrastructure through to committee governance and environmental
  stewardship, each with its own published targets and review dates.
topic: >-
  lean into named ownership: give every asset and process a single
  accountable steward
