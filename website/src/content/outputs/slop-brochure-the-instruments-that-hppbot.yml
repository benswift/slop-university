summary: >-
  A research-showcase brochure from the School of Continuous Improvement
  follows a public pool's drowning-detection alarm, a dog park's live
  compliance sign, and a council's hard-rubbish diversion tally into three
  published studies of what changes in human vigilance once each civic
  instrument takes over the watching.
