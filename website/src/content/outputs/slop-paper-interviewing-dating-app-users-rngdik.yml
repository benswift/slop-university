title: Going by the Chat Instead
subtitle: An Interview Study of When Daters Stop Trusting a Compatibility Percentage
authors:
  - Marit Osayande
  - Runa Adegoke
preset: paper
school: School of Continuous Improvement
date: 2026-07-21
doi: 10.5555/slop.rngdik
summary: >-
  A paper from the School of Continuous Improvement interviews 58 users of a
  widely used dating application about the point at which they stop trusting
  its displayed compatibility percentage, locating a median trust threshold
  of eleven exchanged messages. In a consenting subsample's match-history
  exports (n=41, 1,842 conversations), conversational half-life is
  statistically indistinguishable between matches scored above and below
  ninety percent, and high-scoring matches participants had privately
  written off continue to surface near the top of the recommended queue for
  a median of nine weeks afterward.
topic: >-
  interviewing dating-app users about when they stop trusting the app's
  compatibility percentage and start going by the chat instead, and what
  happens to the profiles that still score well
