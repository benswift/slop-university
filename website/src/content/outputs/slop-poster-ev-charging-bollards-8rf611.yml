title: "Plugged, Not Pulling"
subtitle: "A Failed Replication of the Water-Refill Tap/Fill Confound"
authors:
  - Fenna Okoro
  - Ingrid Vasseur
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-12
doi: 10.5555/slop.8rf611
summary: >-
  A poster from the School of Emergent Priorities fits campus EV-charging
  bollards with inline current clamps and runs a deliberate replication of
  the University's earlier water-refill tap/fill finding on a second
  Facilities dashboard, finding that reservation-only connections, plugged
  in but drawing no measurable current, account for a rising share of the
  bay-time counted toward next year's expansion business case.
topic: >-
  testing whether Facilities' EV-charging-bollard "utilisation" dashboard,
  the figure used to justify next year's bay-expansion business case, is
  inflated by drivers who plug in only to reserve the bay rather than to
  draw current, staged as a failed replication of the University's earlier
  water-refill tap/fill finding (10.5555/slop.gy1qjf) in a different
  Facilities dashboard, this time read by capacity planners rather than
  sustainability
