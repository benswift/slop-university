title: The Locker Moved, the Text Didn't
subtitle: Measuring Queue Time After an Overnight, Unsupervised Parcel Reassignment
authors:
  - Joost Nwosu
  - Thandiwe Solberg
preset: paper
school: School of Continuous Improvement
date: 2026-07-16
doi: 10.5555/slop.edlvio
summary: >-
  A paper from the School of Continuous Improvement reports a fourteen-week
  field deployment of an overnight optimiser that reassigns held parcels
  across the University Library's 96-compartment parcel wall to even out
  door-cycle wear and pre-empt queueing, without a human sign-off step and
  without ever resending the pickup notification a student receives at
  drop-off. Door-cycle wear variance fell by more than half across the
  term and held under a cadence ablation, but a third of pickups queued
  first at the notified compartment before finding it moved; a handwritten
  corrections list of unknown authorship, taped beside the wall, absorbed
  most of the resulting queueing cost.
topic: >-
  an unsupervised overnight optimiser that reassigns held parcels between
  numbered lockers on the library parcel-locker wall to balance wear and
  queueing, tested against how often students still queue at the locker
  number their pickup text gave them
