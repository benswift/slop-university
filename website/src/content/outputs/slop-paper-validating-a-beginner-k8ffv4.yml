title: "Matched With the Jig, Not Beyond It"
subtitle: "A Validation Study of a Beginner Potter's Centring-Skill Score Across a Community Studio's Jig-Assisted and Hand-Taught Cohorts"
authors:
  - Ingeborg Nwachukwu
  - Thandiwe Solberg
preset: paper
school: School of Continuous Improvement
date: 2026-07-22
doi: 10.5555/slop.k8ffv4
summary: >-
  A paper from the School of Continuous Improvement introduces the Wobble
  Score, an instrument validating a beginner potter's centring skill against
  blinded expert judges, deployed across four terms of a community ceramics
  studio's hand-taught and jig-assisted beginner cohorts. The score tracks
  expert judgement closely for hand-taught finalists but only weakly for
  jig-assisted finalists at their shared, jig-free final assessment, a
  divergence an ablation of the score's own weighting cannot explain away.
topic: >-
  validating a beginner potter's wobble score against expert judges' ratings,
  compared across a community studio's jig-assisted and hand-taught cohorts
