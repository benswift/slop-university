title: "Assigned, Then Renegotiated"
subtitle: >-
  Deploying an Algorithmic Fair-Rotation Roster for a Workplace Carpool
  Group, and Tracking How Many of Its Pairings Were Swapped Before a Single
  Assigned Rotation Ran
authors:
  - Ingrid Vasseur
  - Anneke Tolan
preset: paper
school: School of Emergent Priorities
date: 2026-07-22
doi: 10.5555/slop.k74ebc
summary: >-
  A paper from the School of Emergent Priorities reports the design and
  fourteen-week field deployment of an algorithmic fair-rotation roster for
  workplace carpool groups, tracking how often the tool's assigned driver
  for each week matched who actually drove. Across six four-person groups
  at two workplaces, a mean of 40% of assigned turns were swapped before
  running, holding flat across sites and unmoved by a reason field added to
  the tool's own swap-request form; most swaps were arranged in each
  group's pre-existing chat and entered into the tool only afterward, if at
  all.
topic: >-
  deploying a fair-rotation algorithm for a four-person workplace carpool
  roster, and tracking how many of its assigned pairings members swapped
  between themselves before a single algorithm-assigned rotation ever ran
