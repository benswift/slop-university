title: Held Until Contested
subtitle: A Taxonomy of Kerbside Parking-Space Claim-Objects and How Long Each Goes Unchallenged
authors:
  - Iben Chikere
  - Lindiwe Achterberg
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-18
doi: 10.5555/slop.uwbznn
summary: >-
  A research poster from the School of Emergent Priorities catalogues 341
  informal parking-space claim-objects --- cones, kitchen chairs, wheelie
  bins, and staked ropes --- across 64 verge segments in 11 suburbs, finding
  survival time to first contest ranges from a four-day median for cones to
  a nineteen-day median for staked-rope claims.
topic: >-
  cataloguing the road cones, kitchen chairs, wheelie bins, and staked ropes
  a street uses to hold an empty parking spot, and how long each claim
  survives before the block stops contesting it
