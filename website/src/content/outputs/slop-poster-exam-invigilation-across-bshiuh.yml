title: "Filed After the Fact"
subtitle: "Reversal Rationales in Committee Minutes and the Incidents They No Longer
  Cite"
authors:
  - Marek Solheim
  - Ingrid Vasseur
  - Verity Marris
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-09
doi: 10.5555/slop.bshiuh
summary: >-
  A document audit of the 24 committee decisions returning the University's
  finals to in-person invigilation, cross-reading each minuted justification
  against the dated integrity log as it stood when the item was first tabled.
  Three coders blind to teaching period agreed closely with one another
  (kappa = 0.81) and poorly with the record: the median item took 7.5 months to
  resolve, and no reversal minuted after the second half of 2024 cites the
  incident that prompted it. In 19 semi-structured interviews the chairs named
  the originating incident more often than their own minutes recorded it.
topic: >-
  exam invigilation across the University is being switched back to in-person
  after years of open-book take-home finals, officially over AI-cheating
  concerns --- auditing the committee minutes and interviewing the chairs
  behind each reversal finds the reason given now for the decision rarely
  matches the incident that was live and logged when the item was first
  tabled, months earlier
