title: High Score, Low Scrutiny
subtitle: >-
  A Two-Gate Quasi-Experiment on Whether Displaying a Boom Gate's
  Autonomous-Approval Score Changes Which Vehicles Security Actually Checks
authors:
  - Marek Solheim
  - Anouk Mensah
preset: paper
school: School of Emergent Priorities
date: 2026-07-14
doi: 10.5555/slop.j1l7f6
summary: >-
  A paper from the School of Emergent Priorities compares two matched
  car-park boom gates, one displaying its automatic number-plate reader's
  confidence score to staff and one logging it silently, finding
  console-linked intervention converges between the gates overall but nearly
  disappears in the top confidence band only where the score is shown to
  staff --- a divergence an independent desk audit finds is not explained by
  that band actually being any more likely to belong there.
topic: >-
  auditing whether showing security staff a car-park boom gate's live
  autonomous-approval confidence score changes how often they still buzz
  vehicles through by hand, and whether the vehicles they stop scrutinising
  are any less likely to actually belong there
