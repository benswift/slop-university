title: Spun Fair, Done Elsewhere
subtitle: >-
  A Household Chore Wheel's Assigned Turn Against Who Completed It, Before
  and After an Appeals Process for Disputed Turns
authors:
  - Runa Adegoke
  - Ronja Oyelaran
  - Kwame Lindqvist
preset: paper
school: School of Emergent Priorities
date: 2026-07-21
doi: 10.5555/slop.d7bnmg
summary: >-
  A paper from the School of Emergent Priorities tracks 76 households'
  magnetic chore wheels across an 18-week deployment, matching the wheel's
  posted weekly assignment against an independently logged record of who
  actually completed each of four tracked chores, before and after the
  households adopt a formal appeals process for disputed turns. Assignment
  concordance rises from a 61.2% baseline average to 87.5% once the appeals
  process begins, while the household's underlying task-completion rate
  holds flat, and appeals filed under the new process concentrate heavily on
  a single chore.
topic: >-
  validating a household chore wheel's assigned turn against who actually
  completed it, before and after a sibling appeals process for disputed
  turns
