title: "Same Flip, Six Readings"
subtitle: "What Actually Trips the Library Silent Floor's Noise Light Red"
authors:
  - Dagny Okafor
  - Thandiwe Solberg
preset: paper
school: School of Continuous Improvement
date: 2026-07-12
doi: 10.5555/slop.bmm3u3
summary: >-
  A paper from the School of Continuous Improvement develops and tests a
  six-category coding scheme for what actually triggers the traffic-light
  noise sensor on the University Library's silent-study floors, finding
  substantial inter-rater agreement and reset durations that range from
  three seconds to ninety-four. An ablation shows the distinction is
  invisible to the single "noise complaint" field Facilities currently logs
  against each event.
topic: >-
  an inter-rater reliability study of the six-category coding scheme built
  to audit what actually sets off the library silent floor's traffic-light
  noise sensor, because Facilities logs every trigger under the same 'noise
  complaint' box regardless of cause
