title: "Dressed as Data"
subtitle: "A Matched-Dossier Test of What Moves an Evaluation-of-Evaluation Panel Score"
authors:
  - Osei Vandermeer
  - Casimir Beng
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-08
doi: 10.5555/slop.gw64x7
summary: >-
  A three-cycle matched-pair study gave Evaluation-of-Evaluation panellists the
  same review dossier twice, differing only in an added one-page summary chart,
  and found the chart-bearing copy scored 13 to 15 points higher in every cycle
  despite identical content. The gap sat within a range the review's certified
  tolerance band treats as a genuine difference in case quality, held after a
  mid-study reminder that the content was fixed, and coincided with panellists
  citing a chart-only figure in 41% of their written justifications.
topic: stapling a summary chart to one copy of an otherwise identical review dossier, to see whether an Evaluation of Evaluation panel scores the two differently despite reviewers being told the content is unchanged
