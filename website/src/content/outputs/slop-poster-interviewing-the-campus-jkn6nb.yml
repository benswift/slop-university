title: "Read When the Queue Is Empty"
subtitle: >-
  Auditing the Motor-Pool Desk's Booking-Deposit Tier Against Its Own
  Written Risk Rubric
authors:
  - Fenna Okoro
  - Lindiwe Achterberg
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-17
doi: 10.5555/slop.jkn6nb
summary: >-
  A research poster from the School of Emergent Priorities reconstructs the
  motor-pool desk's written risk rubric against 1,140 pool-vehicle bookings
  across one teaching semester, cross-validated with eleven staff
  interviews. Charged-tier agreement with the rubric averages 82% while the
  key board is quiet and falls to 34% once three or more drivers are
  waiting, a pattern consistent across all three shift types.
topic: >-
  interviewing the campus motor-pool desk about how a booking's risk-tier
  deposit actually gets set, against the written rubric
