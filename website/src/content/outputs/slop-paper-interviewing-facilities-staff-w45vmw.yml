title: "Rostered, Not Registered"
subtitle: "Interviewing Facilities Key-Issuers Against the School Key-Register's Accountable-Owner Field"
authors:
  - Bram Ntuli
  - Joost Nwosu
preset: paper
school: School of Continuous Improvement
date: 2026-07-13
doi: 10.5555/slop.w45vmw
summary: >-
  A paper from the School of Continuous Improvement interviews 46 Facilities
  staff about who actually issues and reclaims keys for 71 cabinets across 24
  buildings, cross-referencing their accounts against the key-register's
  accountable-owner field. Exact correspondence held for only 22.5% of
  cabinets, and restricting the sample to recently-audited entries left the
  rate statistically unchanged, suggesting the register's own maintenance
  cycle is not what closes the gap between recorded and practised custody.
topic: >-
  interviewing Facilities staff about who actually issues and reclaims master
  keys day to day, against whichever name the school's key-register lists as
  the cabinet's formally accountable owner, and what the two never quite
  agreeing reveals about where responsibility for a shared resource actually
  sits
