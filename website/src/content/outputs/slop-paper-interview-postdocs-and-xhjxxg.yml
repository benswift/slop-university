title: "Reachable, Not Responsible"
subtitle: "An Interview Study of Byline Order on the University's Fast-Turnaround Research-Output Pipeline"
authors:
  - Verity Marris
  - Petra Umbile
  - Dagny Okafor
preset: paper
school: School of Emergent Priorities
date: 2026-07-08
doi: 10.5555/slop.xhjxxg
summary: >-
  An interview study of 34 postdoctoral and early-career researchers across
  both Schools examines how byline order is decided on the University's
  fast-turnaround research-output pipeline. Byline rank tracks reply speed
  within the Office of Research Outputs' 48-hour pre-release press query far
  more closely than it tracks self-reported analytic contribution, a pattern
  that holds after accounting for seniority.
topic: Interview postdocs and early-career researchers across both schools about how byline order gets decided on the University's fast-turnaround output pipeline, and find it tracks who is free to field the press office's questions in the 48 hours before release, not who did the analysis
