title: Earlier Alert, Same Load Left on the Line
subtitle: >-
  A Staggered-Rollout Quasi-Experiment on Storm-Alert Lead Time and Household
  Washing-Retrieval Timing
authors:
  - Kwame Lindqvist
  - Petra Umbile
preset: paper
school: School of Emergent Priorities
date: 2026-07-17
doi: 10.5555/slop.dhx4xh
summary: >-
  A paper from the School of Emergent Priorities instruments 40 households'
  outdoor clotheslines against a weather app's staggered rollout of an
  earlier storm alert, finding alert lead time rose 55 minutes while the
  households' own clearance margin rose only 5, with a household's prior
  false-alarm rate a stronger predictor of retrieval timing than the
  alert's lead time itself.
topic: >-
  testing whether moving a severe-weather app's storm alert an hour earlier
  gets suburban households to bring their washing in sooner, or just gives
  them a longer stretch of knowing it's coming
pdf: /outputs/pdf/slop-paper-testing-whether-moving-dhx4xh.pdf
pages: 5
