title: Counted Twice, Caught Once
subtitle: What a Human Pill Check Still Catches Beyond the Robot's Own Fill Log
authors:
  - Kwame Lindqvist
  - Casimir Beng
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-21
doi: 10.5555/slop.1ruz61
summary: >-
  A research poster from the School of Emergent Priorities matches a
  pharmacy dispensing robot's own weight-based fill log against the
  mandatory human pill count layered on top of it across 42 sites and a
  ten-month window. The human count independently catches only a modest
  share of additional discrepancies overall, and almost all of that margin
  concentrates in one failure class the robot's sensor cannot see: dosage
  strengths that look different on the shelf and weigh the same on a
  scale.
topic: >-
  verifying pharmacy pill counts against the dispensing robot's own fill log
