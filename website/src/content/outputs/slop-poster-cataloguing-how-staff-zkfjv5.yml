title: Reserved by Jumper, Missed by the Tally
subtitle: >-
  Cataloguing How Informal Picnic-Table Claims Escape Facilities'
  Sit-and-Count Tally
authors:
  - Thandiwe Solberg
  - Bram Ntuli
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-15
doi: 10.5555/slop.zkfjv5
summary: >-
  A research poster from the School of Continuous Improvement catalogues the
  informal signals --- a draped jumper, a laptop left mid-charge --- that
  staff and students use to claim a picnic table outside the library, and
  checks each against Facilities' quarterly walkthrough tally. A jumper or a
  laptop predicts the claimant's return within ten minutes in the large
  majority of coded sightings; the walkthrough tally logs the same table as
  "in use" in only a small fraction of those instances.
topic: >-
  cataloguing how staff and students informally reserve picnic tables
  outside the library --- a jumper draped over a seat, a laptop left
  mid-charge --- against Facilities' quarterly outdoor-furniture utilisation
  tally, which only counts a table "in use" if someone is sitting at it when
  the auditor walks past
