title: Notified, Not Yet Loaded
subtitle: Predictive Ready-for-Pickup Alerts Against a Parcel Locker's Own Door-Sensor Confirmation
authors:
  - Casimir Beng
  - Mirela Hanke
  - Joost Nwosu
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-17
doi: 10.5555/slop.yqm3vd
summary: >-
  A research poster from the School of Continuous Improvement compares a
  parcel-locker bank's predictive ready-for-pickup notification against the
  locker's own door-sensor load confirmation across three banks and eleven
  weeks, finding the faster alert arrives before the parcel is confirmed
  loaded in 18% of pickups, versus 0.9% under the legacy confirmed-load
  system.
topic: >-
  comparing a parcel-locker bank's predictive ready-for-pickup notification
  against its own door-sensor load confirmation, and whether shaving minutes
  off the alert costs students an empty-locker trip
