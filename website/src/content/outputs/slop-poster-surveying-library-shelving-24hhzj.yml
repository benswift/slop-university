title: "The Streak That Isn't"
subtitle: "Fortnightly Confidence Against a Roster That Breaks Its Own Bonus"
authors:
  - Joost Nwosu
  - Sten Okwuosa
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-11
doi: 10.5555/slop.24hhzj
summary: >-
  A poster from the School of Continuous Improvement surveys library shelving
  casuals every fortnight on their self-rated odds of reaching a semester
  consistency bonus, and matches each response against the roster system's
  own shift-continuity log. Self-rated confidence of seventy per cent or
  higher persists among a rising share of shelvers whose streak has already
  broken, climbing from four per cent of the cohort in fortnight two to
  twenty-nine per cent by fortnight six.
topic: >-
  surveying library shelving casuals each fortnight on their odds of hitting
  the semester consistency bonus, while the auto-generated roster keeps
  breaking the consecutive-shift streak the bonus requires
