title: "Still Registered, Rarely Ridden"
subtitle: "Interviewing Bike-Rack Permit-Holders Against an Index That Only Climbs"
authors:
  - Renke Sabel
  - Osei Vandermeer
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-10
doi: 10.5555/slop.qjaeiq
summary: >-
  A School of Continuous Improvement poster interviews 38 active bike-rack
  permit-holders about their current riding habits and sets self-reported
  frequency against the sustainability office's cycling-participation index,
  finding the two diverge as the register climbs on a renewal cycle that
  never prompts a lapsed rider to cancel.
topic: >-
  interviewing staff who still hold a bike-rack permit about whether they
  still cycle in, against the sustainability office's cycling-participation
  index built from permits nobody bothers to cancel
