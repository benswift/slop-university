title: Logged as Watered, Kept Alive by the Corridor
subtitle: >-
  A soil-moisture instrument validated against 14 weeks of informal
  office-plant care
authors:
  - Sten Okwuosa
  - Thandiwe Solberg
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-12
doi: 10.5555/slop.zi5oe0
summary: >-
  A poster from the School of Continuous Improvement validates the office-plant
  watering agent's soil-moisture log against 14 weeks of covertly observed pot
  condition across eleven shared kitchenettes. The agent's claimed watering
  rate holds flat regardless of foot traffic; 14-week pot survival does not,
  and most logged "successful waterings" follow an unlogged hand top-up.
topic: >-
  validating whether an office-plant watering agent's soil-moisture readings
  actually predict which pot plants survive, against the staff who keep
  quietly topping them up by hand
