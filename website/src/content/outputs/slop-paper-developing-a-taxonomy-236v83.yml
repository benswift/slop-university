title: "The Ticket Confirms What the Marshal Already Called"
subtitle: "A Taxonomy of Queue-Order Disputes Across Airport Taxi Ranks With and Without a Numbered-Ticket Dispenser"
authors:
  - Ronja Oyelaran
  - Fenna Okoro
  - Casimir Beng
preset: paper
school: School of Emergent Priorities
date: 2026-07-22
doi: 10.5555/slop.236v83
summary: >-
  A paper from the Schools of Emergent Priorities and Continuous Improvement
  develops a seven-category taxonomy of taxi-rank queue-order disputes and
  codes it across 22 airport and rail-interchange ranks (13 dispenser-equipped,
  9 marshal-only) over 14 weeks and 3,204 boarding cycles. A numbered-ticket
  dispenser reduces arrival-order disputes from 6.1 to 0.4 per 100 cycles, but
  total disputes per 100 cycles are statistically indistinguishable between
  conditions (12.2 vs 12.6; p = 0.61), with the difference concentrating
  instead in break re-entry priority disputes the dispenser was never built to
  adjudicate.
topic: >-
  developing a taxonomy of queue-order disputes at airport taxi ranks that use
  a numbered-ticket dispenser versus ranks that rely on the marshal's call,
  and coding which dispute types the ticket system actually resolves
