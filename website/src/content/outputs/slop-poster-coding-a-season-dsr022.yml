title: Some Notes Get Answered Faster
subtitle: >-
  Coding a Community Fridge's Handwritten Notes Against How Long Each Waited
  for a Restock
authors:
  - Iben Chikere
  - Petra Umbile
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-18
doi: 10.5555/slop.dsr022
summary: >-
  A research poster from the School of Emergent Priorities codes 214
  handwritten notes left on a suburban community fridge across an 18-week
  season into a four-category taxonomy, finding a note's category predicts
  its restock response far more closely than its apparent urgency, with
  warning notes drawing a volunteer visit in a median 3.3 hours against 26.0
  for requests.
topic: >-
  coding a season of handwritten notes left on a suburban community fridge
  into a taxonomy of thank-yous, requests, and warnings, and testing whether
  the note's category predicts how many hours pass before a volunteer
  restocks in response
