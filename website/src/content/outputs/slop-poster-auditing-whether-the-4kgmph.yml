title: "Yesterday's Count, Tomorrow's Rain"
subtitle: "Forecasting vs Naive Restocking of the Campus Loaner-Umbrella Bins"
authors:
  - Fenna Okoro
  - Ingrid Vasseur
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-14
doi: 10.5555/slop.4kgmph
summary: >-
  A poster from the School of Emergent Priorities compares the Horizon
  Register's wet-weather forecast against a same-as-yesterday restocking
  rule across six loaner-umbrella bins over a full term. Restocking
  shortfall is indistinguishable between the two rules except on the
  heaviest-rain mornings, where the forecast reduces mean shortfall by
  roughly a third.
topic: >-
  auditing whether the Horizon Register's wet-weather forecast beats a
  naive same-as-yesterday rule for restocking the campus loaner-umbrella
  bins
