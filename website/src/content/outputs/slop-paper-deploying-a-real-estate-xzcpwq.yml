title: Scanned Rarely, Compared Almost Never
subtitle: >-
  A Fourteen-Week Deployment of a Real-Estate Shopfront's "Photos Enhanced"
  Disclosure QR Code, and What Passers-By Did Once They Reached the
  Comparison Page
authors:
  - Runa Adegoke
  - Marit Osayande
preset: paper
school: School of Emergent Priorities
date: 2026-07-20
doi: 10.5555/slop.xzcpwq
summary: >-
  A paper from the School of Emergent Priorities and the School of
  Continuous Improvement deploys a printed short-code and QR disclosure
  instrument across 187 real-estate shopfront listings for fourteen weeks,
  finding that a randomised increase in sticker size left the scan rate
  unchanged and that only 9% of scans went on to use the linked
  comparison page's own before/after toggle, regardless of branch foot
  traffic.
topic: >-
  deploying a real-estate shopfront's "photos enhanced" disclosure QR code
  across its shopfront listing cards, and auditing how many passers-by
  actually scan it and what they do once they reach the unedited comparison
  photo
