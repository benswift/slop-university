title: Weighed In Before It's Weighed
subtitle: >-
  Harvest-Bag Estimates at a Community-Garden Shed Track the Scale's Display,
  Calibrated or Not
authors:
  - Ingrid Vasseur
  - Anneke Tolan
  - Petra Umbile
preset: paper
school: School of Emergent Priorities
date: 2026-07-16
doi: 10.5555/slop.kvkc0b
summary: >-
  A paper from the School of Emergent Priorities tracks 326 harvest-bag weigh
  events across fourteen community-garden working-bee sessions, comparing
  volunteers' own eyeballed weight guesses against the toolshed scale's
  digital display and a term-end calibration check. Guess spread collapses by
  queue position at a similar rate whether that day's scale is later
  confirmed accurate or found reading 0.35-0.45 kilograms high, and a
  "guess before you look" sign introduced midway through the term does not
  measurably change the pattern --- guesses converge on the display, not the
  bag, whether or not the display is right.
topic: >-
  harvest-bag weight estimates from community-garden volunteers drifting
  toward the shed's digital scale reading once it's switched on, even in
  weeks the scale is later found miscalibrated
