title: "Signed Without Scrolling"
subtitle: >-
  Typologising the Human Sponsors of Junior Netball's Automated
  Team-Selection App
authors:
  - Marit Osayande
  - Renke Sabel
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-20
doi: 10.5555/slop.msvq20
summary: >-
  A four-category typology of how junior netball clubs' nominal human
  sponsors describe their own oversight of an automated team-selection app,
  drawn from 64 interviews across 18 clubs. Genuine override is the rarest
  category throughout, and rarest still at the clubs most reliant on the
  app.
topic: >-
  classifying how junior netball clubs' nominal human sponsors describe
  their own oversight of an automated team-selection app, from rubber stamp
  to active override
