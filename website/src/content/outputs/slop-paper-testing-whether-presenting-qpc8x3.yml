title: "Presenting the Case, Postponing the Turn"
subtitle: "A Null-Result Study of Improvement Grand Rounds and Failure Recurrence"
authors:
  - Bram Ntuli
  - Osei Vandermeer
  - Casimir Beng
preset: paper
school: School of Continuous Improvement
date: 2026-07-09
doi: 10.5555/slop.qpc8x3
summary: >-
  A four-year audit of the School of Continuous Improvement's Improvement
  Grand Rounds case-review seminar finds no reliable difference in
  recurrence-free interval between failure-mode cases selected for
  presentation and cases logged but never called (n = 61, log-rank p = 0.61).
  A robust scheduling effect predicts otherwise: each prior presentation a
  unit has delivered adds roughly three weeks before its next roster slot
  (p < 0.01), independent of its ongoing incident volume. An ablation
  restricting the comparison to cases with a documented follow-up action item
  changes the recurrence result not at all.
topic: testing whether presenting a failure case at Improvement Grand Rounds reduces how often that same failure recurs, and finding the only reliable effect of presenting is a longer gap before the presenter's own unit is scheduled again
