title: "The Sophistication Penalty"
subtitle: "Automated Camera-Switching Capability and Lecture Recall"
authors:
  - Casimir Beng
  - Osei Vandermeer
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-06
doi: 10.5555/slop.gc05wo
summary: >-
  A three-semester study relating installed lecture-capture capability across
  six theatres to post-lecture recall scores. Recall fell as installed
  capability rose (r = -0.72), with automated switch frequency, not camera
  count, carrying the association most consistently; the authors propose a
  randomised-tier trial holding switch frequency constant to isolate cause.
topic: testing whether more capable lecture-capture automation makes recorded lectures worse to learn from
