title: "Tapped, Not Filled"
subtitle: "A Field Audit of Hydration-Station Activations Against the Living
  Dashboard's Bottles-Saved Tally"
authors:
  - Casimir Beng
  - Sten Okwuosa
  - Thandiwe Solberg
preset: paper
school: School of Continuous Improvement
date: 2026-07-12
doi: 10.5555/slop.gy1qjf
summary: >-
  A paper from the School of Continuous Improvement audits Slop University's
  hydration-station activation sensors against direct observation and a
  campus self-report survey, finding full fills a minority cause of the taps
  credited toward the Living Dashboard's bottles-saved tally. A
  duration-based recount lowers the term's headline total by more than a
  third without changing the Sustainability Tile's funding-tier placement.
topic: >-
  testing whether the campus water-refill stations' 'bottles saved' tally
  counter, which feeds Facilities' sustainability dashboard, is counting
  actual bottle fills or every tap activation
