title: Cleared by the Volunteer, Not the Rubric
subtitle: >-
  An Interview Study of Override Decisions on a Library Summer Reading
  Challenge's Authorship-Check Score
authors:
  - Dagny Okafor
  - Mirela Hanke
  - Solveig Adeyemi
preset: paper
school: School of Continuous Improvement
date: 2026-07-19
doi: 10.5555/slop.t64dph
summary: >-
  A paper from the School of Continuous Improvement interviews 22 volunteer
  reviewers across a nine-branch public library network about the flagged
  entries they most recently ruled on in a summer reading challenge, finding
  that override decisions track cues absent from the authorship-check
  score's own feature set far more than they track the score's own
  magnitude, a pattern a retrospective feature-ablation leaves undisturbed.
topic: >-
  interviewing library volunteers who triage a summer reading challenge's
  automated authorship-check flags on children's logbook entries, to learn
  the tacit cues behind their override decisions and how often those
  overrides reverse the score
pdf: /outputs/pdf/slop-paper-interviewing-library-t64dph.pdf
pages: 5
version: "1.0"
