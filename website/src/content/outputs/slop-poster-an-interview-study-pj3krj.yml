title: Traded Before They're Earned
subtitle: >-
  An Interview Study of the Informal Minute-Economy Around a Household
  Screen-Time Ledger
authors:
  - Mirela Hanke
  - Casimir Beng
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-19
doi: 10.5555/slop.pj3krj
summary: >-
  A research poster from the School of Continuous Improvement interviews 34
  households across the school holidays about the informal trades they
  invent once a screen-time app's earned-minutes ledger runs dry, finding
  next-day borrowing overtakes sibling and chore swaps by the second week
  while the app's own sanctioned borrow-ahead feature goes almost entirely
  unused.
topic: >-
  an interview study of the informal minute-trading economy families
  invent around a household screen-time app's earned-minutes ledger over
  the school holidays
