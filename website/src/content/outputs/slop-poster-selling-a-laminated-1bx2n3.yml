title: Skipped the Line, Not the Wait
subtitle: A Paid Priority Lane and the Delay It Just Moved Onto Everyone Else
authors:
  - Mirela Hanke
  - Ronja Oyelaran
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-20
doi: 10.5555/slop.1bx2n3
summary: >-
  A research poster from the School of Continuous Improvement reports a
  ten-week trial across six primary schools testing whether a paid
  "priority lane" car-pool permit gets families out of pickup faster.
  Permit holders left 2.6 minutes earlier on average, but general-lane
  departures at priority-lane schools ran 2.3 minutes slower than at
  matched schools with no lane at all, accounting for nearly all of the
  time the permit appeared to save.
topic: >-
  selling a laminated "priority lane" permit to primary-school car-pool
  families, and testing whether permit-holders actually leave pickup
  earlier or the delay just relocates onto the general lane
