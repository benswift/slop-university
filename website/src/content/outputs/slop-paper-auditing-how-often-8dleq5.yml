title: "The Door Remembers, the Desk Moves On"
subtitle: >-
  Auditing a Shared Postdoc Office's Sliding-Tab Nameplate Against Its
  Weekly Hot-Desk Roster
authors:
  - Sten Okwuosa
  - Bram Ntuli
preset: paper
school: School of Continuous Improvement
date: 2026-07-14
doi: 10.5555/slop.8dleq5
summary: >-
  A paper from the School of Continuous Improvement audits nine shared
  postdoctoral offices' sliding-tab door nameplates against the weekly
  hot-desk booking calendar across a full teaching period, finding the tab
  matches the roster in 71% of the 504 desk-weeks audited but accounts for
  74% of the semester's misdirected mail, parcels, and visitors when it
  doesn't. A laminated reminder card left the match rate statistically
  unchanged.
topic: >-
  auditing how often a shared postdoc office's sliding-tab door nameplate
  matches who is actually rostered to the desk that week, and tracing where
  misdirected mail, parcel drop-offs, and drop-in visitors end up when it
  does not
