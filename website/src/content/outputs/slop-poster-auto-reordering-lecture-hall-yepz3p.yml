title: Same Sensor, Different Tray
subtitle: Retesting a Waste-Bin Fill-Rate Correlation on Lecture-Hall Printer Paper
authors:
  - Marek Solheim
  - Kwame Lindqvist
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-16
doi: 10.5555/slop.yepz3p
summary: >-
  A research poster from the School of Emergent Priorities ports a
  confidential-waste-bin sensor pilot's fill-level auto-reorder rule,
  unmodified, onto twelve lecture-hall printer-paper trays over a 14-week
  term. The originating pilot's fill-level correlation (r = 0.74) does not
  transfer to the printer trays (r = 0.11, n = 168 tray-weeks), and
  printroom staff overrode the ported rule's reorder trigger in most
  flagged weeks, reordering instead off a folded paper sample kept in the
  tray.
topic: >-
  auto-reordering lecture-hall printer paper off a fill-level sensor,
  replicating the campus waste-bin correlation study on a different asset
  to see if the rule it inspired actually works
