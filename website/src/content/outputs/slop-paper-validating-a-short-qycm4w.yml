title: The Perceived Ceiling Scale
subtitle: >-
  Validating an Instrument for When "No Borrowing Limit" Starts to Cap Out
authors:
  - Renke Sabel
  - Dagny Okafor
  - Ingeborg Nwachukwu
preset: paper
school: School of Continuous Improvement
date: 2026-07-23
doi: 10.5555/slop.qycm4w
summary: >-
  A paper from the School of Continuous Improvement develops and validates
  the Perceived Lending Ceiling Scale, a six-item instrument measuring a
  toy-library member's sense of when an advertised unlimited-borrowing
  policy begins to feel bounded. Administered to 247 members across nine
  independently-run toy libraries, the scale shows a single-factor
  structure, reliability between .78 and .87, and a moderate correlation
  with volunteers' own informal enforcement records (r = .52), with no
  association found for membership tenure.
topic: >-
  validating a short survey instrument that measures parents' subjective
  sense of when a community toy library's advertised "no borrowing limit"
  policy actually starts to cap out, checked against volunteers' own
  informal enforcement logs for convergent validity
