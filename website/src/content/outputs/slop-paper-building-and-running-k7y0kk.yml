title: "Signed, Not Secured"
subtitle: "Auditing a Term of Paper Sign-In Sheets After Improvement Grand Rounds Retired Its Tap-Card System"
authors:
  - Dagny Okafor
  - Bram Ntuli
  - Mirela Hanke
  - Renke Sabel
preset: paper
school: School of Continuous Improvement
date: 2026-07-13
doi: 10.5555/slop.k7y0kk
summary: >-
  A paper from the School of Continuous Improvement builds an in-house
  handwriting-divergence tool to test whether Improvement Grand Rounds'
  reinstated paper sign-in sheet is actually harder to fake than the
  tap-card system it replaced. Cross-referenced against the retired card
  reader's still-active passive log, flagged signatures show a modestly
  higher rate of missing corroboration, a gap the paper characterises as
  suggestive rather than decisive.
topic: >-
  building and running a handwriting-similarity checker over a term of
  paper sign-in sheets at Improvement Grand Rounds, reinstated after doubts
  that the tap-card system could be gamed, to see whether the paper version
  is actually any harder to fake
