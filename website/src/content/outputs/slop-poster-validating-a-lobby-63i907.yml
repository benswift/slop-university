title: "Slower Isn't Seen"
subtitle: "A Lobby Signage Screen's Dwell-Time Sensor, Tested Against What Passersby Actually Recall"
authors:
  - Lindiwe Achterberg
  - Ingrid Vasseur
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-11
doi: 10.5555/slop.63i907
summary: >-
  A poster from the School of Emergent Priorities audits a lobby signage
  screen's dwell-time sensor, the instrument credited with justifying a
  slower notice-rotation speed, against 214 unannounced recall quizzes
  conducted on passersby over nine weeks. Recall holds flat across all
  three sensor-read tiers and across the rotation change, with no
  measurable relationship between what the sensor logs and what a
  passerby actually remembers.
topic: >-
  validating a lobby signage screen's dwell-time sensor against passersby's
  actual recall of what was on screen, after its rotation speed was capped
  to meet a new attention-governance policy
