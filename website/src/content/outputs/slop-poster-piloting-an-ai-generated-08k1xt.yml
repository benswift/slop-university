title: The Digest Outvotes the Thread
subtitle: How an AI Summary Became a Street Committee's Whole Discussion
authors:
  - Mirela Hanke
  - Ingeborg Nwachukwu
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-22
doi: 10.5555/slop.08k1xt
summary: >-
  A research poster from the School of Continuous Improvement fits fourteen
  street committees with a nightly AI-generated digest of each street's
  residents group chat and tracks what the committees' own decisions trace
  back to across a 22-week deployment. Reliance on the digest alone rises
  steadily over the run, with the chat's hedges, sarcasm, and
  half-withdrawn objections the content most reliably absent once a
  committee stops checking the source thread.
topic: >-
  piloting an AI-generated daily digest of a street's residents group chat,
  and tracking how quickly the street committee started treating the digest
  as the discussion itself
