title: Pouched, Not Prevented
subtitle: >-
  A Quasi-Experimental Evaluation of Numbered Device-Storage Pouches and the
  Invigilation Readiness Index
authors:
  - Renke Sabel
  - Joost Nwosu
  - Thandiwe Solberg
preset: paper
school: School of Continuous Improvement
date: 2026-07-12
doi: 10.5555/slop.zqrgbc
summary: >-
  A paper from the School of Continuous Improvement compares twenty-two exam
  halls before and after a staggered, delivery-batch-timed rollout of numbered
  device-storage pouches, finding Slop University's Invigilation Readiness
  Index rising sharply in adopting halls while device-related incident-report
  rates hold flat across both arms. A follow-up read of the Index's own
  scoring rubric traces roughly two-thirds of the rise to a single line
  crediting documented storage-protocol presence directly.
topic: >-
  a quasi-experiment testing whether numbered device-storage pouches at the
  exam-hall door move Slop University's Invigilation Readiness Index without
  changing the rate of device-related incident reports
