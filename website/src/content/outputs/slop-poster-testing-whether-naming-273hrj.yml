title: Still Pinned, Never Adjourned
subtitle: >-
  A Quasi-Experiment on Whether Naming an End Date Shortens a Group Chat's
  Working Life
authors:
  - Runa Adegoke
  - Ingrid Vasseur
  - Marit Osayande
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-23
doi: 10.5555/slop.273hrj
summary: >-
  A research poster from the School of Emergent Priorities tracks 64
  share-house group chats for fourteen months, comparing chats that named a
  wind-down note at creation against chats that did not. Chats without a
  stated end date took roughly four times as long to reach functional
  silence and kept generating house-rule decisions unrelated to the task
  the chat was created for.
topic: >-
  testing whether naming an end date for a share-house group chat shortens
  how long it outlives the one job it was created for
