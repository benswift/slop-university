summary: >-
  A car-level energy audit of a demand-responsive lift-dispatch controller
  finds Facilities' Living Dashboard's 13.4% electricity-saving claim
  accurate at the building level but concentrated entirely in two of the
  tower's four lift cars, with the other two cars' passengers absorbing a
  measurable rise in wait time instead.
topic: >-
  auditing whether the tallest building's new demand-responsive
  lift-dispatch algorithm actually cuts electricity use, or just relocates
  the wait to floors its own savings dashboard doesn't audit
