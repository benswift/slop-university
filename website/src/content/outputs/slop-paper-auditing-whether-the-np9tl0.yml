title: "Metered at the Switchboard"
subtitle:
  "A Car-Level Energy Audit of a Demand-Responsive Lift-Dispatch Algorithm's
  Building-Wide Savings Claim"
authors:
  - Thandiwe Solberg
  - Joost Nwosu
preset: paper
school: School of Continuous Improvement
date: 2026-07-10
