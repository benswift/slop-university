title: Off the Books, Not Off the Shelf
subtitle: >-
  Validating a Library Book-Swap Shelf's QR Circulation Tracker Against a
  Term of Twice-Daily Physical Counts
authors:
  - Thandiwe Solberg
  - Sten Okwuosa
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-16
doi: 10.5555/slop.zlggzm
summary: >-
  A research poster from the School of Continuous Improvement audits the
  Library's book-swap shelf, matching 196 physical shelf counts against its
  QR scan-in/scan-out tracker's circulation log across a 14-week term.
  Physical turnover holds steady (median 33.5 books/week) while the
  tracker's own capture rate falls from 61% to 9%, tracking the condition of
  its shelf-edge stickers rather than the shelf's actual use.
topic: >-
  the library book-swap shelf's QR scan-in-scan-out tracker undercounts how
  often books actually turn over, audited against a term of twice-daily
  physical shelf counts
