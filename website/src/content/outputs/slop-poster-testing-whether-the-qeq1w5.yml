title: "Booked Full, Sat Empty"
subtitle: >-
  Validating the Timetabling Office's Occupancy Forecast Against a Term of
  Clicker-Recorded Attendance
authors:
  - Fenna Okoro
  - Ingrid Vasseur
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-10
doi: 10.5555/slop.qeq1w5
summary: >-
  A School of Emergent Priorities poster sets a term of ceiling-mounted
  clicker counts from nine lecture theatres against the Timetabling Office's
  own pre-term occupancy forecast, the figure used to cap or grow a
  subject's enrolment. Forecast occupancy correlates only weakly with
  recorded attendance (r = 0.38, n = 214 sessions), overshooting actual use
  in 88% of sessions with no narrowing across the thirteen-week term.
topic: >-
  testing whether the Timetabling Office's lecture-theatre occupancy
  forecast, the number that decides whether a subject's enrolment is capped
  or allowed to grow, tracks a full term of actual clicker-recorded seat use
  across the university's largest lecture theatres
