title: "Signed Out, Still on the Peg"
subtitle: "Validating a Shared-Umbrella Stand's Sign-Out Clipboard Against a Term of Independent Stand Counts"
authors:
  - Renke Sabel
  - Mirela Hanke
preset: paper
school: School of Continuous Improvement
date: 2026-07-16
doi: 10.5555/slop.5a3tar
summary: >-
  A paper from the School of Continuous Improvement validates the Umbrella
  Reciprocity Log --- the sign-out clipboard beside six building-entrance
  shared-umbrella stands --- against a 14-week run of unannounced physical
  stand counts. Logged sign-outs show no reliable relationship to same-day
  net physical removals (point-biserial r = 0.09, n.s.), and the mismatch is
  patterned by weather rather than by stand: rainy-day removals substantially
  outpace rainy-day logging, while dry-day logging outpaces dry-day removals.
  An ablation excluding the highest-traffic stand leaves the result
  unchanged.
topic: >-
  validating whether a shared-umbrella stand's sign-out clipboard predicts
  actual umbrella custody, against a term of independent stand counts, even
  as the clipboard's own participation tally is reported up as the
  sustainability initiative's success metric
