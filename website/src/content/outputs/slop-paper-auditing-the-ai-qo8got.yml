title: "Chosen for Defensibility"
subtitle: "How the AI Use Transparency Statement Decides What to Disclose"
authors:
  - Dagny Okafor
  - Renke Sabel
  - Mirela Hanke
preset: paper
school: School of Continuous Improvement
date: 2026-07-09
doi: 10.5555/slop.qo8got
summary: >-
  An interview study of the subcommittee that drafts the University's AI Use
  Transparency Statement, cross-referenced against three cycles of the
  University's internal AI-usage tracker, finds disclosed categories track a
  category's defensibility under external audit rather than how often the
  tracker actually logs it, a gap that persisted even after the subcommittee
  gained direct access to the tracker's live data.
topic: >-
  Auditing the AI Use Transparency Statement's disclosed categories against
  what the University's own AI-usage tracker actually logs, and interviewing
  the committee that decides which categories make the cut each cycle.
