title: The Badge Outlived the Scare
subtitle: >-
  Marking Displacement Into Unbadged Rooms After a Timesheet-Rounding Scare
authors:
  - Marek Solheim
  - Kwame Lindqvist
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-14
doi: 10.5555/slop.cqmkhr
summary: >-
  A poster from the School of Emergent Priorities examines a badge-tap-in
  requirement placed on a casual-tutor marking-pool workroom after a
  timesheet-rounding scare, running an interrupted time-series on twenty
  weeks of door-reader and sign-in logs across one badged and two unbadged
  rooms (n = 46 tutors). Badged-room occupancy fell from a pre-rollout mean
  of 39 tutor-sessions per week to 8 by week 20 while the two unbadged rooms
  absorbed almost the same difference, indicating displaced rather than
  reduced marking. No policy review or decommissioning trigger was logged in
  the twelve months after the rounding audit closed, leaving the reader in
  place as an unexamined default long after the condition that justified it
  had passed.
topic: >-
  testing whether requiring casual tutors to badge-tap into the marking-pool
  workroom, introduced after a timesheet-rounding scare, simply displaced
  marking into unbadged rooms, and whether the badge-tap requirement was
  ever revisited once the scare passed
