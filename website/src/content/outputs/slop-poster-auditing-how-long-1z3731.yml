title: Still At Large, Already Home
subtitle: >-
  Auditing How Long a Lost-Dog Alert Outlives a Council Pound's Own
  Microchip-Scan Return Record
authors:
  - Marit Osayande
  - Ingeborg Nwachukwu
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-22
doi: 10.5555/slop.1z3731
summary: >-
  A research poster from the School of Continuous Improvement audits 341
  lost-dog alerts across fourteen suburb Facebook groups against two
  councils' microchip-scan intake records over eleven months, finding a
  "still at large" tag persists for a median of eleven days after a scan
  confirms the dog's return. A mandatory resolved-tag rule nearly halves the
  lag without closing it, and alert engagement predicts persistence more
  strongly than group size.
topic: >-
  auditing how long a suburban lost-dog Facebook group keeps recirculating a
  'still at large' alert after the council pound's microchip-scan log shows
  the dog already went home
