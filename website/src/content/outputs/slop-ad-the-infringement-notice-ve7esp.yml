summary: >-
  A marketing poster for the Master of Applied Measurement stages a suburban
  letterbox receiving a speed-camera infringement notice weeks after the
  flash that triggered it, as the pitch for a program built to notice the
  lag between when something happens and when anyone reviews it, developed
  with the School of Continuous Improvement for bus-stop panels and campus
  digital signage, in matched daylight and evening versions.
