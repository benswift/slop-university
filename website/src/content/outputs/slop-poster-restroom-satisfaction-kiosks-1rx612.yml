title: "Nobody's Unhappy at 6 AM"
subtitle: "Timestamp-Clustering a Restroom Satisfaction Kiosk's Button Presses Against the Cleaning Roster"
authors:
  - Mirela Hanke
  - Thandiwe Solberg
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-16
doi: 10.5555/slop.1rx612
summary: >-
  A research poster from the School of Continuous Improvement matches a
  restroom satisfaction kiosk's button-press timestamps against the cleaning
  contractor's badge-tap service-scan log across a semester at two buildings,
  testing whether the kiosk's aggregate score reflects visitor sentiment or
  something closer to who has access to press it. "Very satisfied" presses
  cluster tightly against the nearest preceding service scan while every
  other rating spreads evenly across the interval between rounds, a pattern a
  uniform-arrival null does not predict.
topic: >-
  restroom satisfaction kiosks, and what their button-press timestamps reveal
  once the cleaning crew starts pressing them too
