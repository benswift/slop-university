title: Nothing Followed the Flag
subtitle: >-
  A Null-Result Audit of a Suburban Pool's Smoke-Day Flag Against Same-Day
  Symptoms and Attendance
authors:
  - Renke Sabel
  - Ingeborg Nwachukwu
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-22
doi: 10.5555/slop.zllgyn
summary: >-
  A research poster from the School of Continuous Improvement audits a
  suburban pool's daily smoke-day flag, set each morning by a rostered duty
  volunteer against a government air-quality index, across 402 duty
  mornings at six pools over a nine-week smoke-affected season. Same-day
  patron-reported symptom rates hold flat between flag-up (9.4%) and
  flag-down (8.7%) mornings, as does gate-tallied attendance, while a
  continuous re-scoring of the underlying air-quality reading performs no
  better than the flag itself.
topic: >-
  auditing whether a suburban pool's smoke-day flag tracks same-day
  reported symptoms or lifeguard-logged attendance, against which
  volunteer was rostered to check the air-quality index that morning
