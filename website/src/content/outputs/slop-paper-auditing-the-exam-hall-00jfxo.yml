title: "Surrendered at the Door"
subtitle: "An Observational Audit of Exam-Hall Phone-Surrender Enforcement Across a Term of Closed- and Open-Note Papers"
authors:
  - Marek Solheim
  - Anouk Mensah
preset: paper
school: School of Emergent Priorities
date: 2026-07-10
doi: 10.5555/slop.00jfxo
summary: >-
  A paper from the School of Emergent Priorities tracks a full term of
  phone-surrender enforcement in the University's central examination hall
  across 29 sittings and 1,612 students, comparing a six-step checklist's
  completion rate and per-student dwell time between closed-book papers and
  the rarer open-note papers the procedure arguably has no reason to police.
  The two conditions are statistically indistinguishable on every measure,
  and a sitting-level model attributes dwell time to enrolment and staffing
  rather than to paper type.
topic: >-
  auditing the exam-hall phone-surrender ritual across a term of papers sat
  in the same hall, including the one open-note component it has no reason
  to police
