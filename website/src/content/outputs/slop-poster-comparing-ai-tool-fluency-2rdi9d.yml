title: "Fluent on Paper"
subtitle: "Validating the Mandatory AI-Literacy Self-Assessment Against Measured Task Performance in a Postgraduate Cohort"
authors:
  - Dagny Okafor
  - Renke Sabel
  - Osei Vandermeer
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-08
doi: 10.5555/slop.2rdi9d
summary: >-
  A validation study pairing 118 postgraduate research students' post-module
  self-rated AI-tool fluency against their scores on a blind-marked 14-task
  tool battery finds the two effectively unrelated (r = 0.12). The mandatory
  certification threshold admits high and low performers in near-equal
  proportion, indicating the sign-off records module completion and self-belief
  rather than measured task competence.
topic: validating whether the mandatory AI-literacy self-assessment the University certifies research students on predicts their measured performance on the same tools, and finding the sign-off tracks course completion rather than task competence
