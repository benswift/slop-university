title: "Checked Once, Cited Often"
subtitle: "RackWatch, a Bike-Rack Occupancy Dashboard, and a Term of the Committee Decisions That Kept Citing It"
authors:
  - Kwame Lindqvist
  - Marek Solheim
  - Anouk Mensah
preset: paper
school: School of Emergent Priorities
date: 2026-07-12
doi: 10.5555/slop.sd7fi5
summary: >-
  A paper from the School of Emergent Priorities tracks a full teaching term
  of RackWatch, a live bike-rack occupancy dashboard built from a weekly
  Facilities headcount, finding the map's own visits collapse from 812 to
  single figures within four weeks while Estates Committee citations of
  "RackWatch data" hold flat at one to three a week throughout. Eighty-seven
  percent of the term's rack-removal decisions cite the tool in both of its
  two removal rounds, regardless of a mid-term freshness disclaimer or the
  map's growing staleness.
topic: >-
  a systems paper on RackWatch, the live bike-rack occupancy dashboard
  Facilities built from a weekly headcount --- tracking a full term of its
  usage logs, where visits to the map fall to near zero by week three while
  committee minutes keep citing "RackWatch data" months later to decide
  which racks get removed
