title: Tagged to Stay Put
subtitle: Forecasting Missing AV Trolleys Before the Weekly Stocktake
authors:
  - Verity Marris
  - Kwame Lindqvist
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-14
doi: 10.5555/slop.mf9gpt
summary: >-
  A research poster from the School of Emergent Priorities pilots a
  proximity-tag forecast for the shared AV trolleys that migrate between
  lecture theatres, built to anticipate which one would be missing from its
  bay before the weekly stocktake. Forecast accuracy rose from 71% to 94%
  once the tag locations were published to staff, while cross-building
  relocations fell by three-quarters over the same window --- a trolley that
  never leaves its bay being trivially easy to forecast and unavailable to
  whoever booked it.
topic: >-
  a proximity-tag pilot to anticipate which shared AV trolley goes missing
  before the weekly stocktake, and how staff learned to keep one nearby by
  gaming the tag
