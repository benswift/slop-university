title: "Counted Before It's Checked"
subtitle: >-
  A Clip-On Logger for the Shared AV Carts, and How Its Raw Ping Count
  Reached the Replacement Budget
authors:
  - Renke Sabel
  - Sten Okwuosa
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-16
doi: 10.5555/slop.zhqdoo
summary: >-
  A research poster from the School of Continuous Improvement fits 22
  shared lecture-hall AV carts with a clip-on power-and-motion logger and
  tracks whether its raw "ping" corresponds to a confirmed room booking
  across a ten-week pilot. The logger's booking-match rate falls from 71%
  to 38% over the deployment, even as Facilities' capital-planning minutes
  begin citing its raw totals within the pilot's first three weeks.
topic: >-
  a clip-on power-and-motion logger for the shared lecture-theatre AV
  carts, and how its raw ping count ended up in next year's replacement
  budget before anyone checked what a ping means
