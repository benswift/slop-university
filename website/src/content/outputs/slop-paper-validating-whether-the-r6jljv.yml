title: Worn Smooth, Rarely Gripped
subtitle: >-
  A Time-Lapse Validation of the Running Path's Outdoor Fitness-Station
  Wear Index Against Observed Exercise Use
authors:
  - Kwame Lindqvist
  - Fenna Okoro
preset: paper
school: School of Emergent Priorities
date: 2026-07-15
doi: 10.5555/slop.r6jljv
summary: >-
  A paper from the School of Emergent Priorities sets fourteen weeks of
  time-lapse footage from 22 campus running-path fitness stations against
  the fortnightly Wear Index Facilities uses to nominate sites for the
  path's next installation wave. The index correlates only weakly with
  coded exercise-set counts (r = 0.24) and strongly with counts of people
  sitting, leaning, or waiting at a station without exercising (r = 0.77),
  a pattern unchanged when the index is recomputed from grip-tape abrasion
  alone.
topic: >-
  validating whether the visible wear on the campus running path's outdoor
  fitness stations --- scuffed grip tape, compacted ground under the bar,
  flaking paint --- that Facilities reads as a usage signal for the Horizon
  Register's next round of station placements actually tracks how much
  anyone exercises on them, against a term of time-lapse counts, or just
  how popular a bar is as a place to sit and wait for a running group
