title: "Certified, Not Current"
subtitle: "Cross-Referencing the Makerspace's 3D-Printer Sign-Off Sheet Against Its Checklist Log"
authors:
  - Joost Nwosu
  - Sten Okwuosa
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-13
doi: 10.5555/slop.7eu1tu
summary: >-
  A poster from the School of Continuous Improvement cross-references the
  campus makerspace's 3D-printer induction sign-off sheet against
  Facilities' own checklist revision log, finding the share of
  ledger-valid signatures certifying a since-retired checklist version
  rose from 18% to 61% across six revisions in fourteen months, while the
  ledger's own reported currency rate held between 92% and 96% throughout.
topic: >-
  auditing how many signatures on the campus makerspace's 3D-printer
  induction sign-off sheet still certify a safety version retired terms
  ago, since the checklist is revised faster than technicians can retrain
  anyone on it
