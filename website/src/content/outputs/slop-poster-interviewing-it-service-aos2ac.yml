title: "The Terminal Reads Foot Traffic as Feedback"
subtitle: "Interviewing IT Service Desk Staff and Passers-By About Who Presses It, and When"
authors:
  - Fenna Okoro
  - Kwame Lindqvist
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-14
doi: 10.5555/slop.aos2ac
summary: >-
  A poster from the School of Emergent Priorities interviews IT Service Desk
  staff and passers-by about who presses the counter's three-button feedback
  terminal, then matches six weeks of press logs to the desk's own
  ticket-close records. A third of the tally follows no logged desk
  interaction within thirty minutes, undercutting the terminal's use as an
  early-warning service signal.
topic: >-
  interviewing IT Service Desk staff and passers-by about who actually
  presses the three-button smiley terminal that management reads as an
  early-warning signal for brewing service problems
