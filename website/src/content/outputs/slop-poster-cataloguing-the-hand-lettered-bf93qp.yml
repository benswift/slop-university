title: "What the Standard Doesn't Say"
subtitle: "A Census of Hand-Lettered Signage's Recurrence After the Approved Signage
  Standard's Rollout"
authors:
  - Joost Nwosu
  - Bram Ntuli
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-10
doi: 10.5555/slop.bf93qp
summary: >-
  A poster from the School of Continuous Improvement catalogues the
  hand-lettered signage removed from 214 sites across eleven buildings under
  Facilities' Approved Signage Standard, sorting each notice into a
  five-category function taxonomy. A hand-lettered sign returned at 142 of the
  214 sites within six weeks, with recurrence highest for fault and
  access-restriction notices and lowest for directional fixes, the sole
  function the Standard's eleven templates already cover.
topic: >-
  cataloguing the hand-lettered signs staff tape to lifts, kitchen appliances,
  and noticeboards against Facilities' new Approved Signage Standard, and how
  many reappear within weeks of being taken down
