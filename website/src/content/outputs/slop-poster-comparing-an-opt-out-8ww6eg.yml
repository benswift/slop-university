title: "Renewed, Not Redeemed"
subtitle: "A Two-Hall Comparison of an Opt-Out Meal-Plan Default Against Actual Redemption"
authors:
  - Joost Nwosu
  - Mirela Hanke
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-11
doi: 10.5555/slop.8ww6eg
summary: >-
  A poster from the School of Continuous Improvement compares meal-plan
  retention against actual redemption across two dining halls over a single
  term --- one enrolling by an opt-out renewal default, the other requiring
  active reconfirmation --- and finds the two measures moving in opposite
  directions: the auto-renewing hall holds 96 per cent of plan-holders
  enrolled but sees only 61 per cent of paid meals collected, against 71 per
  cent retention and 84 per cent redemption at the confirm-required hall.
topic: >-
  comparing an opt-out meal-plan renewal default against a require-confirmation
  control hall, and asking whether retention says anything about how many
  meals actually get eaten
