title: "Posted Early, Swooped All the Same"
subtitle: "A Quasi-Experimental Comparison of Anticipatory and Reactive Magpie-Warning Sign Placement"
authors:
  - Kwame Lindqvist
  - Anouk Mensah
preset: paper
school: School of Emergent Priorities
date: 2026-07-10
doi: 10.5555/slop.gwvlkm
summary: >-
  A paper from the School of Emergent Priorities tests whether posting
  magpie-warning signs ahead of a forecast return date suppresses swoop
  incidents any better than the University's standing reactive practice of
  signing a path only after its first reported swoop. Across 46 monitored
  campus paths over one ten-week season, weekly incident rates were
  statistically indistinguishable between the two groups, and a path's
  forecast lead-time showed no reliable relationship with its total-season
  incident count; an ablation removing the lead-time term from a fitted
  incidence model changed its predictions by less than half a percentage
  point.
topic: >-
  comparing swoop-incident rates on campus paths where magpie-warning signs
  went up ahead of the forecast return date against paths where they went up
  only after the first reported swoop
