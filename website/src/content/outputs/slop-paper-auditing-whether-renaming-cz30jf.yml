title: "Repainted, Not Rerouted"
subtitle: "A Field Audit of Visitor Car-Park Occupancy Across Three Semesters of Zone Renaming"
authors:
  - Renke Sabel
  - Bram Ntuli
  - Dagny Okafor
preset: paper
school: School of Continuous Improvement
date: 2026-07-13
doi: 10.5555/slop.cz30jf
summary: >-
  A paper from the School of Continuous Improvement audits two Facilities
  zone-renaming events across three semesters at the University's three
  largest visitor car parks, finding aggregate occupancy and individual
  bay-switching behaviour unaffected by the relabelling while the hand-built
  crosswalk linking old zone codes to new ones grows markedly less reliable
  with each successive cycle.
topic: >-
  auditing whether renaming and repainting the visitor car-park zones each
  semester changes where anyone actually parks, or just resets Facilities'
  own occupancy count
