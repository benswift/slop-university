title: "Slower to Request, Same to Choose"
subtitle: "Evaluating a Golf-Buggy Request-and-Charge-Status Tool Against Ten Weeks of Paper Sign-Out Behaviour"
authors:
  - Osei Vandermeer
  - Casimir Beng
  - Bram Ntuli
preset: paper
school: School of Continuous Improvement
date: 2026-07-14
doi: 10.5555/slop.jac264
summary: >-
  A paper from the School of Continuous Improvement evaluates a
  request-and-charge-status tool built for Grounds' shared golf-buggy
  fleet against ten weeks of prior paper sign-out records, finding no
  significant change in buggy-selection behaviour and a roughly sixfold
  increase in decision-to-departure time, isolated with a four-week
  ablation that hid the charge figure itself.
topic: >-
  designing and deploying a lightweight request-and-charge-status tool for
  Grounds' shared golf-buggy fleet, then tracking how much staff actually
  used it against how they requested buggies before it existed
