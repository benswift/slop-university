title: Scanned, Not Necessarily Safe
subtitle: A Belief Survey of the Fire-Drill Assembly-Point QR Check-In's Actual Use
authors:
  - Anouk Mensah
  - Lindiwe Achterberg
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-13
doi: 10.5555/slop.abelbi
summary: >-
  A poster from the School of Emergent Priorities surveys 246 staff and
  students on what they believe the fire-drill assembly-point QR check-in is
  used for, against the Safety and Wellbeing Office's documented data
  schedule. Only 11% of respondents named the Office's actual declared use;
  59% named an individually attributed record the Office says it does not
  keep, and belief in a disciplinary use tracked a higher rate of
  scan-and-return behaviour during the drill itself.
topic: >-
  surveying what staff and students believe the fire-drill assembly-point QR
  check-in is actually for, against what the Safety and Wellbeing Office says
  the compliance count feeds into
