summary: >-
  A six-month follow-up survey of 214 Master of Priority Studies students
  across the 2025 and 2026 intakes finds recall of a day-one Foundation or
  Fast-Track label holding near-universal (87-91%) while recall of any
  evidence that would trigger reassignment falls to single digits (5-9%), a
  gap stable across both intakes despite the diagnostic's advisory framing.
topic: surveying whether Master of Priority Studies students can name any evidence that would move them off the track they were sorted into on day one
