title: "Recall Without Recourse"
subtitle: "Surveying Whether Track Labels Outlive Their Own Reassignment Criteria"
authors:
  - Verity Marris
  - Anneke Tolan
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-08
