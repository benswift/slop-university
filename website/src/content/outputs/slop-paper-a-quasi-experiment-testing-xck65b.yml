title: Still Flagged After the Room Says Otherwise
subtitle: >-
  A Quasi-Experiment on Requiring Active Term-by-Term Re-Confirmation of a
  Childcare Centre's Settling-In Support Flag Against Default Carry-Over
authors:
  - Marek Solheim
  - Lindiwe Achterberg
  - Renke Sabel
preset: paper
school: School of Emergent Priorities
date: 2026-07-22
doi: 10.5555/slop.xck65b
summary: >-
  A paper from the School of Emergent Priorities and the School of Continuous
  Improvement reports a quasi-experiment across 58 childcare rooms testing
  whether requiring a room educator to actively re-confirm a child's
  settling-in support flag each term, rather than letting it carry over by
  default, changes how often the flag outlives the room's own settled
  determination. Flags remained open past that determination in 71.3% of
  default-carry-over cases against 24.4% under active re-confirmation, an
  effect an ablation traced to the act of re-confirming rather than to any
  particular person performing it.
topic: >-
  a quasi-experiment testing whether requiring a childcare centre's room
  educator to actively re-confirm a child's "needs extra settling-in support"
  flag each term, rather than letting it carry over by default from the term
  before, changes how many children remain flagged past the point their own
  room educators say they have settled in
