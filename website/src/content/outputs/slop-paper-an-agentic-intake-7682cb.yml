doi: 10.5555/slop.7682cb
summary: >-
  A paper from the School of Emergent Priorities reports fourteen months of
  the Lost Property Ledger, an agentic intake tool that forecasts reclaim
  probability and schedules a disposal date for every item handed in across
  six collection points. Reclaim rates rose at five of the six points and
  the unreclaimed-item backlog levelled off after fourteen months of
  pre-rollout growth; an ablation disabling the tool's human-review
  checkpoint at half the collection points left days-to-reclaim
  statistically unchanged.
topic: >-
  an agentic intake tool that forecasts reclaim odds and pre-schedules
  disposal dates for everything handed in to the campus Lost Property store,
  complete with a human-review checkpoint nobody actually uses
