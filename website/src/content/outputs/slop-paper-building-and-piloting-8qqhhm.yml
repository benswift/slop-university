title: "The Slip Outlasted the App"
subtitle: >-
  Building and Piloting a Paper-Till, Sticker-Tag Canteen Pre-Order System,
  and How Its Order Log Became an Informal Lateness Flag
authors:
  - Runa Adegoke
  - Mirela Hanke
preset: paper
school: School of Emergent Priorities
date: 2026-07-20
doi: 10.5555/slop.8qqhhm
summary: >-
  A paper from the School of Emergent Priorities and the School of
  Continuous Improvement reports the design, staggered rollout, and
  eight-week pilot of a paper-till, sticker-tag pre-order system built to
  replace a primary school canteen's commercial ordering app, tracking
  uptake, mismatch, and processing-time across 6,140 orders. A parallel
  document-analysis pass finds the system's order-timestamp log acquired an
  unplanned second use as an informal lateness flag for the front office.
topic: >-
  building and piloting a paper-till, sticker-tag pre-order system for a
  primary school canteen as a replacement for its commercial ordering app,
  and tracking how canteen volunteers began repurposing the new system's
  order-timestamp log as an informal lateness flag for the front office
