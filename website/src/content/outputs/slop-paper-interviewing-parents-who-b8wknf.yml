title: Stopped Counting, Kept Fighting
subtitle: An Interview Study of Sibling Truces Against a Household Timeout Timer's Logged End
authors:
  - Iben Chikere
  - Solveig Adeyemi
preset: paper
school: School of Emergent Priorities
date: 2026-07-20
doi: 10.5555/slop.b8wknf
summary: >-
  A paper from the School of Emergent Priorities and the School of
  Continuous Improvement interviews a parent from each of 34 households
  about a shared household timeout-timer app, coding 71 logged sessions
  against each parent's account of when a sibling argument actually
  settled. The app's logged close matched the reported truce in under a
  third of sessions; a stricter, apology-contingent re-coding of the same
  sessions left the distribution largely unchanged.
topic: >-
  interviewing parents who track sibling arguments on a shared household
  timeout-timer app during the school holidays, to see whether the timer's
  logged end-of-timeout matches the moment a truce actually held or just
  the moment the clock ran out
