title: "The Attestation Loom"
subtitle: "Blind Reviewer Preference for Agent-Synthesised Audit Evidence over the Human-Logged Trail It Was Built to Supplement"
authors:
  - Mirela Hanke
  - Casimir Beng
  - Dagny Okafor
preset: paper
school: School of Continuous Improvement
date: 2026-07-08
doi: 10.5555/slop.xl8qw0
summary: >-
  A blind matched-pairs study has twelve certified internal auditors rate 42
  pairs of compliance-evidence entries, one written by the Attestation Loom
  and one logged by a human reviewer for the same control objective, on
  completeness and audit-readiness, and separately guess which entry in each
  pair the tool had written. The Loom's entries were rated more audit-ready
  in a majority of matched pairs, while blind guesses at authorship sat
  within chance, and the paper traces what that finding implies for where
  the University's evidentiary bar now actually sits.
topic: an internal tool that authors its own audit evidence trail, validated in a blind reviewer study against the human-logged evidence it was meant to supplement, and found more convincing than the real thing
