summary: >-
  Slop University's Strategic Plan 2026-2031 commits the institution to
  requiring evidence of a candidate's likely trajectory before every
  appointment and research-degree admission, then extends the same
  evidentiary standard to continuing-appointment review, promotion,
  scholarship renewal, and partnership terms as each comes up for renewal,
  with the evidence itself held, audited, and retired on a published
  schedule.
