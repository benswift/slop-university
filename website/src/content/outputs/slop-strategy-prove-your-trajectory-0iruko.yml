title: "Cleared Before You Arrive"
subtitle: >-
  The 2026-2031 Strategic Plan Requires a Trajectory Portfolio Before Every
  Appointment and Admission, Then Extends the Same Evidence Test to Everyone
  Already Inside
authors:
