title: Sorted Once, Seated All Term
subtitle: >-
  A Comparison of Week-One Diagnostic Table-Colour Groups Against Week-Nine
  Tutorial Performance
authors:
  - Lindiwe Achterberg
  - Anouk Mensah
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-12
doi: 10.5555/slop.jkkydn
summary: >-
  A poster from the School of Emergent Priorities compares 214 first-year
  students' week-one diagnostic table-colour placement against a blinded
  week-nine tutorial mark, finding the colour's explanatory power falls from
  a partial R-squared of 0.41 to 0.09 across a nine-week teaching period
  while a reassignment flag meant to track the drift is rarely tripped.
topic: >-
  auditing whether first-year tutorial table-colour groups, set by a
  week-one diagnostic quiz, still track anyone's actual ability by week nine
