title: "Logged More, Lightened Less"
subtitle: "Five Years of Pairing the University's AI-Assistant Session Counts Against an Independently Audited Workload"
authors:
  - Casimir Beng
  - Mirela Hanke
preset: impact-report
school: School of Continuous Improvement
date: 2026-07-14
doi: 10.5555/slop.iqrcc0
summary: >-
  The School of Continuous Improvement's third quinquennial Impact Report
  pairs five years of logged AI-assistant adoption across University systems
  against an independently audited measure of the same units' workload,
  finding the two move together in only one of four impact areas examined
  and diverge sharply in the report's forecasting work for
  professional-services assurance hours.
topic: >-
  measuring whether the AI assistants now embedded across the University's
  own systems have actually lightened anyone's workload, or just added a new
  thing to measure
