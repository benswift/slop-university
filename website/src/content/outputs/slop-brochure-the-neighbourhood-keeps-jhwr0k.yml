summary: >-
  A research-showcase brochure follows the informal records a neighbourhood
  keeps without being asked to --- a street-library correspondence thread, a
  community-garden waitlist, a dog-park gate tally --- back into three
  published studies of how faithfully each record matches the thing it's
  supposed to be keeping track of.
