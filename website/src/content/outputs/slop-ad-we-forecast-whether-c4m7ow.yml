summary: >-
  A marketing poster for the School of Emergent Priorities compresses the
  published finding of "Sorted on Arrival" --- that an agentic Lost Property
  intake tool forecasting reclaim odds lifted reclaim rates at five of six
  collection points --- into a single bus-stop headline, developed for campus
  digital signage and bus-stop panels in matched daylight and evening
  versions.
topic: >-
