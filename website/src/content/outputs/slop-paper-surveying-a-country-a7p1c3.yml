title: "Scored to Match"
subtitle: >-
  A Field Survey of Whether a Country Show's Produce-Judging Rubric Moves a
  Ranking, or Just Records It
authors:
  - Casimir Beng
  - Dagny Okafor
  - Thandiwe Solberg
preset: paper
school: School of Continuous Improvement
date: 2026-07-18
doi: 10.5555/slop.a7p1c3
summary: >-
  A paper from the School of Continuous Improvement surveys 47 produce judges
  across 19 regional show societies, comparing each judge's sealed
  pre-scoring expectation against their completed scoresheet for 312 judged
  classes. First place matches exactly in 88% of classes, a judge's walk-in
  confidence predicts the eventual scoresheet margin closely, and an
  ablation finds requiring every rubric column does not measurably change
  how often the two agree.
topic: >-
  surveying a country show society's produce judges on whether their
  scoresheet ranking ever moves from the placement they expected walking in,
  and whether following every column of the rubric widens that gap or
  closes it, or just ratifies it
