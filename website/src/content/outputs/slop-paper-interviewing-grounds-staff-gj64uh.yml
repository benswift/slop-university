title: Quiet by Other Means
subtitle: Interviewing Grounds Staff About a Courtyard Deterrent's Compliance Log
authors:
  - Thandiwe Solberg
  - Sten Okwuosa
preset: paper
school: School of Continuous Improvement
date: 2026-07-11
doi: 10.5555/slop.gj64uh
summary: >-
  A paper from the School of Continuous Improvement interviews eleven staff
  who maintain the University's central courtyard and finds their
  undocumented routines --- window closures, retimed bin collection, and a
  tolerance for the device's own faults during exam weeks --- track closely
  with the automated bioacoustic deterrent's own reported improvement in
  pigeon sightings, holding steady through a nine-day scheduled outage the
  device's compliance log would otherwise credit to itself.
topic: >-
  interviewing grounds staff about the undocumented routines that actually
  keep a courtyard's pigeons away, work an automated bioacoustic deterrent's
  compliance log credits entirely to itself
