title: "Same Chart, Different Picture"
subtitle: "Staff-Reported Sparkline Vividness and the Living Dashboard's Uptake Gap"
authors:
  - Petra Umbile
  - Osei Vandermeer
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-06
doi: 10.5555/slop.qnkzbe
summary: >-
  An 11-month study pairing login telemetry for the University's Living
  Dashboard with a 214-staff survey of how vividly respondents could picture a
  trend from a sparkline, across nine departments. Weekly engagement rose with
  reported vividness (r = 0.68), and the lowest-vividness department logged 61%
  fewer sessions than the University median, a gap unexplained by seniority or
  prior training; the authors read the shortfall as a legibility failure of the
  instrument rather than a motivation gap, and propose trialling a text-summary
  companion alongside the sparkline.
topic: whether the Living Dashboard's uptake gap between departments tracks staff-reported ease of picturing a trend from a sparkline, since its design assumes everyone visualises a trend the same way
