summary: >-
  A research-showcase brochure follows a warehouse scanner's pick-confidence
  score, a share-house parcel locker's hold badge, and a first-year
  diagnostic table-colour placement back into three published studies of the
  same small gap: the distance between what a badge, a score, or a flag
  reports and what has actually happened underneath it.
