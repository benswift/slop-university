title: Not Everyone Signs Off
subtitle: >-
  A Taxonomy and Closure-Prediction Model for Neighbourhood Street-Library
  Correspondence Threads
authors:
  - Marek Solheim
  - Anneke Tolan
  - Anouk Mensah
preset: paper
school: School of Emergent Priorities
date: 2026-07-17
doi: 10.5555/slop.50tmyv
summary: >-
  A paper from the School of Emergent Priorities hand-codes 341
  correspondence threads left inside 74 neighbourhood street-library boxes
  into a four-category closure taxonomy, finding fizzled non-replies
  dominate overall while signed-off closes rival them only in low-traffic
  boxes. A closure-prediction model trained on each thread's opening note
  beats a majority-class baseline by a margin concentrated almost entirely
  in anticipating threads still addressed to a visitor who has stopped
  answering.
topic: >-
  cataloguing how correspondence threads left in neighbourhood
  street-library book-swap boxes wind down, and building a
  closure-prediction model from each thread's opening line
