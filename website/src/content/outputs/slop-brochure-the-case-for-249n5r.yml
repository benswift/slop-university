title: "Read the Space, Not the Plan"
subtitle: "A Research Showcase on What Campus Does Once the Paperwork Stops Watching"
authors:
  - Verity Marris
  - Casimir Beng
  - Dagny Okafor
  - Kwame Lindqvist
preset: brochure
school: School of Emergent Priorities
date: 2026-07-10
doi: 10.5555/slop.249n5r
summary: >-
  A research-showcase brochure setting out the method both of the University's
  schools hold in common: reading a space, a system, or a process by what it
  demonstrably does before granting the plan that assigned it a purpose the
  final word. Four recently published studies are drawn together as worked
  examples of the gap between the two.
topic: >-
  the case for reading what a space does, not just what it's planned for
