title: "Scored Before It's Wiped"
subtitle: "What the Courtyard Chalkboard's Sentiment Tile Actually Reads"
authors:
  - Mirela Hanke
  - Bram Ntuli
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-15
doi: 10.5555/slop.jlxxxl
summary: >-
  A research poster from the School of Continuous Improvement checks the
  Living Dashboard's automated sentiment score for the courtyard's
  free-expression chalkboard against a year of hand-coded weekly
  photographs, sorting what students actually wrote into six content
  categories. The classifier's score tracks how many marks are on the board
  (r = -0.70) far more closely than it tracks the coded share of negative
  content (r = -0.29).
topic: >-
  reading a sentiment score off weekly photos of the courtyard's
  free-expression chalkboard before Facilities wipes it, against what
  students actually wrote
