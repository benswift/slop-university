title: The Lane You Picked Is Not the Lane You Swim
subtitle: Validating a Self-Report Pace Scale Against the Stopwatch
authors:
  - Runa Adegoke
  - Solveig Adeyemi
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-19
doi: 10.5555/slop.e2iv9l
summary: >-
  A research poster from the School of Emergent Priorities validates a
  self-report pace scale against stopwatch-timed laps at six suburban
  pools, finding self-report and timed pace agree only moderately and that
  the mismatch tracks a pool's lane-crowding index more closely than a
  headcount alone.
topic: >-
  validating a self-report pace scale against stopwatch-timed laps to see
  whether swimmers actually belong in the public pool lane they picked, and
  whether the mismatch predicts the pool's own lane-crowding index better
  than a headcount does
