title: "Closer, Not Busier"
subtitle: >-
  A Before/After Count of Play at the Courtyard Chess Tables Facilities
  Moved Nearer the Main Walkway
authors:
  - Kwame Lindqvist
  - Marek Solheim
preset: paper
school: School of Emergent Priorities
date: 2026-07-15
doi: 10.5555/slop.rj74a6
summary: >-
  A paper from the School of Emergent Priorities tests Facilities' Horizon
  Register assumption that relocating the courtyard's outdoor chess tables
  closer to its busiest walkway would increase how often anyone sat down to
  play, tracking sit-down sessions and session duration at the tables and an
  unmoved control site for nine weeks before and nine weeks after the move.
  Weekly sessions and session duration are statistically indistinguishable
  across the relocation, and daily play shows no relationship with same-day
  pedestrian counts even as foot traffic past the tables rises roughly
  fivefold.
topic: >-
  testing whether relocating the courtyard's outdoor chess tables closer to
  the busiest walkway increased how often anyone sat down to play, against
  Facilities' working assumption that visibility drives future uptake
