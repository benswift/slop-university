title: Same Roster, Four Different Verdicts
subtitle: >-
  Test--retest instability in a casual-shift rostering platform's
  fairness-compliance score, and the managers who stop reading the roster
  once they have one
authors:
  - Renke Sabel
  - Marit Osayande
  - Joost Nwosu
preset: paper
school: School of Continuous Improvement
date: 2026-07-20
doi: 10.5555/slop.o8swbm
summary: >-
  A paper from the School of Continuous Improvement resubmits one week's
  unchanged casual-shift roster data to a rostering platform's
  fairness-compliance engine four times over twelve weeks, finding the score
  moves by an average of 9.7 points per re-run and 20 of 34 stores cross into
  a different compliance band at least once. Interviews with 21 store
  managers find 81% do not reopen the roster once a score is returned, and
  removing the instrument's heaviest-weighted criterion leaves the drift
  statistically unchanged.
topic: >-
  re-running a casual-shift rostering app's "fairness-compliance" score on
  four identical copies of the same week's roster data, spaced a month
  apart, to see whether the score itself holds steady over time, and
  interviewing the store managers who, once a compliance score is returned,
  stop reading the roster it was computed from
