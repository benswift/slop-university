title: Cleared to Skip, Stopped Anyway
subtitle: Auditing When Intercampus Shuttle Drivers Override an Arrival-Forecasting Model
authors:
  - Fenna Okoro
  - Ingrid Vasseur
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-14
doi: 10.5555/slop.in4uxg
summary: >-
  A research poster from the School of Emergent Priorities audits eight
  weeks of intercampus shuttle dispatch logs and driver interviews, finding
  drivers override the arrival-forecasting model's skip call on more than
  one in three reviewed stops, most often citing a queue the model had
  already logged as empty.
topic: >-
  forecasting the intercampus shuttle's next arrival, and cataloguing why
  drivers keep overriding the model anyway
