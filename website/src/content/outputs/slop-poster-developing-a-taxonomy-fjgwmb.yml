title: The Fifth Tier Adds Nothing You Can Measure
subtitle: A Taxonomy of Self-Serve Car-Wash Program Names Against Their Bay-Sensor Wash Cycles
authors:
  - Runa Adegoke
  - Ingeborg Nwachukwu
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-23
doi: 10.5555/slop.fjgwmb
summary: >-
  A research poster from the School of Emergent Priorities catalogues the
  tier names printed on self-serve car-wash payment kiosks across a
  regional chain into a six-category step taxonomy, then audits which
  mechanical wash-cycle steps a bay's own sensors confirm per tier.
  Confirmed steps rise sharply through the lower tiers but plateau at
  fourteen of seventeen sites once pricing reaches the top two names.
topic: >-
  developing a taxonomy of the wash-tier names printed on self-serve
  car-wash payment kiosks (e.g. Quick Rinse, Deluxe, Ultimate, Presidential)
  across a regional chain, and auditing which mechanical wash-cycle steps
  actually change between adjacent tiers versus which tier boundaries exist
  in the signage only
