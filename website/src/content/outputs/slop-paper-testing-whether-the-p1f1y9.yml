title: Rerouted on Paper, Cut on the Grass
subtitle: >-
  Testing Whether the Quad Wayfinding App's Routing Rollout Reduced New
  Desire-Path Wear, Against a Two-Term Aerial-Photo Record
authors:
  - Fenna Okoro
  - Verity Marris
preset: paper
school: School of Emergent Priorities
date: 2026-07-15
doi: 10.5555/slop.p1f1y9
summary: >-
  A paper from the School of Emergent Priorities tests whether the Main Quad
  wayfinding app's routing recommendation, launched in week ten of the study
  term, reduced wear on the lawn's long-standing library-courtyard desire
  path. Weekly aerial photographs across a full term either side of the
  launch find the original track's worn area unchanged, while a second track
  matching the app's suggested line appears within three weeks and continues
  to widen.
topic: >-
  testing whether the campus wayfinding app's routing rollout across the main
  quad changed how much new desire-path wear appears on the lawn each term,
  against aerial photographs of the worn tracks before and after the rollout
