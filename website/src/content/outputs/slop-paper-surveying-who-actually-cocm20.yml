title: "Proximity, Not Promise"
subtitle: "Surveying Umbrella-Loan Returns Against Facilities' Entrance-Level Recovery Score"
authors:
  - Kwame Lindqvist
  - Marek Solheim
preset: paper
school: School of Emergent Priorities
date: 2026-07-10
doi: 10.5555/slop.cocm20
summary: >-
  A paper from the School of Emergent Priorities surveys 163 registered
  borrowers across all fourteen entrance-level umbrella-loan bins and models
  Facilities' Recovery Score against distance to the nearest entrance, peak
  foot traffic, and self-reported return rate. Distance accounts for the
  substantial majority of the Score's explained variance, and an ablation
  dropping the self-reported term leaves the resulting restocking ranking
  almost unchanged.
topic: >-
  surveying who actually returns a loaned umbrella from the building-entrance
  loan bins against Facilities' entrance-level Recovery Score, which decides
  which bins get restocked each term, and testing whether the score tracks
  borrower honesty or just how close a bin sits to the door
