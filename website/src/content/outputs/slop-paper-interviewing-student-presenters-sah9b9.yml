title: Held, Not Signed
subtitle: >-
  An Interview Study of How Campus Community-Radio Segment Slots Actually
  Change Hands
authors:
  - Anneke Tolan
  - Ingrid Vasseur
preset: paper
school: School of Emergent Priorities
date: 2026-07-15
doi: 10.5555/slop.sah9b9
summary: >-
  A paper from the School of Emergent Priorities interviews 28 student
  presenters at the campus community radio station about how they secured a
  weekly on-air segment, coded against a photographic archive of the studio
  door's sign-up sheet. A slot held on a newcomer's behalf by an existing
  presenter accounts for the largest share of debuts in both semesters
  studied, well ahead of the sheet's own written order, and the pattern
  persists unchanged after the station replaces the paper sheet with a
  digital sign-up form.
topic: >-
  interviewing student presenters at the campus community radio station
  about how they actually land an on-air segment, against the handwritten
  sign-up sheet pinned to the studio door that's meant to allocate slots
  first-come, first-served
