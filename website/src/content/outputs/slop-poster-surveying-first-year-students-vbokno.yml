title: What the Raised Hands Don't Say
subtitle: A Survey of Comprehension Checks Against the Device-Free Hour Hand-Raise Tally
authors:
  - Thandiwe Solberg
  - Joost Nwosu
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-12
doi: 10.5555/slop.vbokno
summary: >-
  A poster from the School of Continuous Improvement pairs first-year
  comprehension checks against the hand-raise tally behind Slop University's
  Device-Free Hour pilot, finding the raw tally explains only a small share
  of the variance in what students could show they understood, with the gap
  between the two measures widening across the pilot's ten weeks.
topic: >-
  surveying first-year students and the lecturing staff who run Slop
  University's new Device-Free Hour pilot, to see whether the students' own
  comprehension checks track the raw hand-raise tally the pilot's
  continuation case is built on
