summary: >-
  A research poster from the School of Continuous Improvement matches a
  shared office fridge's QR-label disposal app against its own Facilities
  dispute-ticket log across a 24-week rollout window. Label compliance
  climbs from 61% to 94% within eight weeks, but weekly dispute-ticket
  counts hold at an identical median across both periods.
topic: >-
  tallying whether a shared office fridge's QR-label disposal app's climbing
  label-compliance count matches any real drop in Friday clear-out disputes
