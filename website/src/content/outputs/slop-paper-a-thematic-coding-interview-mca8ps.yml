title: "Same Sign, Different Reading"
subtitle: "A Thematic Analysis of Off-Leash Compliance Justifications at a Suburban Dog Park"
authors:
  - Casimir Beng
  - Solveig Adeyemi
preset: paper
school: School of Continuous Improvement
date: 2026-07-22
doi: 10.5555/slop.mca8ps
summary: >-
  A paper from the School of Continuous Improvement reports a semi-structured
  interview study (n = 52) at a suburban off-leash dog reserve, thematically
  coding each participant's account of their own dog's leash status against
  their account of a visible other user's. Self-directed accounts cluster on
  situational and dog's-need framing, while other-directed accounts cluster
  overwhelmingly on disregard (58% versus 3%), an asymmetry that survives a
  blinding ablation testing the coding scheme's own reliability rather than
  the theme distribution it is applied to.
topic: >-
  a thematic-coding interview study of dog-park regulars justifying their own
  off-leash compliance while judging everyone else's the same way
