title: Still Lit, Still Pressed
subtitle: A Pre/Post Habituation Study of Door-Close Delay Retuning and Redundant Call-Button Presses
authors:
  - Mirela Hanke
  - Dagny Okafor
preset: paper
school: School of Continuous Improvement
date: 2026-07-17
doi: 10.5555/slop.bblo1j
summary: >-
  A paper from the School of Continuous Improvement logs 39,092 hall-call
  button presses before and after Facilities shortens a lift lobby's
  door-close delay to bring the building's floor-throughput figure back
  within the Living Dashboard's target band, finding the rate of redundant
  presses on an already-lit button spikes immediately and then decays over
  twelve weeks toward a level still above baseline.
topic: >-
  tuning a lift door-close delay to a floor-throughput KPI, then tracking
  whether riders' re-presses of the already-lit call button fade back toward
  baseline as they learn the new timing
pdf: /outputs/pdf/slop-paper-tuning-a-lift-bblo1j.pdf
pages: 5
