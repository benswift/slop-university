title: "Fewer Arguments, Not Shorter Ones"
subtitle: >-
  A School-Holiday Diary Survey of Screen-Time Token Economies and
  Negotiation Escalation
authors:
  - Ingeborg Nwachukwu
  - Solveig Adeyemi
  - Casimir Beng
preset: paper
school: School of Continuous Improvement
date: 2026-07-22
doi: 10.5555/slop.a9czzw
summary: >-
  A paper from the School of Continuous Improvement reports a two-week
  diary survey run across the first fortnight of the July school-holiday
  period, comparing 64 households running a formal screen-time token
  economy against 78 households continuing informal verbal negotiation.
  Token-economy households logged fewer than half as many negotiation
  episodes per day, but the episodes that did occur ran longer and skewed
  toward major escalation, leaving a composite escalation-minutes measure
  statistically indistinguishable between arms; a bonus-multiplier ablation
  offered to a token-economy subsample moved neither measure further.
topic: >-
  surveying school-holiday households on whether a formal screen-time token
  economy cuts the number of daily negotiation arguments over device time,
  or just changes how long each argument runs and how far it escalates
