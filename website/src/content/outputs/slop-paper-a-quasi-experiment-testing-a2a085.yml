title: Eight Seconds to Elsewhere
subtitle: A Quasi-Experimental Evaluation of a Captive-Portal Digital-Literacy Notice
  in Lecture Theatres
authors:
  - Verity Marris
  - Casimir Beng
  - Petra Umbile
preset: paper
school: School of Emergent Priorities
date: 2026-07-11
doi: 10.5555/slop.a2a085
summary: >-
  A paper from the School of Emergent Priorities exploits a staggered rollout
  of a mandatory eight-second wifi captive-portal notice across fourteen
  lecture theatres to test whether the notice reduces dropped connections
  during class. A three-arm ablation cannot distinguish its effect from a
  content-free delay of the same length, while theatres running the notice
  show a reliably larger rise in students tethering to mobile data instead.
topic: >-
  a quasi-experiment testing whether the campus wifi captive portal's new
  mandatory eight-second digital-literacy notice reduces dropped connections
  in lecture halls, or just relocates the moment students give up and tether
  to their phones instead
