title: "A Typology of Pigeonhole Clearance"
subtitle: >-
  What Two Weeks of Unannounced Audit Found Behind the Mailroom's Binary
  "Cleared" Log
authors:
  - Fenna Okoro
  - Kwame Lindqvist
  - Anouk Mensah
preset: paper
school: School of Emergent Priorities
date: 2026-07-11
doi: 10.5555/slop.2iwb4d
summary: >-
  A paper from the School of Emergent Priorities shadows Slop University's
  central mailroom pigeonhole wall for an unannounced two-week window and
  induces a four-type typology of staff clearance behaviour, finding the
  mailroom's own binary "cleared" flag agrees only fairly with
  independently observed addressee engagement, converging for two of the
  four types and diverging sharply for the other two.
topic: >-
  a typology of how staff actually clear their mailroom pigeonhole, derived
  from an unannounced two-week audit against the mailroom's own binary
  "cleared" log
