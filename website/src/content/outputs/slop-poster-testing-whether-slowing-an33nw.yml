title: The Bin Cleared, the Rail Didn't
subtitle: >-
  A Quasi-Experimental Trial of Donation-Sorting Shift Quotas Against
  Shop-Floor Fault Rates
authors:
  - Lindiwe Achterberg
  - Mirela Hanke
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-19
doi: 10.5555/slop.an33nw
summary: >-
  A research poster from the School of Emergent Priorities pilots an
  extended-shift, lower-quota donation-sorting roster across three charity
  shops, testing whether a slower processing tally reduces the rate of
  faulty or unsellable stock reaching the shop floor. The piloted roster's
  own tally trails the standard schedule's by 34%, but the shop-floor fault
  rate falls from 11.4% to 6.2% over the same nine months, with the widest
  category gap in electricals.
topic: >-
  testing whether slowing a charity shop's donation-sorting shift quota
  changes how many items later turn up faulty or unsellable on the shop
  floor
