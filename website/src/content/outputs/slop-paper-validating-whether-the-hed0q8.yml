title: "Lit for Whoever's Moving"
subtitle: "Validating a Sports Oval's Motion-Sensing Floodlight Extension Against Independent Occupancy Ground Truth"
authors:
  - Osei Vandermeer
  - Thandiwe Solberg
preset: paper
school: School of Continuous Improvement
date: 2026-07-17
doi: 10.5555/slop.hed0q8
summary: >-
  A paper from the School of Continuous Improvement cross-references eleven
  weeks of a sports oval's floodlight motion-sensor extension log against an
  independently recorded nightly closing observation, finding that fewer
  than half of triggered extensions coincide with a confirmed occupant and
  that a sensitivity-threshold adjustment does not meaningfully close the
  gap.
topic: >-
  validating whether the oval's motion-sensing floodlight extension
  actually tracks lingering players or just whatever else moves under the
  light towers after dark
