doi: 10.5555/slop.wfyo68
summary: >-
  A paper from the School of Continuous Improvement evaluates Facilities'
  AED Fleet Readiness Ledger, which rolls a monthly compliance-scan of the
  University's 42 wall-mounted defibrillator cabinets into a single
  published readiness percentage. Recomputing the figure without its
  pad-expiry weighting term changes the campus-wide result by well under a
  percentage point, a difference the authors report as not significant.
topic: >-
