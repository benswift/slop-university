title: "Propped, Not Reported"
subtitle: "A Survey of Improvised Fire-Door Wedges Against the Fire-Safety Walk-Through's Always-Closed Count"
authors:
  - Dagny Okafor
  - Bram Ntuli
preset: paper
school: School of Continuous Improvement
date: 2026-07-11
doi: 10.5555/slop.5uwpmh
summary: >-
  A paper from the School of Continuous Improvement sets the Work Health and
  Safety Directorate's quarterly fire-door walk-through against an anonymous
  survey of 438 staff and students across the same eleven buildings. The
  walk-through logs stairwell fire doors closed on 97% of its scheduled
  passes; three in five survey respondents report propping the same class of
  door open at least once in the past month, most often with a folded
  document, a shoe, or the corridor's own fire extinguisher.
topic: >-
  surveying what staff and students wedge into stairwell fire doors to prop
  them open, against the fire-safety walk-through's always-closed compliance
  count
