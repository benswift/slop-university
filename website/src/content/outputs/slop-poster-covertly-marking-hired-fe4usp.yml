title: "Tagged for the Camera, Billed to the Docket"
subtitle: "Testing Whether Hire-Desk Damage Fees Follow the Docket Name or the Ceremony-Photo Wearer"
authors:
  - Anouk Mensah
  - Dagny Okafor
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-14
doi: 10.5555/slop.fe4usp
summary: >-
  A poster from the School of Emergent Priorities covertly fibre-tags 214
  hired graduation gowns and cross-references the ceremony's own
  photographs against the hire desk's damage-fee ledger, then hands the
  desk an accurate tag-photo mismatch report before a second billing round.
  Fee attribution tracks the docket's named borrower throughout, barely
  moving once accurate wearer identification was placed directly in front
  of the staff doing the billing.
topic: >-
  covertly marking hired graduation gowns to test whether the hire desk's
  damage fee lands on whoever's name is on the docket, or on whoever the
  ceremony photos show actually wearing it
