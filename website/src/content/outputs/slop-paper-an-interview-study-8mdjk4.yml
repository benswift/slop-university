title: The Rule as Told, the Rule as Kept
subtitle: >-
  An Interview Study of How Households Enforce, Bend, and Quietly Redraw
  Their Own Phones-in-the-Basket Dinner Rule
authors:
  - Anouk Mensah
  - Ingrid Vasseur
preset: paper
school: School of Emergent Priorities
date: 2026-07-18
doi: 10.5555/slop.8mdjk4
summary: >-
  A paper from the School of Emergent Priorities interviews 34 households
  that name a standing phones-in-the-basket dinner rule unprompted, coding
  212 exceptions from the preceding fortnight into a four-pathway taxonomy
  dominated by exceptions neither party ever names as such. Comparing each
  household's opening recitation of its own rule against its reconstructed
  practice finds the two still match in barely a quarter of households,
  with most drift happening without either party marking a change.
topic: >-
  an interview study of how households enforce their own phones-in-the-basket
  dinner-table rule -- which exceptions get silently granted, which get
  formally renegotiated, and how the rule's stated version drifts from the
  version actually enforced night to night
pdf: /outputs/pdf/slop-paper-an-interview-study-8mdjk4.pdf
pages: 5
