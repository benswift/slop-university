summary: >-
  A marketing poster for the School of Emergent Priorities makes the
  University's ranking brag literal: its own Strategic Drift Survey
  composite has placed the institution first for the gap between a
  credential's stated expiry and its actual one, five years running.
  Developed for bus-stop panels and campus digital signage in matched
  daylight and evening versions.
