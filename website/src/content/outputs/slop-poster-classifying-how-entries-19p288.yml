title: Posted, Not Passed
subtitle: A Taxonomy of How Lobby-Noticeboard Entries Come to Read as Settled Rulings
authors:
  - Ingeborg Nwachukwu
  - Dagny Okafor
  - Mirela Hanke
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-21
doi: 10.5555/slop.19p288
summary: >-
  A research poster from the School of Continuous Improvement codes 487
  entries from an apartment lobby noticeboard across four blocks and eleven
  months into a six-type taxonomy, finding entries coded Ruling close 2.1x
  faster than entries coded Complaint despite naming no enforcement
  mechanism. The taxonomy holds independently across all four blocks.
topic: >-
  classifying how entries on an apartment block's lobby noticeboard harden
  into settled rulings on parking and noise disputes with no resident
  holding any authority to enforce one
