title: Entered Together, Flagged Never
subtitle: Classifying Contradictory Signal-Pairs and Tracking Their Ratification
authors:
  - Ingrid Vasseur
  - Petra Umbile
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-08
doi: 10.5555/slop.pu0w2f
summary: >-
  A four-category taxonomy of 214 contradictory signal-pairs that entered the
  Horizon Register within a single scanning cycle across 21 quarters, cross-read
  against Futures in Committee ratification and the register's own
  contradiction-flag field. Two in five pairs were ratified as separate standing
  priorities within two cycles of first appearing, directional contradictions at
  the highest rate of any type, and the contradiction-flag field returned null
  for every ratified pair.
topic: >-
  taxonomising contradictory signal-pairs that both enter the Horizon Register
  in the same scanning cycle and tracking how many are ratified by Futures in
  Committee as separate live priorities without the register ever flagging that
  the two contradict each other
