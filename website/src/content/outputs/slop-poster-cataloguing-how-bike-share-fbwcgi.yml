title: "The Capacity That Never Drops"
subtitle: "Auditing the Bike-Share Helmet Bin's RFID Return Log Against a Term of Manually Counted Helmets"
authors:
  - Lindiwe Achterberg
  - Sten Okwuosa
preset: research-poster
school: School of Emergent Priorities
date: 2026-07-13
doi: 10.5555/slop.fbwcgi
summary: >-
  A poster from the School of Emergent Priorities audits the campus
  bike-share scheme's helmet-return bins, cross-referencing a 12-week hand
  count of eighteen docks against the RFID sensor's own reported
  availability. The audited count fell from a dock mean of 7.6 helmets to
  3.4 (of a 10-helmet capacity) over the term, while the RFID figure held
  between 8 and 10 throughout, tracking the audited count only weakly (r =
  0.05); fieldwork traces the gap to riders who satisfy the return sensor
  without leaving a helmet behind.
topic: >-
  cataloguing how bike-share riders defeat the shared-helmet bin's
  tap-to-return sensor without leaving a helmet inside, against a term of
  physical helmet counts that keep falling as the return log holds near 100%
