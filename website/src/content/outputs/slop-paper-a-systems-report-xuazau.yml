title: Routed, Not Reduced
subtitle: A Systems Report on Slop University's Overflow-Chair Redistribution Router
authors:
  - Kwame Lindqvist
  - Osei Vandermeer
preset: paper
school: School of Emergent Priorities
date: 2026-07-12
doi: 10.5555/slop.xuazau
summary: >-
  A paper from the School of Emergent Priorities reports on a nightly,
  rule-based router that relocates overflow chairs between Slop University's
  lecture theatres, comparing theatres on the enrolment-forecast panel's
  monthly walkthrough route against the rest across a ten-week deployment. The
  campus-wide chair total barely moves, while the tour-route theatres'
  overflow falls sharply and the remaining theatres' overflow rises to match.
topic: >-
  a systems report on a rule-based router that reshuffles stored overflow
  chairs between lecture theatres to visibly clear the ones on the
  enrolment-forecast tour route, while the total number of overflow chairs on
  campus barely moves
