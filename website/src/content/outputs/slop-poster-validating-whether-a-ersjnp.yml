title: "Same Pair, Reversed Winner"
subtitle: "Order Effects in the Demo Quarter Shortlisting Instrument"
authors:
  - Dagny Okafor
  - Renke Sabel
  - Casimir Beng
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-08
doi: 10.5555/slop.ersjnp
summary: >-
  A reversed-order replay of 286 live pairwise judgments from six Demo Quarter
  cycles finds the shortlisting instrument's recorded winner flips in 34% of
  comparisons, concentrated among the narrowest original margins. Projected
  onto the current cycle, roughly a fifth of shortlist slots would change
  under reversed presentation order.
topic: validating whether a pairwise-comparison instrument used to shortlist Demo Quarter showcase entries returns the same winner when the same two entries are re-shown in reversed order
