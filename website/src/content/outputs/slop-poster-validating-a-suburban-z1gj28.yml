title: Undercounted at the Gate
subtitle: A Season of Manual Headcounts Against the Gate Counter, and the Expansion It Fed
authors:
  - Renke Sabel
  - Thandiwe Solberg
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-17
doi: 10.5555/slop.z1gj28
summary: >-
  A research poster from the School of Continuous Improvement validates a
  suburban dog park's automatic gate counter against 96 manual headcounts
  logged across a 24-week deployment, finding agreement collapses from 91%
  at midday to 58% at dawn -- the exact block a council's off-lead-hours
  expansion business case drew its dawn-hours modelling from.
topic: >-
  validating a suburban dog park's automatic gate-counter tally against a
  season of manual headcounts, and tracing a council's off-lead-hours
  expansion decision back to exactly the hours the counter is shown to
  undercount
