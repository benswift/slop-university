title: The Rack Forgets Slower Than the Rider
subtitle: Cataloguing Why a Campus Bike-Stall Tag Outlives Its Claim
authors:
  - Renke Sabel
  - Mirela Hanke
  - Bram Ntuli
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-14
doi: 10.5555/slop.etwfmk
summary: >-
  A research poster from the School of Continuous Improvement interviews 34
  lapsed bike-rack-stall claimants and Facilities staff, sorting their
  accounts of an unreleased reservation into four recurring categories.
  Cross-tabulated against the full 18-month stall-tag register, the
  categories reproduce the same ordering in time to release, from a median
  48 days under inertia by design to 335 days under silent handoff.
topic: >-
  cataloguing why a campus bike-rack stall tag outlives the rider who
  claimed it
