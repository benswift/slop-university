title: "Marked for the Camera"
subtitle: "A Staff Survey on Deliberate Whiteboard Use Under a Meeting-Room Engagement Photo-Audit"
authors:
  - Lindiwe Achterberg
  - Mirela Hanke
preset: paper
school: School of Emergent Priorities
date: 2026-07-11
doi: 10.5555/slop.yjud2l
summary: >-
  A paper from the School of Emergent Priorities and the School of Continuous
  Improvement surveys staff on why they mark up meeting-room whiteboards, and
  finds deliberate marking strongly predicts a room's photo-audit engagement
  score but is only weakly related to whether the meeting reached a decision.
topic: >-
  surveying staff on whether they've started deliberately marking up
  meeting-room whiteboards to protect the room's booking priority under a new
  photo-audit "engagement" score, ever since Facilities began flagging
  whiteboard-bare bookings for reallocation
