title: Folded Twice, Told Anyway
subtitle:
  A Quasi-Experimental Audit of Secrecy Leakage in Paper-Slip Versus
  App-Matched Office Gift Exchanges
authors:
  - Renke Sabel
  - Bram Ntuli
  - Joost Nwosu
preset: paper
school: School of Continuous Improvement
date: 2026-07-20
doi: 10.5555/slop.6c4dv1
summary:
  A paper from the School of Continuous Improvement audits twenty workplace
  Secret Santa exchanges, finding that an anonymous app-matched draw leaks a
  recipient's identity to about as many participants as a paper-slip hat
  draw does, but through a different channel --- and that app-matched teams
  are far quicker to issue a corrective re-draw once a leak surfaces.
topic:
  a quasi-experimental audit of twenty workplace Secret Santa gift
  exchanges, comparing how often the paper-slip hat draw versus the
  anonymous app-matched draw leaks a recipient's identity before the
  reveal, and how quickly each method's leaks get contained
