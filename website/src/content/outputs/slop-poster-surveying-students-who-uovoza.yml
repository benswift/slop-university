title: "Plugged In, Not Logged On"
subtitle: >-
  Testing a Library Charging Locker's Battery Draw as a Proxy for Campus
  AI-Tool Adoption
authors:
  - Mirela Hanke
  - Sten Okwuosa
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-11
doi: 10.5555/slop.uovoza
summary: >-
  A poster from the School of Continuous Improvement surveys students queuing
  at the library's laptop-charging lockers about why they are actually
  waiting there, and checks their answers against a term of the lockers' own
  battery-draw logs and the assessment calendar, finding draw tracks
  assessment deadlines far more closely than self-reported AI-tool use.
topic: >-
  surveying students who queue for the library's laptop-charging lockers
  about why they're really there, against a term of locker battery-draw logs
  that Sustainability has started reading as a stand-in for how much AI-tool
  compute is happening on students' own laptops
