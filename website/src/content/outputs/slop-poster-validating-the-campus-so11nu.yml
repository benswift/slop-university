title: Busy, Not Bountiful
subtitle: Validating the Campus Apiary's Pollinator Index Against What's Actually Visiting the Garden Beds
authors:
  - Thandiwe Solberg
  - Osei Vandermeer
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-14
doi: 10.5555/slop.so11nu
summary: >-
  A poster from the School of Continuous Improvement tests whether the
  campus apiary's smart-hive Pollinator Index predicts wild-pollinator
  richness in nearby garden beds, pairing a season of hive-weight logs
  against matched near- and far-bed transects. The Index rose 38% across
  the season while near-hive richness held at roughly half the far-bed
  level throughout, with no reliable relationship to the Index's weekly
  value.
topic: >-
  validating the campus apiary's smart-hive Pollinator Index against a
  manual count of which insects actually visit the walkway garden beds
