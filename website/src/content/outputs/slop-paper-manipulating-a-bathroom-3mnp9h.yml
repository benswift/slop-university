title: "Waved and Believed"
subtitle: "Boost Wiring, Indicator-Light Feedback, and Hand-Drying Dwell Time at a Campus Hand Dryer"
authors: ["Osei Vandermeer", "Casimir Beng"]
preset: paper
school: School of Continuous Improvement
date: 2026-07-17
doi: 10.5555/slop.3mnp9h
summary: >-
  A paper from the School of Continuous Improvement independently
  manipulates a campus hand dryer's boost-relay wiring and indicator-light
  feedback across a ten-week field study, finding that measured airflow is
  unaffected by either factor while hand-under-dryer dwell time tracks the
  indicator light rather than the airflow the light is meant to signal.
topic: >-
  manipulating a bathroom hand dryer's boost relay and indicator light
  independently to separate what the motor actually does from what the
  light claims, and whether hands linger under the airflow only as long as
  the light says the boost worked
