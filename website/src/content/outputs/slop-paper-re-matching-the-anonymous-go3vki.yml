title: Matched, Not Anonymous
subtitle: >-
  Re-identifying Staff Integrity Tip-Line Submitters From Timestamp and
  Phrasing Alone
authors:
  - Dagny Okafor
  - Mirela Hanke
  - Renke Sabel
preset: paper
school: School of Continuous Improvement
date: 2026-07-13
doi: 10.5555/slop.go3vki
summary: >-
  A paper from the School of Continuous Improvement builds a lightweight
  linkage tool from the staff integrity tip line's own retained timestamp
  and phrasing data, finding it sufficient to place a tip's true submitter
  in the top-ranked position for a majority of team-scoped closed tickets.
  An accompanying audit of the triage process's existing case notes finds a
  broadly comparable rate of informal identifying inference already
  present.
topic: >-
  re-matching the anonymous staff integrity tip line to its submitter using
  nothing but timestamp and phrasing, then auditing what the triage team
  already quietly does with that capability
pdf: /outputs/pdf/slop-paper-re-matching-the-anonymous-go3vki.pdf
pages: 5
version: "1.0"
