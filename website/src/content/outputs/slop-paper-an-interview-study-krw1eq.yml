title: "One Supplier, Many Keys"
subtitle:
  "How Staff Rebuilt Access to the Tea-Room Biscuit Tin Around a Single
  Contracted Supplier"
authors:
  - Marek Solheim
  - Ingrid Vasseur
preset: paper
school: School of Emergent Priorities
date: 2026-07-09
doi: 10.5555/slop.krw1eq
summary: >-
  An interview study of 27 professional and academic staff finds a stable,
  informal key-sharing network operating alongside the Authorised
  Restocking Protocol once its single contracted supplier's visits fell
  behind demand, sorting into four workaround types that split cleanly by
  staff category's proximity to the supplier relationship, and corroborated
  against fourteen months of the supplier's own widening visit intervals.
topic: >-
  an interview study of the informal key-sharing network staff have built to
  route around the tea-room's Authorised Restocking Protocol, which reserves
  biscuit-tin access to a single contracted supplier whose visits have
  fallen behind demand
