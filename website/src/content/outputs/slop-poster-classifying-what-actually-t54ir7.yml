title: "Supplied, Then Penalised"
subtitle: "A Two-Wave Classification of Non-Conforming Material in the Paper-Only Recycling Stream"
authors:
  - Thandiwe Solberg
  - Joost Nwosu
  - Bram Ntuli
preset: research-poster
school: School of Continuous Improvement
date: 2026-07-10
doi: 10.5555/slop.t54ir7
summary: >-
  A School of Continuous Improvement poster hand-sorts 1,842 non-conforming
  items out of the paper-only recycling stream across nine buildings and two
  audit waves, coding each to a five-class scheme fixed before the first wave.
  Disposable cups and bowls supplied under the University's catering contract
  are the largest class in both waves, the class distribution shifts by no more
  than two percentage points between them, and roughly one item in eight
  recorded as contamination is conforming paper.
topic: >-
  classifying what actually lands in the paper-only recycling bins across a
  term of waste audits, and finding the largest class is disposable cups and
  bowls the University's own catering contract supplies -- in the buildings
  Facilities' Diversion Performance Score marks down for it
