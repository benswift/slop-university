title: "Picked to Win, Played to Park"
subtitle: >-
  A Taxonomy of Workarounds to an Office Footy-Tipping Competition's
  Score-Linked Car-Space Perk
authors:
  - Casimir Beng
  - Renke Sabel
  - Marit Osayande
preset: paper
school: School of Continuous Improvement
date: 2026-07-19
doi: 10.5555/slop.cm2xn5
summary: >-
  A paper from the School of Continuous Improvement develops a
  five-category taxonomy of workaround tactics in office footy-tipping
  competitions, finding a substantially higher tactic-coded rate once a
  competition ties its confidence-weighted leaderboard to a real reward ---
  a reserved car space --- than in comparison competitions with no attached
  reward, a gap a retrospective re-scoring ablation traces to the perk's
  attachment rather than to the scoring formula itself.
topic: >-
  cataloguing how office footy-tipping players route around the app's
  confidence-weighted margin score once management ties it to who gets the
  reserved car space, rather than to who actually picked the winning teams
