# pnpm build-script approval. Sharp's install/check.js falls through to a
# source build when a system libvips is present; skip the script and rely on
# the prebuilt @img/sharp-* platform binary at runtime.
allowBuilds:
  esbuild: true
  sharp: false

# Security floor for a transitive pnpm's time-based resolution keeps on a
# vulnerable version (svgo removeScripts bypass, GHSA fixed in 4.0.2). svgo@3
# (iconify's major) deliberately untouched; drop once astro's floor passes it.
overrides:
  "svgo@>=4.0.0 <4.0.2": "^4.0.2"
